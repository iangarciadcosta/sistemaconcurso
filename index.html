{c:'pmesp', m:'Noções de Informática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Com base nos conceitos do sistema operacional Microsoft Windows 10, avalie as afirmações abaixo:\nI. No Windows 10, ao excluir um arquivo usando a tecla "Delete", o arquivo é permanentemente removido do sistema sem passar pela Lixeira.\nII. A área de transferência permite ao usuário copiar e mover arquivos e textos entre diferentes locais, armazenando temporariamente os dados copiados ou cortados.\nIII. Atalhos são ícones que permitem acesso rápido a arquivos, pastas ou programas e ocupam menos espaço no disco rígido do que os próprios arquivos originais.\nEstá correto o que se afirma em\n(A) I, apenas.\n(B) II, apenas.\n(C) III, apenas.\n(D) I e II, apenas.\n(E) II e III, apenas.',
 alts:['I, apenas.','II, apenas.','III, apenas.','I e II, apenas.','II e III, apenas.'],
 r:4,
 e:'I é falsa: a tecla Delete manda o arquivo para a Lixeira (só Shift+Delete apaga em definitivo). II é verdadeira: a área de transferência armazena temporariamente o que foi copiado/recortado. III é verdadeira: atalhos são pequenos ponteiros para o arquivo original, ocupando bem menos espaço. Logo, II e III apenas.',
 ano:2024},

{c:'pmesp', m:'Noções de Informática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'No contexto dos aplicativos Microsoft Office 2016, avalie as afirmações a seguir:\nI. No Word 2016, a ferramenta "Comparar Documentos" permite mesclar automaticamente o conteúdo de dois documentos diferentes em um único documento.\nII. No Excel 2016, a função "SOMASE" permite somar valores em um intervalo que atendam a um critério especificado.\nIII. No PowerPoint 2016, o recurso "Slide Mestre" é usado para aplicar animações específicas a cada elemento individual de um slide.\nEstá correto o que se afirma em\n(A) I, apenas.\n(B) II, apenas.\n(C) III, apenas.\n(D) I e II, apenas.\n(E) II e III, apenas.',
 alts:['I, apenas.','II, apenas.','III, apenas.','I e II, apenas.','II e III, apenas.'],
 r:1,
 e:'I é falsa: \'Comparar Documentos\' mostra as diferenças entre dois arquivos, não os mescla automaticamente em um só. II é verdadeira: SOMASE soma valores de um intervalo que atendem a um critério. III é falsa: Slide Mestre serve para padronizar formatação/layout dos slides, não para animações individuais. Logo, apenas II.',
 ano:2024},

{c:'pmesp', m:'Noções de Informática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'No contexto dos ambientes colaborativos Google Workspace e Microsoft Teams, avalie as afirmações abaixo e assinale (V) para a verdadeira e (F) para a falsa.\n( ) No Google Workspace, o Google Meet só permite a participação em reuniões por meio de convites enviados por e-mail, sem possibilidade de criar reuniões diretamente na plataforma.\n( ) No Microsoft Teams, é possível fazer chamadas de áudio e vídeo, bem como compartilhar a tela durante as reuniões.\n( ) No Google Workspace, o Google Drive permite o armazenamento de arquivos na nuvem e a colaboração em tempo real em Documentos, Planilhas e Apresentações.\nAs afirmativas são, respectivamente,\n(A) V – V – F.\n(B) V – F – F.\n(C) F – V – V.\n(D) F – F – V.\n(E) F – F – F.',
 alts:['V – V – F.','V – F – F.','F – V – V.','F – F – V.','F – F – F.'],
 r:2,
 e:'1ª é falsa: o Google Meet permite criar reuniões diretamente na plataforma, não só por convite de e-mail. 2ª é verdadeira: o Teams permite chamadas de áudio/vídeo e compartilhamento de tela. 3ª é verdadeira: o Google Drive armazena arquivos na nuvem e permite colaboração em tempo real. Logo, F – V – V.',
 ano:2024},

{c:'pmesp', m:'Noções de Adm. Pública', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'João, após estudar muitos anos no exterior, aprendeu a realizar um trabalho de grande relevância social, o que lhe permitia auferir uma boa renda. Ao retornar ao território brasileiro, constatou, para sua surpresa, que não existia lei regulamentando o exercício dessa profissão. Ao consultar um especialista nessa temática, foi corretamente informado a João que\n(A) a ausência de lei impede o exercício da profissão.\n(B) a ausência de lei indica ser livre o exercício da profissão.\n(C) o trabalho é livre, logo, a lei não pode estabelecer qualquer requisito para o seu exercício.\n(D) é cabível a impetração de mandado de injunção para que lhe seja permitido o exercício da profissão.\n(E) é cabível a impetração de mandado de segurança para que lhe seja permitido o exercício da profissão.',
 alts:['a ausência de lei impede o exercício da profissão.','a ausência de lei indica ser livre o exercício da profissão.','o trabalho é livre, logo, a lei não pode estabelecer qualquer requisito para o seu exercício.','é cabível a impetração de mandado de injunção para que lhe seja permitido o exercício da profissão.','é cabível a impetração de mandado de segurança para que lhe seja permitido o exercício da profissão.'],
 r:1,
 e:'Pelo art. 5º, XIII, da CF, é livre o exercício de qualquer trabalho, ofício ou profissão, atendidas as qualificações que a lei estabelecer. Na ausência de lei regulamentadora, a profissão é livremente exercida (não impedida). A alternativa C erra ao dizer que a lei jamais pode estabelecer requisitos — ela pode, só que aqui não existe lei nesse sentido.',
 ano:2024},

{c:'pmesp', m:'Noções de Adm. Pública', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'O Prefeito do Município Alfa foi informado por sua assessoria que era necessário o preenchimento de uma função de confiança e de um cargo em comissão. Os pretendentes eram Ana, servidora ocupante de cargo de provimento efetivo; Pedro, servidor público estadual aposentado; e Maria, que jamais ocupou um cargo público. À luz da sistemática constitucional vigente, é correto afirmar que\n(A) Ana pode ocupar a função de confiança ou o cargo em comissão.\n(B) Pedro pode ocupar a função de confiança ou o cargo em comissão.\n(C) Maria pode ocupar a função de confiança ou o cargo em comissão.\n(D) Ana e Pedro somente podem ocupar o cargo em comissão.\n(E) Maria somente pode ocupar a função de confiança.',
 alts:['Ana pode ocupar a função de confiança ou o cargo em comissão.','Pedro pode ocupar a função de confiança ou o cargo em comissão.','Maria pode ocupar a função de confiança ou o cargo em comissão.','Ana e Pedro somente podem ocupar o cargo em comissão.','Maria somente pode ocupar a função de confiança.'],
 r:0,
 e:'Pelo art. 37, V, da CF, a função de confiança só pode ser exercida por servidor ocupante de cargo efetivo — Ana se enquadra. Já o cargo em comissão pode ser ocupado por qualquer pessoa, inclusive Ana. Logo, Ana pode ocupar qualquer um dos dois. Maria, por não ter vínculo efetivo, só pode ocupar o cargo em comissão, e não a função de confiança.',
 ano:2024},

{c:'pmesp', m:'Noções de Adm. Pública', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Maria, pessoa analfabeta e que não se alistou como eleitora, mas que possui elevada consciência cívica, sendo residente no Estado Alfa, apresentou requerimento de acesso à informação a uma autarquia federal com sede em Brasília, com o objetivo de que fosse informada sobre a remuneração dos seus servidores. Na situação descrita na narrativa, é correto afirmar, à luz da Lei de Acesso à Informação, que\n(A) Maria não pode requerer as informações, pois não é cidadã.\n(B) não precisam ser apresentados os motivos determinantes da solicitação.\n(C) a Lei de Acesso à Informação somente é aplicada aos Estados e aos Municípios, não à União.\n(D) a remuneração dos servidores diz respeito à intimidade desses agentes, não podendo ser fornecida.\n(E) o requerimento somente deve ser atendido caso a autarquia tenha classificado tais informações como publicizáveis.',
 alts:['Maria não pode requerer as informações, pois não é cidadã.','não precisam ser apresentados os motivos determinantes da solicitação.','a Lei de Acesso à Informação somente é aplicada aos Estados e aos Municípios, não à União.','a remuneração dos servidores diz respeito à intimidade desses agentes, não podendo ser fornecida.','o requerimento somente deve ser atendido caso a autarquia tenha classificado tais informações como publicizáveis.'],
 r:1,
 e:'A Lei de Acesso à Informação (Lei 12.527/2011, art. 10, §3º) dispensa a apresentação de motivos para o pedido de acesso à informação. Ela se aplica a todos os entes federativos, inclusive à União e suas autarquias, e a remuneração de servidores públicos é informação de interesse público, não protegida por sigilo.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nNo contexto em que se encontram (1º parágrafo), as palavras "graves" e "afins" têm sinônimos respectivamente em',
 alts:['carrancudos e gerais.','perigosos e parentes.','pesados e dispostas.','sérios e assemelhadas.','profundos e propensas.'],
 r:3,
 e:'No texto, "graves senhores" significa senhores sérios, e "coisas afins" significa coisas assemelhadas/semelhantes. As demais opções trazem sinônimos que não se encaixam no sentido do texto.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nAssinale a alternativa que reescreve a passagem do texto de acordo com a norma-padrão de colocação pronominal e de concordância verbal.',
 alts:['Agora lembro-me dos tempos em que na calçada existia cadeiras.','Agora me lembro dos tempos em que na calçada existia cadeiras.','Agora me lembro dos tempos em que na calçada existiam cadeiras.','Me lembro agora dos tempos em que existia cadeiras na calçada.','Me lembro agora dos tempos em que existiam cadeiras na calçada.'],
 r:2,
 e:'Na norma-padrão, evita-se iniciar a oração com pronome oblíquo átono (por isso "Agora me lembro", e não "Me lembro..."). Além disso, o verbo "existir" no sentido de "haver, ocorrer" concorda normalmente com o sujeito ("existiam cadeiras"), diferentemente do verbo "haver" nesse mesmo sentido, que é impessoal. Apenas a alternativa C atende às duas exigências.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nSinais de quem sofre bullying\n\nApesar das inúmeras campanhas de conscientização, o bullying segue sendo um tema que merece a nossa atenção. Uma pesquisa realizada pela Microsoft, em 2020, em 32 países, incluindo o Brasil, aponta que 43% dos entrevistados estiveram envolvidos em incidentes de bullying na internet, conhecido como cyberbullying.\nPor sua vez, a Pesquisa Nacional de Saúde Escolar 2019, feita pelo Instituto Brasileiro de Geografia e Estatística com 188 mil estudantes com idades entre 13 e 17 anos, aponta que um em cada 10 adolescentes já se sentiu ameaçado, ofendido e humilhado em redes sociais ou aplicativos. Além disso, 23% dos estudantes afirmaram ter sido vítimas de bullying em ambiente escolar. Os motivos? Aparência do corpo (16,5%), aparência do rosto (11,6%) e cor ou raça (4,6%).\nAlém de seguir com as campanhas de conscientização e de abordar o assunto com as crianças e os adolescentes, entendo que é importante que pais e responsáveis estejam 100% atentos ao comportamento dos seus filhos. A forma como estes agem pode nos dizer muitas coisas, entre elas, demonstrar se eles estão sendo autores ou vítimas de bullying. Esse é um dos melhores meios para identificar se uma criança sofre com zombarias, ridicularizações, humilhações e outro tipo de violência emocional.\nO assunto precisa ser tratado com seriedade pelos pais e responsáveis. É interessante que encarem as situações juntos, sem pressionar os filhos a reagir ou minimizar a situação, fazendo com que eles se sintam pior.\nNesse momento, é relevante pedir discrição para lidar com o assunto, pois expor o menor não irá ajudar. Ao contrário, apenas irá incentivar os colegas a aumentar a prática. Em paralelo, vale buscar a ajuda de um profissional experiente na área.\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nDiante dos dados de pesquisas, a autora recomenda que as campanhas de conscientização sobre o bullying sejam',
 alts:['repensadas com cuidado, para dar lugar ao acompanhamento dos pais e responsáveis.','renovadas para que os pais se especializem no modo de enfrentar o assunto em família.','repetidas sempre que necessário e associadas a pressões dos pais para proibir a prática.','continuadas e contem com a atenção dos pais e responsáveis ao modo de agir dos filhos.','substituídas por educação dos jovens acerca desse tema que preocupa as famílias.'],
 r:3,
 e:'O texto afirma que, além de seguir com as campanhas de conscientização, é importante que pais e responsáveis estejam atentos ao comportamento dos filhos — ou seja, as campanhas devem continuar e ser somadas à atenção parental, exatamente o que diz a alternativa D.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',

eve ser entendida como',
 alts:['ocasionalmente.','totalmente.','relativamente.','eventualmente.','virtualmente.'],

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a alternativa que preenche, respectivamente e de acordo com a norma-padrão de concordância nominal, as lacunas do texto a seguir:\n\nFoi ..... rapidamente uma verificação das ocorrências envolvendo menores, para que fosse ..... providência imediata, antes do meio-dia e ..... . As conclusões da averiguação seguem ..... ao relatório final do setor.',
 alts:['feito ... tomado ... meia ... anexas','feito ... tomada ... meio ... anexo','feito ... tomado... meio ... anexas','feita ... tomada ... meia ... anexas','feita ... tomada ... meio ... anexo'],
 r:3,
 e:'"Foi feita" concorda com "verificação" (feminino); "fosse tomada" concorda com "providência" (feminino); a expressão consagrada é "meio-dia e meia" (subentende-se "hora", feminino); "seguem anexas" concorda com "As conclusões" (feminino plural). Apenas a alternativa D atende a todas as concordâncias.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Certo procedimento é realizado por uma máquina computadorizada que, em velocidade padrão de trabalho, executa todo o procedimento em um período de tempo igual a 4 horas e meia. Pretende-se aumentar a velocidade da máquina para realizar todo o procedimento em um período de tempo um quinto menor do que o período de tempo da velocidade padrão. Esse período de tempo será igual a',
 alts:['3 horas e 36 minutos.','3 horas e 45 minutos.','4 horas e 10 minutos.','4 horas.','3 horas.'],
 r:0,
 e:'4h30min = 270 minutos. Um quinto de 270 é 54. Reduzindo esse valor: 270 - 54 = 216 minutos = 3 horas e 36 minutos.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'De acordo com dados publicados no site da Secretaria de Segurança Pública do Estado de São Paulo, com relação às "Ocorrências de Porte de Entorpecentes" no Estado, em 2022, pode-se concluir que adicionadas as ocorrências atendidas nos meses de setembro e de outubro, tem-se como total 2 264 ocorrências, e subtraídas as ocorrências atendidas no mês de setembro das atendidas no mês de outubro, tem-se 50 ocorrências. Sabendo-se que, para a mesma natureza de ocorrência, em agosto de 2022 foram atendidas 96 ocorrências a mais que as atendidas no mês de setembro desse mesmo ano, pode-se afirmar corretamente que o número de ocorrências de porte de entorpecentes atendidas, em agosto de 2022, foi igual a',
 alts:['1 351.','1 301.','1 061.','1 253.','1 203.'],
 r:4,
 e:'Setembro + Outubro = 2264 e Outubro - Setembro = 50, logo Outubro = 1157 e Setembro = 1107. Agosto = Setembro + 96 = 1107 + 96 = 1203.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Com o total de R$ 252,00, comprou-se apenas dois produtos, sendo o preço pago em um deles 10% maior do que o preço pago no outro. O preço pago no produto mais caro foi de',
 alts:['R$ 124,00.','R$ 128,00.','R$ 132,00.','R$ 126,00.','R$ 130,00.'],
 r:2,
 e:'Sendo x o preço do produto mais barato: x + 1,1x = 252 → 2,1x = 252 → x = 120. O produto mais caro custou 1,1 × 120 = R$ 132,00.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Um entregador de mercadorias faz suas entregas em determinado comércio a cada 8 dias e em outro comércio a cada 12 dias, independentemente de o dia ser útil ou não. No último dia de 2022, um sábado, o entregador fez suas entregas em ambos os comércios. Logo, em fevereiro de 2023, ele fará suas entregas nestes comércios, em um mesmo dia, em uma',
 alts:['quinta-feira.','terça-feira.','sexta-feira.','quarta-feira.','segunda-feira.'],
 r:2,
 e:'O MMC(8,12) = 24 dias. Contando 24 dias a partir de 31/12/2022 (sábado) chega-se a 24/01/2023 (terça-feira); somando mais 24 dias chega-se a 17/02/2023. Como 24 dias equivalem a 3 semanas e 3 dias, o dia da semana avança 3 posições a cada intervalo: de terça-feira para sexta-feira.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Cinco orçamentos distintos, P, Q, R, S e T, serão ordenados de acordo com os seus valores, para serem apresentados ao setor responsável pela liberação da verba para a execução de um serviço. Sabe-se que o valor do orçamento S é mais alto que o de R e mais baixo que o de P. Sabe-se, também, que o valor do orçamento P é mais alto que o de T, que não é mais baixo que o de S. Se o valor do orçamento Q não é mais alto que o de R, então é verdade que, na ordenação, o orçamento que ficará na terceira posição é o orçamento',
 alts:['S.','Q.','T.','R.','P.'],
 r:0,
 e:'Das condições: R < S < P; T < P e T ≥ S; Q ≤ R. Ordenando do menor para o maior: Q, R, S, T, P. O orçamento na terceira posição é S.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Um objeto feito em madeira maciça tem o formato de prisma reto com base no formato de losango, cujas diagonais medem 5 cm e 6 cm. Se o volume de madeira contido nesse objeto é de 450 cm³, então sua altura, comparada à medida da maior diagonal da sua base, é maior em',
 alts:['26 cm.','25 cm.','28 cm.','27 cm.','24 cm.'],
 r:4,
 e:'Área do losango = (5×6)/2 = 15 cm². Altura do prisma = Volume/Área = 450/15 = 30 cm. A maior diagonal mede 6 cm, então a diferença é 30 - 6 = 24 cm.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Um terreno no formato retangular tem perímetro de 82 m, com comprimento excedendo a largura em 1 m. O proprietário pretende dividir esse terreno em duas partes de mesma área, utilizando-se uma das diagonais desse terreno. Essa divisória (a diagonal) terá medida de',
 alts:['30 m.','31 m.','29 m.','32 m.','33 m.'],
 r:2,
 e:'2(L+W) = 82 → L+W = 41. Como L = W+1: 2W+1 = 41 → W = 20 e L = 21. Diagonal = √(20² + 21²) = √841 = 29 m.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Podemos dividir a Segunda Guerra Mundial em três fases: a primeira, que vai de 1º de setembro de 1939 a 22 de junho de 1941; a segunda, de 22 de junho de 1941 a 3 de setembro de 1943, e a terceira, que se estendeu de 3 de setembro de 1943 a 2 de setembro de 1945.\n(Luiz Koshiba, História: origens, estruturas e processos: ensino médio. Texto adaptado)\n\nA segunda fase da Segunda Guerra começou com',
 alts:['a invasão da Normandia pela Força Aérea Britânica, que obrigou a Alemanha a assinar um tratado de não agressão com a URSS e romper a aliança com o Japão.','a invasão da Manchúria pelo Japão, com o objetivo de se aproximar das fronteiras soviéticas, e a formação da aliança bélica entre a França e a Bulgária.','a forte resistência das forças bélicas francesas contra os ataques da aviação alemã, situação que fez com que os nazistas pedissem um cessar-fogo.','o ataque alemão à URSS e, ainda em 1941, o ataque japonês à base naval de Pearl Harbor, o que provocou a entrada dos Estados Unidos na guerra.','a queda do governo de Mussolini e a saída da Itália da guerra, o que provocou, em 1942, a declaração de guerra da Alemanha contra a França e a Grã-Bretanha.'],
 r:3,
 e:'A segunda fase iniciou-se em 22/06/1941 com a Operação Barbarossa (invasão alemã à URSS); ainda em 1941, o Japão atacou Pearl Harbor, levando os Estados Unidos a entrar na guerra. As demais alternativas apresentam fatos fora de ordem cronológica ou fictícios.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Teve rígida organização hierárquica, dividido em alas. Usou uniforme – camisa verde com gravata preta, o símbolo era a letra grega sigma. Adotou o lema Deus, Pátria e Família. Havia um cumprimento, com o braço direito levantado e pronunciando a palavra "anauê", da língua tupi, um grito de guerra ou saudação. Apoiou o golpe do Estado Novo: fez antes homenagens a Vargas em comícios e desfiles.\n(Francisco Iglésias, Trajetória política do Brasil: 1500-1964. Texto adaptado)\n\nO excerto faz referência',
 alts:['ao Bloco Operário e Camponês.','à Ação Integralista Brasileira.','à União Republicana Brasileira.','ao Comando de Libertação Nacional.','à Aliança Nacional Libertadora.'],
 r:1,
 e:'A camisa verde, o símbolo sigma, a saudação "Anauê" e o lema "Deus, Pátria e Família" identificam a Ação Integralista Brasileira (AIB), liderada por Plínio Salgado.',

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Os ambientes urbanos são marcados pela crescente urbanização e impermeabilização das superfícies, alterando o balanço de energia, além da crescente concentração de poluentes atmosféricos. Nesse ambiente, tem-se observado um fenômeno atmosférico que tende a agravar as condições de desconforto térmico, além de outras consequências indesejáveis para a população.\n\nEsse fenômeno é conhecido como',

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'João recebeu um e-mail enviado pela Maria e escolheu a opção Responder a Todos. Os campos preenchidos automaticamente na resposta de João são vistos a seguir.\n\nDe: João\nPara: Maria\nCc: Pedro\n\nAssinale a alternativa que contém os possíveis campos do e-mail enviado pela Maria para o João.',
 alts:['De: Maria / Para: João / Cc: Bianca / Cco: Pedro','De: Maria / Para: João / Cc: Pedro / Cco: Bianca','De: João / Para: Pedro / Cc: Maria / Cco: Bianca','De: João / Para: Maria / Cc: Bianca / Cco: Pedro','De: Maria / Para: Pedro / Cc: João, Bianca'],
 r:1,
 e:'Ao "Responder a Todos", o remetente original (Maria) vira destinatário, e os destinatários visíveis em Cc do e-mail original (Pedro) são mantidos em Cc na resposta. Quem estava em Cco (cópia oculta, Bianca) não é visível a João e por isso não aparece na resposta. Isso só é compatível com o e-mail original tendo De: Maria, Para: João, Cc: Pedro, Cco: Bianca.',
 ano:2023},

{c:'pmesp', m:'Noções de Adm. Pública', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Considere que Luciana tem um filho de sete meses de vida, amamenta, mas foi devidamente processada, julgada e condenada pela prática do crime de roubo. Com base na situação hipotética e no disposto na Constituição Federal, é correto afirmar:',
 alts:['assegura-se à Luciana o respeito à integridade física e moral, e a ela não deve ser aplicada a pena de banimento.','como o filho de Luciana já tem mais de seis meses de vida, não lhe é assegurada a possibilidade de permanecer com seu filho durante o período de amamentação.','Luciana poderá ser condenada a cumprir pena de trabalhos forçados.','em face do princípio da isonomia, a Constituição determina que a pena deverá ser cumprida no mesmo tipo de estabelecimento penal, não havendo distinção de acordo com a natureza do delito e a idade da apenada.','admite-se que Luciana seja condenada à pena de caráter perpétuo, mas não a penas cruéis.'],
 r:0,
 e:'O art. 5º da CF assegura a todo preso o respeito à integridade física e moral (inciso XLIX) e proíbe expressamente as penas de morte, de caráter perpétuo, de trabalhos forçados, de banimento e cruéis (inciso XLVII). Apenas a alternativa A está correta; as demais contrariam a Constituição.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia a tira a seguir para responder às questões 01 e 02:\n\nQuadro 1 - Mafalda: "Mafalda, hoje seu pai passou de carro na frente da padaria e uma senhora disse..."\nQuadro 2 - Amiga: "Veja só, esse pé-rapado agora tem carro!" Mafalda: "Será que você ouviu direito?"\nQuadro 3 - Amiga: "Eu não estava lá. Foi minha mãe que ouviu e me contou." Mafalda: "E será que a tal senhora estava falando do meu pai? Decerto estavam passando outros caras de carro, não é?"\nQuadro 4 - Amiga: "Claro, pode ser..."\nQuadro 5 - Amiga: "É, mas minha mãe conhece seu pai, não é?"\n\n(Quino. 10 anos com Mafalda. São Paulo: Martins Fontes, 2018. Adaptado)\n\nAssinale a alternativa com a informação implícita que provoca o efeito de humor da tira.',
 alts:['O pai de Mafalda passou de carro na frente da padaria e foi visto por uma mulher que o desprezou.','Mafalda não sabia que seu pai havia comprado um carro novo, por isso questiona a informação da amiga.','A expressão "pé-rapado" pode ser usada para descrever muitas pessoas, mas não o pai de Mafalda.','A senhora que chamou o pai de Mafalda de "pé-rapado" não tem como conhecer a real situação financeira dele.','A amiga considera que "pé-rapado" seja uma expressão adequada para se referir ao pai de Mafalda.'],
 r:4,
 e:'O humor está na certeza ingênua da amiga de que a senhora desconhecida realmente sabia da situação financeira do pai de Mafalda, ao afirmar no último quadro que \'minha mãe conhece seu pai\', como se isso comprovasse a crítica de \'pé-rapado\' — evidenciando que a amiga considera o rótulo depreciativo válido, sem perceber que uma senhora qualquer na rua não tem como conhecer a real condição financeira de alguém.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia a tira (mesma das questões 01 e 02):\n\nQuadro 1 - Mafalda: "Mafalda, hoje seu pai passou de carro na frente da padaria e uma senhora disse..."\nQuadro 2 - Amiga: "Veja só, esse pé-rapado agora tem carro!" Mafalda: "Será que você ouviu direito?"\nQuadro 3 - Amiga: "Eu não estava lá. Foi minha mãe que ouviu e me contou." Mafalda: "E será que a tal senhora estava falando do meu pai? Decerto estavam passando outros caras de carro, não é?"\nQuadro 4 - Amiga: "Claro, pode ser..."\nQuadro 5 - Amiga: "É, mas minha mãe conhece seu pai, não é?"\n\n(Quino. 10 anos com Mafalda. São Paulo: Martins Fontes, 2018. Adaptado)\n\nEm – ...hoje seu pai passou de carro na frente da padaria... –, a expressão destacada pode ser substituída, em conformidade com a norma-padrão, por:',
 alts:['diante à','defronte na','a frente da','diante da','adiante à'],
 r:3,
 e:'\'Na frente da\' pode ser substituído por \'diante da\', locução prepositiva equivalente e correta na norma-padrão. As demais opções apresentam combinações inadequadas de preposição/crase ou regência (\'diante à\' e \'adiante à\' misturam preposição e crase indevidamente; \'a frente da\' carece do acento indicativo de crase; \'defronte na\' não é construção padrão).',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nNos últimos tempos, rompeu-se o elo colaborativo entre gerações. Nas famílias tradicionais, por milhares de anos, ter filhos significava que, quando os pais envelhecessem e não pudessem mais trabalhar, os filhos adultos cuidariam deles. Assim, garantia-se um equilíbrio entre a idade adulta produtiva e os dependentes (crianças e idosos) em uma cadeia de solidariedade intergeracional. Mas o que acontece quando a maioria dos adultos não tem filhos, como vem acontecendo?\n\nNos países nórdicos, políticas públicas garantem lares dignos para idosos e saúde gratuita para a população envelhecida. O que antes era responsabilidade das famílias, agora é assegurado em escala coletiva. Nos apartamentos exíguos da família nuclear, não há espaço para os avós, mas ao menos há apoio público. Já em países como EUA, e sobretudo no Brasil, os idosos enfrentam apoio familiar declinante e políticas sociais precárias. Os asilos privados? Caríssimos e mal administrados - quando não criminosamente negligenciados. Sistemas que só visam lucro máximo não são opção de gestão adequada - pra dizer o mínimo. E a ansiedade acerca de nosso futuro quando idosos já é sentida quando estamos na meia idade.\n\n(Ladislau Dowbor. Adaptado)\n\nEm relação à "cadeia de solidariedade intergeracional" (1º parágrafo), é correto afirmar, com base no texto, que esta',
 alts:['tem se mostrado mais forte nos países nórdicos, em que a taxa de natalidade segue estável como no passado.','fica afetada quando nascem menos crianças, fazendo com que os países devam criar estratégias de cuidado com os idosos.','depende de decisões individuais e familiares, motivo pelo qual os países têm dificuldade em promovê-la.','é particularmente preocupante em países como o Brasil e os Estados Unidos, lugares em que o número de idosos é baixo.','está baseada, tradicionalmente, na criação de filhos autônomos que possam trabalhar para sustentar a si próprios.'],
 r:1,
 e:'O texto explica que essa cadeia se rompe quando a maioria dos adultos não tem filhos, exigindo que os países (como os nórdicos, via políticas públicas) criem novas estratégias de cuidado aos idosos. As demais alternativas contradizem o texto: não há estabilidade na natalidade nórdica, a cadeia não depende de decisões individuais isoladas, Brasil e EUA não têm \'baixo número de idosos\', e a base tradicional era o cuidado mútuo entre gerações, não a autonomia dos filhos.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',

 alts:['Nos países nórdicos, políticas públicas garantem lares dignos para idosos... (2º parágrafo)','...quando os pais envelhecessem e não pudessem mais trabalhar... (1º parágrafo)','Caríssimos e mal administrados – quando não criminosamente negligenciados. (2º parágrafo)','Nos últimos tempos, rompeu-se o elo colaborativo entre gerações. (1º parágrafo)','E a ansiedade acerca de nosso futuro quando idosos já é sentida... (2º parágrafo)'],
 r:3,

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nAssassinato digital\n\nAo contrário de tempos passados, quando sumir com alguém exigia certo grau de dificuldade e até risco criminal, hoje tornou-se facílimo dar fim a uma pessoa. Bastam um dedo e algumas teclas. É possível mudar completamente o círculo de amizades, sumir da turma, buscar novos ares, sem grandes enfrentamentos. Um amigo estava falando de sua ex: "Bloqueei". Explicou que bloqueou em tudo: no WhatsApp, no Instagram, no Face. Em qualquer outra rede social, uma pessoa existe ou não existe. Se é bloqueada em todos os canais em que pode se comunicar com a outra, tecnicamente não existe mais. Simplesmente deixa de estar presente. Mesmo porque, na atualidade, a presença é mais digital que física em um número imenso de casos.\n\nHouve um tempo em que eu me admirava ao dar uma "limpa" no celular. Por que tanta gente, com quem nunca converso, tantos endereços que já não fazem parte do meu dia a dia? Para meu susto, recebi reclamações: "Por que você me deletou?", "Me bloqueou?". Na prática, respondia: "Porque a gente não se falava mais". Descobri que estar na minha rede mesmo sem papo era um modo de afirmar a existência da pessoa em minha vida. Portanto, era ofensivo ser excluído. Parecia sem sentido. Mas entendi. Se a pessoa for deletada ou, pior, bloqueada, simplesmente deixa de existir. A comparação é forte, mas inevitável: morre.\n\nEu ainda acredito nas relações de carne e osso, nos abraços, nos encontros longos e profundos. Mas descubro que os relacionamentos digitais tomaram um espaço impressionante. Deletar equivale a dizer adeus. E dizer adeus é sempre uma forma de luto.\n\n(Walcyr Carrasco. Adaptado)\n\nÉ correto afirmar que no trecho "Deletar equivale a dizer adeus. E dizer adeus é sempre uma forma de luto" (3º parágrafo), o autor procura',
 alts:['sugerir que o luto digital é uma experiência que afeta principalmente os mais jovens, que desconhecem lutos reais.','criticar aqueles indivíduos que não reconhecem o peso emocional dos vínculos virtuais nos dias de hoje.','enfatizar que a exclusão digital tem valor simbólico equivalente ao rompimento definitivo de laços afetivos.','suavizar o impacto das relações digitais, apresentando-as como menos intensas do que as presenciais.','ilustrar que as despedidas virtuais são passageiras, visto que as pessoas não estão verdadeiramente mortas.'],
 r:2,
 e:'Ao comparar \'deletar\' com \'morrer\' e afirmar que dizer adeus é sempre uma forma de luto, o autor enfatiza que a exclusão digital carrega um peso simbólico equivalente ao de um rompimento afetivo definitivo. As demais alternativas contrariam ou distorcem essa comparação.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nAssassinato digital\n\nAo contrário de tempos passados, quando sumir com alguém exigia certo grau de dificuldade e até risco criminal, hoje tornou-se facílimo dar fim a uma pessoa. Bastam um dedo e algumas teclas. É possível mudar completamente o círculo de amizades, sumir da turma, buscar novos ares, sem grandes enfrentamentos. Um amigo estava falando de sua ex: "Bloqueei". Explicou que bloqueou em tudo: no WhatsApp, no Instagram, no Face. Em qualquer outra rede social, uma pessoa existe ou não existe. Se é bloqueada em todos os canais em que pode se comunicar com a outra, tecnicamente não existe mais. Simplesmente deixa de estar presente. Mesmo porque, na atualidade, a presença é mais digital que física em um número imenso de casos.\n\nHouve um tempo em que eu me admirava ao dar uma "limpa" no celular. Por que tanta gente, com quem nunca converso, tantos endereços que já não fazem parte do meu dia a dia? Para meu susto, recebi reclamações: "Por que você me deletou?", "Me bloqueou?". Na prática, respondia: "Porque a gente não se falava mais". Descobri que estar na minha rede mesmo sem papo era um modo de afirmar a existência da pessoa em minha vida. Portanto, era ofensivo ser excluído. Parecia sem sentido. Mas entendi. Se a pessoa for deletada ou, pior, bloqueada, simplesmente deixa de existir. A comparação é forte, mas inevitável: morre.\n\nEu ainda acredito nas relações de carne e osso, nos abraços, nos encontros longos e profundos. Mas descubro que os relacionamentos digitais tomaram um espaço impressionante. Deletar equivale a dizer adeus. E dizer adeus é sempre uma forma de luto.\n\n(Walcyr Carrasco. Adaptado)\n\nConsidere os trechos do 2º parágrafo:\n• ...estar na minha rede mesmo sem papo era um modo de afirmar a existência da pessoa em minha vida. Portanto, era ofensivo ser excluído.\n• Se a pessoa for deletada ou, pior, bloqueada, simplesmente deixa de existir.\nÉ correto afirmar que os termos destacados ("Portanto" e "Se") estabelecem, respectivamente, relações de sentido de',
 alts:['conclusão e concessão.','conclusão e condição.','concessão e condição.','condição e conclusão.','condição e concessão.'],
 r:1,
 e:'\'Portanto\' introduz uma conclusão lógica a partir do que foi dito antes; \'Se\' introduz uma condição (hipótese) para que a consequência ocorra. A relação correta é, portanto, conclusão e condição.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia a tira a seguir para responder às questões 13 a 15:\n\nQuadro 1 - Uma adulta, em pé, com os braços erguidos, diz às crianças: "Ajeitem a coluna! Olhem pra frente! Pés alinhados! Menos impulso!"\nQuadro 2 - Duas crianças se balançam despreocupadamente em balanços de um parquinho, enquanto uma terceira criança, ao lado, levanta os braços. A adulta grita, de longe: "Vocês não sabem se divertir!"\n\n(Eduardo Arruda. Adaptado)\n\nA partir da leitura da tira, é correto afirmar que seu efeito de humor deriva do fato de que a menina que fala',
 alts:['encara com extremo rigor uma circunstância da qual se espera divertimento.','dissimula sua aversão ao balanço com uma postura severa frente à brincadeira.','profere insultos às demais crianças, incitando-as a pararem de se balançar.','irrita-se com a aversão das crianças a regras morais de comportamento.','emprega a austeridade necessária para as crianças aprenderem a se balançar.'],
 r:0,
 e:'O humor está no contraste entre a postura extremamente rígida e disciplinadora da personagem (dando ordens como um treinamento militar) diante de uma atividade que deveria ser espontânea e divertida (balançar-se no parque). As demais alternativas não correspondem a essa leitura.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia a tira (mesma das questões 13 a 15):\n\nQuadro 1 - Uma adulta, em pé, com os braços erguidos, diz às crianças: "Ajeitem a coluna! Olhem pra frente! Pés alinhados! Menos impulso!"\nQuadro 2 - Duas crianças se balançam nos balanços de um parquinho, enquanto a adulta grita, de longe: "Vocês não sabem se divertir!"\n\n(Eduardo Arruda. Adaptado)\n\nEm – Ajeitem a coluna – (1º quadro), a palavra destacada está conjugada no mesmo modo verbal que aquela destacada em:',
 alts:['É preciso que as crianças aprendam a respeitar as diferenças desde muito cedo na vida.','Reconhecem-se as brincadeiras que são importantes para o desenvolvimento da criança.','Para que se divertissem, as crianças deveriam ter acesso a parques públicos na cidade.','As crianças ainda estão aprendendo, então sejam pacientes com elas, por favor.','Nunca se sabe se as crianças conseguem fazer amizades com outras da mesma idade.'],
 r:3,

 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nQuando apostar vira um problema\n\nEm 2023, cerca de 28 milhões de brasileiros de 14 anos ou mais (ou 17,6% da população nesta faixa de idade) diziam ter apostado no ano anterior, segundo estudo publicado pela Universidade Federal de São Paulo (Unifesp), em parceria com o Ministério da Justiça e Segurança Pública, em abril deste ano.\n\nEntre os apostadores, 10,9 milhões apresentavam características de jogo de risco ou problemático — número equivalente a 38,6% do total de apostadores e 7,3% da população em geral. Dentro desse grupo dos apostadores problemáticos, 1,4 milhão de brasileiros apresentava um padrão de apostas compatível com o diagnóstico de transtorno do jogo, enfermidade caracterizada pelo desejo incontrolável de apostar mesmo diante de prejuízos — contingente equivalente a 5% dos jogadores e 0,8% da população total acima de 14 anos.\n\n"Há mais de 30 anos, a ciência entendeu que o cérebro não fica só dependente de substâncias químicas, mas também de comportamentos muito ativadores das áreas que processam prazer no cérebro", diz Rodrigo Machado, psiquiatra do Programa de Transtornos do Impulso do Instituto de Psiquiatria (IPq) do Hospital das Clínicas da Universidade de São Paulo (FMUSP).\n\nMas houve uma mudança no perfil dos jogos de azar que levou à explosão dos casos de dependência no Brasil, especialmente desde 2018. "Com a tecnologia e a extrema difusão dos cassinos online, passamos a ter cassinos no bolso 24 horas. Qualquer pessoa consegue acessar as plataformas de apostas, bets esportivas etc., quando antes você precisava se deslocar fisicamente até um determinado lugar", afirma o especialista em jogo compulsivo.\n\nOutra mudança, diz ele, foi na própria dinâmica do jogo de azar através das plataformas digitais. Por exemplo, apostas em jogos de futebol sempre existiram, mas antes só se apostava no resultado final. Já nas plataformas de apostas, é possível fazer as chamadas "apostas in-play", enquanto o jogo está acontecendo. "Quando você promove um ciclo ultrarrápido de apostas, você encurta a distância entre o ato de apostar e o resultado final, fazendo com que as pessoas entrem num loop de compulsividade e, consequentemente, de hiperestimulação dos centros que processam o prazer no cérebro", afirma Machado.\n\n(Thais Carrança. Adaptado)\n\nDe acordo com as informações do texto, é correto afirmar que foi um fator determinante para o aumento dos casos de dependência de jogos de azar no Brasil, nos últimos anos,',
 alts:['a chegada à juventude e à vida adulta de uma população que nasceu num contexto totalmente tecnológico e cresceu envolvida com jogos eletrônicos.','a investigação do padrão comportamental dos jogadores, o que possibilitou a identificação do diagnóstico de transtorno do jogo em milhares de apostadores.','a propagação de inúmeras plataformas digitais de apostas, em decorrência do avanço tecnológico, que proporciona facilidade de acesso a praticamente qualquer pessoa.','a fiscalização dos jogos de azar pelo governo federal, que acabou por evidenciar os dados que, anteriormente, sequer eram coletados.','o aumento do número de cassinos físicos em território nacional motivado pela adesão popular decorrente do aumento de plataformas digitais.'],
 r:2,
 e:'O texto atribui a explosão da dependência à \'extrema difusão dos cassinos online\', que tornou o acesso às plataformas de apostas fácil para qualquer pessoa, a qualquer hora (\'cassinos no bolso 24 horas\'). As demais alternativas não são sustentadas pelo texto.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',

 alts:['"especialmente" expressa circunstância de ordem, com sentido de "primeiramente"; e "enquanto" estabelece relação de conformidade, sendo equivalente a "na qualidade de".','"especialmente" expressa circunstância de modo, com sentido de "particularmente"; e "enquanto" estabelece relação temporal, sendo equivalente a "durante o tempo em que".','"especialmente" expressa circunstância de dúvida, com sentido de "possivelmente"; e "enquanto" estabelece relação proporcional, sendo equivalente a "à medida que".','"especialmente" expressa circunstância de tempo, com sentido de "outrora"; e "enquanto" estabelece relação proporcional, sendo equivalente a "ao passo que".','"especialmente" expressa circunstância de intensidade, com sentido de "muito"; e "enquanto" estabelece relação temporal, sendo equivalente a "quando".'],

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Três amigos trabalham em empresas diferentes, e cada um deles tem uma escala de trabalho diferente. Para um deles, a escala é 2 x 1, que significa 2 dias trabalhados consecutivamente seguidos de 1 dia de folga. Para os outros dois amigos, a escala é 4 x 1 para um e 5 x 1 para o outro.\nEm um domingo, os três amigos tiveram folga no mesmo dia e almoçaram juntos. Combinaram que, na folga seguinte comum aos três, eles almoçariam juntos novamente, o que aconteceu em',
 alts:['uma terça-feira.','uma quarta-feira.','uma quinta-feira.','uma sexta-feira.','um sábado.'],
 r:0,
 e:'Nas escalas 2x1, 4x1 e 5x1, as folgas se repetem a cada 3, 5 e 6 dias, respectivamente (ciclo = dias trabalhados + 1). A próxima folga comum ocorre no mínimo múltiplo comum desses ciclos: MMC(3,5,6) = 30 dias após o domingo inicial. Como 30 = 4×7+2, a folga comum cai 2 dias depois de um domingo, ou seja, numa terça-feira.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Para executar uma tarefa, três funcionários gastaram 3 horas e 15 minutos. No dia seguinte, foram destacados cinco funcionários para executar a mesma tarefa. Esses cinco funcionários possuem a mesma capacidade de trabalho que os anteriores.\nDessa maneira, é correto afirmar que o tempo a menos que esses 5 funcionários gastaram para executar a tarefa foi de',
 alts:['1 hora e 57 minutos.','1 hora e 35 minutos.','1 hora e 18 minutos.','1 hora e 43 minutos.','1 hora e 22 minutos.'],
 r:2,
 e:'O trabalho total é 3 funcionários × 3h15min = 9h45min de \'homens-hora\'. Com 5 funcionários, o tempo necessário é 9h45min ÷ 5 = 1h57min. A diferença de tempo é 3h15min − 1h57min = 1h18min.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Para ter acesso à última prova de uma gincana, os componentes de cada equipe devem abrir um determinado envelope numerado que está em uma caixa na qual há 50 envelopes numerados, respectivamente, de 1 a 50. Para obter o número correto e abrir o envelope, é necessário calcular o valor numérico da seguinte expressão:\n2 · J + 7 · K + 7 · L – M\nOs valores das letras utilizadas na expressão podem ser obtidos por meio da resolução dos seguintes sistemas de equações:\nSistema 1: J – K = 2 e J + 3K = 10\nSistema 2: K + 5L = 7 e 4K – L = 7\nSistema 3: L + 3M = 10 e 2L – 4M = –10\nO número do envelope correto é',
 alts:['37.','26.','31.','42.','19.'],
 r:1,
 e:'Do sistema 1: subtraindo (J+3K)-(J-K)=10-2, obtemos 4K=8, logo K=2 e J=4. Do sistema 2, com K=2: 2+5L=7, logo L=1 (confere: 4×2-1=7). Do sistema 3, com L=1: 1+3M=10, logo M=3 (confere: 2×1-4×3=-10). Substituindo na expressão: 2×4+7×2+7×1-3 = 8+14+7-3 = 26.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'A tabela a seguir mostra exemplos de 4 famílias, relacionando os ganhos mensais e os gastos mensais de cada uma com alimentação.\n\nTabela de ganhos e gastos com alimentação - mensal\nFamília A: Ganhos R$ 1.800,00; Gastos R$ 480,00\nFamília B: Ganhos R$ 2.600,00; Gastos R$ 520,00\nFamília C: Ganhos R$ 4.500,00; Gastos R$ 740,00\nFamília D: Ganhos R$ 8.100,00; Gastos R$ 1.120,00\n\nSeja R a média aritmética simples dos ganhos mensais dessas quatro famílias e seja T a média aritmética simples dos gastos com alimentação.\nEm comparação com R, o valor de T equivale a uma porcentagem mais próxima de',
 alts:['16%','18%','17%','15%','19%'],
 r:2,
 e:'R = (1.800+2.600+4.500+8.100)/4 = 17.000/4 = 4.250. T = (480+520+740+1.120)/4 = 2.860/4 = 715. T/R = 715/4.250 ≈ 16,8%, valor mais próximo de 17%.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Após uma denúncia, a polícia encontrou em um depósito três vasilhames contendo azeite adulterado. Cada vasilhame continha 56 litros desse azeite, que seriam envasados em vasilhames de 350 mL.\nSendo V o número de vasilhames de 350 mL necessários para envasar todo esse azeite, a soma dos algarismos de V é igual a',
 alts:['8.','11.','13.','12.','9.'],
 r:3,
 e:'O total de azeite é 3 × 56 = 168 litros = 168.000 mL. V = 168.000 ÷ 350 = 480 vasilhames. A soma dos algarismos de 480 é 4+8+0=12.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Um terreno retangular precisa ser vasculhado detalhadamente à procura de indícios de atividades ilícitas. Esse terreno tem 1,2 km de comprimento e 0,9 km de largura e será dividido em 300 quadrados de mesma área para facilitar o trabalho da polícia.\nA medida do lado de cada um desses 300 quadrados é',
 alts:['48 m.','55 m.','72 m.','60 m.','35 m.'],

 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O gráfico a seguir deveria mostrar apenas os valores arrecadados por quatro pessoas em uma campanha de solidariedade, em um gráfico de setores (pizza) chamado "Distribuição da arrecadação (R$)": o setor de Fabiana mostra o valor 182; o setor de Luiz mostra o valor 141; o setor de Mateus mostra o valor 49; e o setor de Cristina, em vez de um valor em reais, mostra a informação de que esse setor tem 81° de abertura (ângulo).\nNo entanto, a informação registrada no setor circular do gráfico que corresponde a Cristina não é do quanto ela arrecadou, mas sim de que esse setor tem 81° de abertura.\nA partir dos dados disponíveis, a diferença entre o valor arrecadado por Cristina e o valor arrecadado por Mateus é igual a',
 alts:['48.','52.','45.','63.','59.'],
 r:4,
 e:'A soma dos valores conhecidos (Fabiana+Luiz+Mateus) é 182+141+49=372, que corresponde aos 360°-81°=279° restantes do círculo. Assim, cada grau vale 372/279 = 4/3 reais. O valor de Cristina é 81 × 4/3 = 108. A diferença entre Cristina (108) e Mateus (49) é 108-49=59.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O polígono ABCDEFG a seguir representa um terreno (desenho fora de escala). Os pontos H, I e J são pontos fora do terreno, de tal forma que AHIJ é um retângulo: H está no mesmo alinhamento horizontal de A, formando o lado superior do retângulo (lado AH); J está no mesmo alinhamento vertical de A, formando o lado esquerdo do retângulo (lado AJ); e I é o vértice do retângulo oposto a A, de modo que HI é o lado direito e IJ é o lado inferior do retângulo.\nO contorno do terreno segue os vértices nesta ordem: de A, o lado AB segue horizontalmente até B, ainda sobre o lado superior do retângulo (entre A e H); de B, o lado (diagonal) BC vai até C, um ponto sobre o lado direito do retângulo (segmento HI), abaixo de H; de C, o lado CD desce verticalmente, ainda sobre esse mesmo lado direito, até D; de D, o lado (diagonal) DE vai até E, um ponto sobre o lado inferior do retângulo (segmento IJ), à esquerda de I; de E, o lado EF segue horizontalmente, ainda sobre o lado inferior, até F, mais próximo de J; de F, o lado (diagonal) FG vai até G, um ponto sobre o lado esquerdo do retângulo (segmento JA), acima de J; e, por fim, de G, o lado GA fecha o polígono subindo verticalmente até A.\nSão conhecidas as seguintes medidas, em metros: AB = 16; BH = 24; HC = 7; CD = 15; DI = 8; IE = 15; EF = 22; FJ = 3; JG = 4; GA = 26.\nO perímetro desse terreno é igual a',
 alts:['126 m.','101 m.','104 m.','109 m.','121 m.'],
 r:0,
 e:'AB=16 e GA=26 são dados diretamente. As demais são calculadas com os catetos indicados: BC = √(BH²+HC²) = √(24²+7²) = √625 = 25 (triângulo 7-24-25); CD=15 é dado diretamente; DE = √(DI²+IE²) = √(8²+15²) = √289 = 17 (triângulo 8-15-17); EF=22 é dado diretamente; FG = √(FJ²+JG²) = √(3²+4²) = √25 = 5 (triângulo 3-4-5). Perímetro = 16+25+15+17+22+5+26 = 126 m.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O polígono ABCDEFG a seguir representa um terreno (desenho fora de escala). Os pontos H, I e J são pontos fora do terreno, de tal forma que AHIJ é um retângulo: H está no mesmo alinhamento horizontal de A, formando o lado superior do retângulo (lado AH); J está no mesmo alinhamento vertical de A, formando o lado esquerdo do retângulo (lado AJ); e I é o vértice do retângulo oposto a A, de modo que HI é o lado direito e IJ é o lado inferior do retângulo.\nO contorno do terreno segue os vértices nesta ordem: de A, o lado AB segue horizontalmente até B, ainda sobre o lado superior do retângulo (entre A e H); de B, o lado (diagonal) BC vai até C, um ponto sobre o lado direito do retângulo (segmento HI), abaixo de H; de C, o lado CD desce verticalmente, ainda sobre esse mesmo lado direito, até D; de D, o lado (diagonal) DE vai até E, um ponto sobre o lado inferior do retângulo (segmento IJ), à esquerda de I; de E, o lado EF segue horizontalmente, ainda sobre o lado inferior, até F, mais próximo de J; de F, o lado (diagonal) FG vai até G, um ponto sobre o lado esquerdo do retângulo (segmento JA), acima de J; e, por fim, de G, o lado GA fecha o polígono subindo verticalmente até A.\nSão conhecidas as seguintes medidas, em metros: AB = 16; BH = 24; HC = 7; CD = 15; DI = 8; IE = 15; EF = 22; FJ = 3; JG = 4; GA = 26.\nQual é a área desse terreno?',
 alts:['1.038 m²','1.116 m²','1.160 m²','1.056 m²','1.050 m²'],
 r:4,
 e:'Posicionando J na origem (0,0), I=(40,0), H=(40,30) e A=(0,30) — já que AH=AB+BH=16+24=40 e AJ=JG+GA=4+26=30 —, obtêm-se as coordenadas A(0,30), B(16,30), C(40,23), D(40,8), E(25,0), F(3,0), G(0,4). Aplicando a fórmula de Shoelace a esses sete pontos, a área resulta em 1.050 m².',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\nQuando falamos da Primeira Guerra Mundial, falamos muito sobre as batalhas, os novos armamentos, as estratégias militares, as origens e os desdobramentos do conflito. Isso tudo é muito importante. Mas precisamos falar mais da vida cotidiana, da história social, explorar a vida e os sentimentos dos soldados que participaram dos combates. Eles têm muito a dizer, e a partir dessas falas podemos compreender melhor as nuances da Grande Guerra. Mais do que um sistema de posição e fortificação, as trincheiras eram um ecossistema cultural, extremamente dinâmico e complexo.\n(Bruno Leal, "A vida cotidiana nas trincheiras da Primeira Guerra Mundial", Boletim Café História. Adaptado)\nEm relação às trincheiras na Primeira Guerra Mundial, é correto afirmar que',
 alts:['surgiram a partir das convenções de guerra, que estabeleceram limites para os conflitos entre os exércitos e a população civil e restringiram o enfrentamento armado à linha de frente da guerra, reduzindo drasticamente a mortalidade dos civis.','revelaram as ambiguidades da guerra, pois expressavam, ao mesmo tempo, o ódio nacionalista dos militares e o reconhecimento empático entre soldados de exércitos rivais, como no caso da trégua de Natal de 1914.','se restringiram aos combates de guerra ocorridos fora do continente europeu, especialmente na África e na Ásia, enquanto o conflito na Europa ficou marcado pelo avanço por terra da Alemanha em relação à França.','se constituíram como um espaço privilegiado de representação dos interesses nacionais de cada país envolvido no conflito, tendo em vista a participação equânime de todas as classes sociais na linha de frente da guerra.','marcaram a última grande guerra antes do desenvolvimento tecnológico da indústria bélica, em um conflito caracterizado pela utilização de armas não automáticas e pela inexistência de granadas ou bombardeios aéreos.'],
 r:1,
 e:'A trégua de Natal de 1914, em que soldados inimigos confraternizaram nas trincheiras, ilustra bem a ambiguidade entre o ódio nacionalista da guerra e momentos de empatia humana entre combatentes rivais. As demais alternativas trazem afirmações historicamente incorretas.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\nAs Constituições de 1934 e de 1946 marcaram períodos democráticos no país. A Carta de 1934 dava amplos poderes aos Estados e assegurava preponderância do Poder Legislativo. A de 1946, elaborada após o período autoritário do Estado Novo, reforçou direitos individuais e políticos e estabeleceu independência dos Poderes Judiciário e Legislativo e separação entre igreja e Estado.\n(Agência Senado. Adaptado)\nAinda que tenha reforçado direitos políticos, a Constituição de 1946 não assegurou o voto',
 alts:['das mulheres.','obrigatório.','secreto.','dos analfabetos.','direto.'],
 r:3,
 e:'A Constituição de 1946 manteve a exclusão dos analfabetos do direito de voto, restrição que só foi extinta pela Constituição de 1988. O voto feminino já havia sido conquistado em 1932, e o voto secreto, direto e obrigatório já eram características do sistema eleitoral da época.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Em 1949, durante o contexto da Guerra Fria, foi criada uma aliança militar que reunia países capitalistas liderados pelos Estados Unidos, com o objetivo de garantir defesa mútua contra possíveis ataques do bloco socialista. Após o fim da Guerra Fria, essa aliança passou por reestruturações e ampliou sua área de atuação, incluindo intervenções em diferentes partes do mundo.\nO texto faz referência',
 alts:['à Organização do Tratado de Segurança Coletiva.','à Organização Mundial do Comércio.','à Organização do Tratado do Atlântico Norte.','à Organização das Nações Unidas.','ao Pacto de Varsóvia.'],
 r:2,
 e:'A OTAN (Organização do Tratado do Atlântico Norte), criada em 1949 e liderada pelos EUA, reunia países capitalistas ocidentais em uma aliança de defesa mútua contra o bloco socialista; após a Guerra Fria, ampliou sua atuação global. As demais opções referem-se a organizações distintas (o Pacto de Varsóvia era a aliança do bloco socialista rival).',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O processo histórico que marcou a transição do trabalho escravo para o sistema de colonato e impulsionou a reorganização fundiária, especialmente com a ocupação de áreas do Sul do Brasil por imigrantes camponeses europeus, está associado com',
 alts:['a expansão pecuária no Centro-Sul.','a expansão cafeeira nos séculos XIX e início do XX.','o surto industrial brasileiro da Era Vargas.','o ciclo do ouro no século XVIII.','o ciclo da borracha na Amazônia.'],
 r:1,
 e:'A expansão cafeeira nos séculos XIX e início do XX impulsionou a substituição do trabalho escravo pelo sistema de colonato (com trabalhadores livres, muitos imigrantes europeus) e promoveu a reorganização fundiária associada à ocupação agrícola do Sul e Sudeste do Brasil. As demais alternativas referem-se a outros ciclos econômicos.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Corresponde ao tamanho das áreas produtivas de terra e de mar necessárias para gerar produtos, bens e serviços que sustentam determinados estilos de vida. Em outras palavras, trata-se de uma forma de traduzir, em hectares (ha), a extensão de território que uma pessoa ou toda uma sociedade utiliza, em média, para se sustentar. É, ainda, considerada uma metodologia de contabilidade ambiental que avalia o impacto do consumo sobre os recursos naturais.\nO texto aborda o conceito de',
 alts:['capacidade de carga ambiental.','desenvolvimento sustentável.','biocapacidade.','pegada ecológica.','sustentabilidade ambiental.'],
 r:3,
 e:'O conceito descrito — a área produtiva necessária para sustentar o consumo de uma pessoa ou sociedade, medida em hectares — é exatamente a definição de \'pegada ecológica\'. Os demais termos referem-se a conceitos correlatos, mas distintos.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'A floresta é responsável pela geração, por meio do processo de evapotranspiração, de grande parte da umidade disponível nela. Parte dessa umidade é carregada pelos ventos, provocando chuvas nos biomas Cerrado e Pantanal.\nEsse processo é também conhecido como',
 alts:['zona de convergência intertropical.','aquíferos porosos.','linhas de instabilidade.','ciclo hidrológico local.','rios voadores.'],
 r:4,
 e:'O fenômeno descrito, em que a umidade evapotranspirada pela floresta (principalmente a Amazônia) é transportada pelos ventos e provoca chuvas em outras regiões, é popularmente conhecido como \'rios voadores\'. As demais opções referem-se a fenômenos climáticos distintos.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Região de aproximadamente 400 mil quilômetros quadrados de área, sujeita a climas subtropicais úmidos de planaltos com invernos relativamente brandos. Em sua acepção mais ampla, coincide com o setor do Planalto Meridional brasileiro.\nO texto refere-se ao domínio morfoclimático:',
 alts:['araucárias.','caatinga.','mares de morros.','amazônico.','cerrado.'],
 r:0,
 e:'O domínio das araucárias (ou domínio dos pinhais) está localizado no Planalto Meridional brasileiro (região Sul), com clima subtropical úmido e área aproximada de 400 mil km², caracterizado pela vegetação de araucárias (pinheiro-do-paraná). Os demais domínios morfoclimáticos citados correspondem a outras regiões do Brasil.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Observe a tabela a seguir, elaborada a partir de dados do Instituto Nacional de Pesquisas Espaciais (INPE), acerca do número de queimadas no Brasil, e leia os textos:\n\nTexto 1 - Comparativo histórico de queimadas em agosto:\n2025: 18.451\n2024: 68.635\n2023: 28.054\n2022: 47.507\n2021: 51.711\n2020: 50.694\n2013: 21.410 (recorde anterior)\n(Gov. Adaptado)\n\nTexto 2:\nO Governo Federal afirma o aumento anual de 26% no número de brigadistas de órgãos federais, a ampliação em 75% da capacidade de transporte de agentes e a assinatura do decreto nº 12.189, que aumenta as punições por incêndios florestais no país.\n(CNN. Adaptado)\n\nCom base nas informações apresentadas nos dois textos, o resultado mostrado na tabela expressa uma',
 alts:['queda abrupta nas atividades agrícolas que costumam usar fogo controlado.','subnotificação forçada de incêndios por pressão política em regiões remotas.','mudança no regime de chuvas, cujo aumento recorde reduziu os focos de queimadas.','redução temporária das queimadas em razão do aumento de atividades agropecuárias.','efetividade ampliada nas ações de prevenção e combate ao fogo no país.'],
 r:4,
 e:'A queda expressiva no número de queimadas em agosto de 2025 (18.451, o menor valor da série apresentada) é explicada, conforme o Texto 2, pelo aumento de brigadistas, da capacidade de transporte de agentes e pelo endurecimento das punições contra incêndios florestais — ou seja, pela efetividade ampliada das ações de prevenção e combate ao fogo. As demais alternativas não são sustentadas pelos textos.',
 ano:2025},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Para enviar fotos de local de ocorrência ao setor de inteligência, o soldado criou uma nova mensagem no aplicativo de desktop MS-Outlook 2016, em sua configuração padrão, e clicou em Anexar arquivo, localizando D:\\Operacionais\\Fotos\\*.jpg. Ele selecionou três fotos de 9 MB cada, totalizando 27 MB de anexos. O servidor de e-mail da corporação possui uma política que define o limite máximo de tamanho de mensagem em 25 MB.\nCom base nesse cenário, o que acontece quando o usuário clicar no botão "Enviar"?',
 alts:['A mensagem é dividida automaticamente em múltiplas mensagens menores.','O e-mail é enviado normalmente, mas os anexos acima do limite são removidos automaticamente.','O Outlook converte automaticamente as imagens para o formato .png para reduzir o tamanho.','O setor de inteligência não recebe a mensagem devido ao tamanho dos anexos exceder o limite permitido.','As imagens são automaticamente compactadas pelo Outlook em .jpeg para caber no limite.'],
 r:3,
 e:'Como o total dos anexos (27 MB) excede o limite de 25 MB estabelecido pela política do servidor de e-mail, a mensagem será rejeitada e não chegará ao destinatário. O Outlook não divide mensagens, não remove anexos automaticamente, nem realiza conversão/compactação automática de imagens para contornar limites de tamanho.',
 ano:2025},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Durante a preparação de uma apresentação sobre as atividades do departamento, o usuário criou um slide no MS-PowerPoint 2016, em sua configuração padrão, com uma única caixa de texto contendo três parágrafos: "Ensino", "Pesquisa" e "Extensão". Ele aplica o efeito "Aparecer" (guia Animações) à caixa de texto e define "Iniciar": "Ao clicar". Para que cada parágrafo dessa mesma caixa de texto seja animado individualmente, um por clique, o assistente deve clicar no botão ___, na guia "Animações", e configurar a animação do texto como "Por Parágrafo".\nAssinale a alternativa que preenche corretamente a lacuna do texto.',
 alts:['Mais Trajetórias de Animação','Gatilho','Copiar Animação','Opções de Efeito','Adicionar Animação'],
 r:3,
 e:'O botão "Opções de Efeito", na guia Animações do PowerPoint 2016, permite configurar como o texto de uma caixa é animado, incluindo a opção "Por Parágrafo", que faz cada parágrafo ser animado individualmente a cada clique. As demais opções têm funções distintas e não controlam a sequência de animação por parágrafo.',
 ano:2025},

{c:'pmesp', m:'Noções de Adm. Pública', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Recentemente, em solenidade na Academia de Polícia Militar do Barro Branco, na capital paulista, o Governo do Estado de São Paulo oficializou a troca do Comando Geral da Polícia Militar. Para a nomeação a esse cargo, o oficial do Quadro de Oficiais Policiais Militares',
 alts:['pode estar na ativa ou na reserva.','precisa ter experiência prévia como Chefe da Casa Militar.','deve ocupar o último posto do referido quadro.','requer aprovação em escrutínio entre seus pares.','necessariamente integra o Tribunal de Justiça Militar Estadual.'],
 r:2,
 e:'O Comandante-Geral da Polícia Militar do Estado de São Paulo deve ser um oficial da ativa que ocupe o último posto do Quadro de Oficiais Policiais Militares (Coronel PM), sendo nomeado pelo Governador do Estado. As demais alternativas descrevem requisitos que não correspondem à legislação militar estadual.',
 ano:2025},

{c:'pmesp', m:'Noções de Adm. Pública', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Os direitos e garantias fundamentais, nos quais estão incluídos os direitos e deveres individuais e coletivos e os direitos políticos, são um conjunto de preceitos que buscam assegurar a dignidade da pessoa humana e que estão presentes na Constituição Federal brasileira de 1988. Frente ao exposto, é correto afirmar que',
 alts:['o conscrito pode alistar-se como eleitor, mas não como elegível, durante o período do serviço militar obrigatório.','é assegurada a prestação de assistência religiosa nas entidades civis, mas não militares, de internação coletiva.','é plena a liberdade de associação de caráter paramilitar, desde que tenha como objetivo fins lícitos.','é admitida prisão em caso de transgressão militar sem flagrante delito ou por ordem escrita e fundamentada de autoridade judiciária competente.','a ação de grupo armado militar contra a ordem constitucional e o Estado Democrático, apesar de ser um crime inafiançável, é prescritível.'],
 r:3,
 e:'O art. 5º, LXI, da Constituição Federal estabelece que ninguém será preso senão em flagrante delito ou por ordem escrita e fundamentada de autoridade judiciária competente, exceto nos casos de transgressão militar ou crime propriamente militar, hipóteses em que a prisão é admitida independentemente de flagrante ou de ordem judicial. As demais alternativas contrariam disposições constitucionais expressas: o conscrito não pode sequer alistar-se como eleitor durante o serviço militar obrigatório; a assistência religiosa é assegurada também em entidades militares de internação coletiva; associações paramilitares são vedadas independentemente da finalidade; e a ação de grupos armados contra a ordem constitucional é crime inafiançável e imprescritível.',
 ano:2025},
