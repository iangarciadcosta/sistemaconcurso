{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'As frases abaixo mostram um adjetivo sublinhado, com valor de ironia, à exceção de uma. Assinale-a.\n(A) O problema com nossos jovens escritores é que todos eles estão na faixa dos sessenta.\n(B) Fazer um filme é como ter sua mão pega numa máquina de moer carne. Na verdade, nem é tão agradável.\n(C) É muitíssimo prazeroso que caminhemos com os nossos pés sendo torturados pelos sapatos.\n(D) O bombeiro gostava muito de animais e sentiu-se confortável ao participar do salvamento do cavalo.\n(E) O treinador do Flamengo estava com cara de satisfeito após aquele empate com uma equipe adversária muito fraca.',
 alts:['O problema com nossos jovens escritores é que todos eles estão na faixa dos sessenta.','Fazer um filme é como ter sua mão pega numa máquina de moer carne. Na verdade, nem é tão agradável.','É muitíssimo prazeroso que caminhemos com os nossos pés sendo torturados pelos sapatos.','O bombeiro gostava muito de animais e sentiu-se confortável ao participar do salvamento do cavalo.','O treinador do Flamengo estava com cara de satisfeito após aquele empate com uma equipe adversária muito fraca.'],
 r:3,
 e:'As demais alternativas usam adjetivos de forma irônica (dizem o oposto do que realmente pensam, gerando humor crítico). A alternativa D é a única frase literal, sem ironia: descreve um fato direto e coerente (bombeiro gosta de animais e ajuda a salvar um cavalo).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Leia com atenção a seguinte frase:\n"Quanto mais sou obrigado a deixar recado com os filhos e empregadas de amigos, mais me apaixono por secretárias eletrônicas".\nPodemos deduzir do que aí está escrito que\n(A) os filhos e empregadas de amigos são bons transmissores de recados.\n(B) as secretárias eletrônicas são aparelhos de custo muito elevado.\n(C) as empregadas transmitem recados com rapidez e eficiência.\n(D) as secretárias eletrônicas são mais eficientes que os seres humanos.\n(E) a paixão pelas secretárias eletrônicas é proveniente de sua beleza e elegância.',
 alts:['os filhos e empregadas de amigos são bons transmissores de recados.','as secretárias eletrônicas são aparelhos de custo muito elevado.','as empregadas transmitem recados com rapidez e eficiência.','as secretárias eletrônicas são mais eficientes que os seres humanos.','a paixão pelas secretárias eletrônicas é proveniente de sua beleza e elegância.'],
 r:3,
 e:'O tom da frase é de frustração com intermediários humanos pouco confiáveis para recados, o que gera preferência crescente pelas secretárias eletrônicas — ou seja, elas são vistas como mais eficientes que as pessoas nessa tarefa. As demais alternativas contradizem ou distorcem esse sentido.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'A preposição DE mostra inúmeros valores semânticos, ou seja, muitos sentidos. Assinale a frase em que essa preposição tem seu valor corretamente indicado.\n(A) Com a inundação, o castelo, no alto do morro, ficou cercado de gente. / agente.\n(B) A chaleira de água quente ficou afastada das crianças. / continente.\n(C) Os quadros de Portinari valem muito. / propriedade.\n(D) As mulheres de classe são atraentes. / assunto.\n(E) Vieram de ônibus para a festa da matriz. / modo.',
 alts:['Com a inundação, o castelo, no alto do morro, ficou cercado de gente. / agente.','A chaleira de água quente ficou afastada das crianças. / continente.','Os quadros de Portinari valem muito. / propriedade.','As mulheres de classe são atraentes. / assunto.','Vieram de ônibus para a festa da matriz. / modo.'],
 r:0,
 e:'Em \'cercado de gente\', a preposição \'de\' indica o agente da ação de cercar (foi a gente que cercou o castelo) — valor de agente da passiva. Nas demais, o valor indicado entre barras não corresponde ao real sentido da preposição na frase (ex.: \'chaleira de água quente\' indica conteúdo, não continente; \'de classe\' indica qualidade, não assunto; \'de ônibus\' indica meio/instrumento, não modo).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Nas frases abaixo está presente a conjunção E. Assinale a frase em que o significado dessa conjunção está indicado corretamente.\n(A) Em muitos terrenos de cidades pequenas há simultaneamente plantas frutíferas e plantas ornamentais / oposição.\n(B) Algo só é impossível até que alguém duvide e acabe provando o contrário / consequência.\n(C) Ambiente limpo não é o que mais se limpa, e sim o que menos se suja / adição.\n(D) Há gente que fala e fala, mas nada diz / causa.\n(E) Os policiais chegam a suas casas e tiram o uniforme / conclusão.',
 alts:['Em muitos terrenos de cidades pequenas há simultaneamente plantas frutíferas e plantas ornamentais / oposição.','Algo só é impossível até que alguém duvide e acabe provando o contrário / consequência.','Ambiente limpo não é o que mais se limpa, e sim o que menos se suja / adição.','Há gente que fala e fala, mas nada diz / causa.','Os policiais chegam a suas casas e tiram o uniforme / conclusão.'],
 r:1,
 e:'Em B, \'duvide e acabe provando o contrário\' mostra uma relação de consequência (duvidar leva a provar o contrário). Nas demais, o valor indicado está errado: A mostra adição (não oposição), C mostra oposição/retificação (não adição), D e E mostram sequência temporal simples, não causa nem conclusão.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que o termo adverbial sublinhado foi adequadamente substituído por um advérbio equivalente.\n(A) A música deve vir antes de tudo (antecipadamente).\n(B) Viajar é estar constantemente emocionado – e nem sempre alegre (raramente)\n(C) Se você se parece com a sua fotografia do passaporte, sem dúvida (indubitavelmente) precisa viajar.\n(D) Os britânicos são invejosos porque eles não têm vinho, e lá chove o tempo todo (eternamente).\n(E) Veneza é como comer de uma só vez (totalmente) uma caixa inteira de bombons de licor.',
 alts:['A música deve vir antes de tudo (antecipadamente).','Viajar é estar constantemente emocionado – e nem sempre alegre (raramente)','Se você se parece com a sua fotografia do passaporte, sem dúvida (indubitavelmente) precisa viajar.','Os britânicos são invejosos porque eles não têm vinho, e lá chove o tempo todo (eternamente).','Veneza é como comer de uma só vez (totalmente) uma caixa inteira de bombons de licor.'],
 r:2,
 e:'\'Sem dúvida\' e \'indubitavelmente\' têm exatamente o mesmo sentido (certeza). Nas demais, a substituição muda o sentido original: \'antes de tudo\' não é \'antecipadamente\' (prioridade x tempo), \'nem sempre\' não é \'raramente\', \'o tempo todo\' não é \'eternamente\' (frequência x duração), \'de uma só vez\' não é \'totalmente\' (modo x intensidade).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'"Salve, lindo pendão da esperança,\nSalve, símbolo augusto da paz!\nTua nobre presença à lembrança\nA grandeza da Pátria nos traz."\nEsses são os quatro primeiros versos do nosso conhecido Hino à Bandeira. Assinale a afirmação correta sobre a estruturação ou significação desses versos.\n(A) Os versos exploram as cores simbólicas da bandeira.\n(B) Por seu nacionalismo, a mensagem desses versos se relaciona ao movimento Barroco.\n(C) A letra do hino opõe aspectos positivos e negativos de nosso país.\n(D) Os termos "pendão" e "símbolo" se referem a nossa bandeira.\n(E) A ordem direta dos dois últimos versos seria: A grandeza da pátria nos traz tua nobre presença à lembrança.',
 alts:['Os versos exploram as cores simbólicas da bandeira.','Por seu nacionalismo, a mensagem desses versos se relaciona ao movimento Barroco.','A letra do hino opõe aspectos positivos e negativos de nosso país.','Os termos "pendão" e "símbolo" se referem a nossa bandeira.','A ordem direta dos dois últimos versos seria: A grandeza da pátria nos traz tua nobre presença à lembrança.'],
 r:3,
 e:'\'Pendão\' (estandarte) e \'símbolo\' são ambos referências diretas à bandeira nacional, tratada de forma solene no hino. O nacionalismo exaltado remete ao Romantismo, não ao Barroco (B errada); não há cores nem oposições descritas nos versos (A e C erradas); a ordem direta correta seria \'Tua nobre presença traz à lembrança a grandeza da Pátria\' (E errada).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que a oração adjetiva sublinhada foi substituída por um adjetivo semanticamente inadequado.\n(A) Esta terra é de tal maneira graciosa que se dará nela tudo por causa das águas que tem / disponíveis.\n(B) O Rio de Janeiro é a única cidade das que conheço que não conseguiu expulsar a natureza. / visitadas.\n(C) Os Estados Unidos são um Itu que deu certo. / bem-sucedido.\n(D) O maior prazer, durante o período de viagens, é o dos criados que permanecem em casa / domésticos.\n(E) O caminho é o que importa, não o seu fim. / importante.',
 alts:['Esta terra é de tal maneira graciosa que se dará nela tudo por causa das águas que tem / disponíveis.','O Rio de Janeiro é a única cidade das que conheço que não conseguiu expulsar a natureza. / visitadas.','Os Estados Unidos são um Itu que deu certo. / bem-sucedido.','O maior prazer, durante o período de viagens, é o dos criados que permanecem em casa / domésticos.','O caminho é o que importa, não o seu fim. / importante.'],
 r:1,
 e:'Em B, \'das que conheço\' (conhecidas) foi trocado por \'visitadas\', o que altera o sentido original: conhecer uma cidade não é o mesmo que tê-la visitado. Nas demais alternativas, a substituição preserva o sentido da oração original.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Cada opção abaixo traz uma pequena frase e uma possível interpretação dela. Assinale a frase que mostra uma interpretação adequada.\n(A) "Meus pais foram doidos ao ensinar-me as primeiras letras". / A doidice está no fato de que os pais preferiram o ensino doméstico ao ensino na escola.\n(B) "A ciência não tem pátria". / Isso significa que o conhecimento científico deve pertencer ao mundo inteiro e não somente à pátria do cientista.\n(C) "A informática veio para resolver problemas que antes não existiam". / A frase mostra que a informática resolve todos os problemas atuais.\n(D) "De erro em erro descobre-se a verdade inteira." / A frase critica as pesquisas que cometem muitos erros.\n(E) "Não há mestre que não possa ser aluno." / A afirmação critica os professores que não têm conhecimento do que ensinam.',
 alts:['"Meus pais foram doidos ao ensinar-me as primeiras letras". / A doidice está no fato de que os pais preferiram o ensino doméstico ao ensino na escola.','"A ciência não tem pátria". / Isso significa que o conhecimento científico deve pertencer ao mundo inteiro e não somente à pátria do cientista.','"A informática veio para resolver problemas que antes não existiam". / A frase mostra que a informática resolve todos os problemas atuais.','"De erro em erro descobre-se a verdade inteira." / A frase critica as pesquisas que cometem muitos erros.','"Não há mestre que não possa ser aluno." / A afirmação critica os professores que não têm conhecimento do que ensinam.'],
 r:1,
 e:'A interpretação de B é a única fiel ao sentido da frase original: \'a ciência não tem pátria\' expressa que o conhecimento científico é universal, pertence a toda a humanidade. As demais distorcem o sentido das frases (C, por exemplo, inverte o sentido irônico do enunciado original, que sugere que a informática cria tantos problemas quanto resolve).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que houve substituição adequada do vocábulo sublinhado por um sinônimo.\n(A) Um provérbio é uma sentença curta baseada em longa experiência / afirmação.\n(B) A harmonia das cores reside no princípio de seu eficiente contato com a alma humana / conciliação.\n(C) Não procurem qualquer nexo naquilo que os poetas pronunciam acordados / coerência.\n(D) Sou artista, moro entre as minhas pinturas. Escrever é um luxo para mim / excesso.\n(E) A arte é a trilha que leva de volta, da fantasia à realidade / via férrea.',
 alts:['Um provérbio é uma sentença curta baseada em longa experiência / afirmação.','A harmonia das cores reside no princípio de seu eficiente contato com a alma humana / conciliação.','Não procurem qualquer nexo naquilo que os poetas pronunciam acordados / coerência.','Sou artista, moro entre as minhas pinturas. Escrever é um luxo para mim / excesso.','A arte é a trilha que leva de volta, da fantasia à realidade / via férrea.'],
 r:2,
 e:'\'Nexo\' equivale a \'coerência\' (ligação lógica entre ideias), substituição correta. Nas demais, o termo proposto muda o sentido: \'sentença\' (máxima) não é \'afirmação\' genérica; \'princípio\' não é \'conciliação\'; \'luxo\' não é \'excesso\'; \'trilha\' (caminho) não é \'via férrea\' (ferrovia).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'As frases abaixo mostram erros, ora de seleção vocabular, ora de informação, à exceção de uma. Assinale-a.\n(A) Na Bahia todo mundo é simpático. É um povo muito hospitalar.\n(B) Este disco foi gravado à base de muita cerveja. Foram quilos.\n(C) Estou louca para ir para Nova Iorque. Eu sempre quis conhecer a Europa.\n(D) Um abraço a todos os goianos de Juiz de Fora.\n(E) Bons leitores extraem muito de pouco.',
 alts:['Na Bahia todo mundo é simpático. É um povo muito hospitalar.','Este disco foi gravado à base de muita cerveja. Foram quilos.','Estou louca para ir para Nova Iorque. Eu sempre quis conhecer a Europa.','Um abraço a todos os goianos de Juiz de Fora.','Bons leitores extraem muito de pouco.'],
 r:4,
 e:'A: erro vocabular (\'hospitalar\' deveria ser \'hospitaleiro\'). B: erro de informação (cerveja, líquida, não se mede em \'quilos\'). C: erro de informação (Nova Iorque fica nos EUA, não na Europa). D: erro de informação (Juiz de Fora é cidade de Minas Gerais, não de Goiás). Só E está livre de erros.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase cujo adjetivo mostra o grau em que está empregado classificado corretamente.\n(A) O melhor amigo do homem é o uísque. O uísque é o cachorro engarrafado. / Superlativo relativo de superioridade.\n(B) Nada custa tão caro como ser pobre. / Superlativo absoluto analítico.\n(C) Um sorriso é a distância mais curta entre duas pessoas. / Comparativo de superioridade.\n(D) Todas as pessoas são imensamente iguais. / Comparativo de igualdade.\n(E) Nosso país é menos rico do que todos os demais. / Superlativo relativo de inferioridade.',
 alts:['O melhor amigo do homem é o uísque. O uísque é o cachorro engarrafado. / Superlativo relativo de superioridade.','Nada custa tão caro como ser pobre. / Superlativo absoluto analítico.','Um sorriso é a distância mais curta entre duas pessoas. / Comparativo de superioridade.','Todas as pessoas são imensamente iguais. / Comparativo de igualdade.','Nosso país é menos rico do que todos os demais. / Superlativo relativo de inferioridade.'],
 r:0,
 e:'\'O melhor\' é, de fato, superlativo relativo de superioridade (o mais bom dentro de um grupo). As demais classificações estão erradas: B usa \'tão... como\', que é comparativo de igualdade, não superlativo absoluto; C usa forma superlativa (\'a mais curta\'), não comparativa; D usa advérbio de intensidade, não grau comparativo; E usa \'menos... do que\', estrutura comparativa, não superlativa.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que a oração substantiva sublinhada foi substituída por uma forma substantiva semanticamente inadequada.\n(A) Decidi sair do jogo enquanto estou com a bola, em vez de esperar que ela me escape / a sua escapada.\n(B) Reconheço que uma obra está terminada quando chega a hora do jantar/ o término de uma obra.\n(C) Espero que a passeata comece e termine em paz / começo e fim pacíficos para a passeata.\n(D) A empresa promete que a entrega se fará rapidamente / uma entrega rápida.\n(E) Ele gostaria de que todos viessem à festa /da chegada de todos à festa.',
 alts:['Decidi sair do jogo enquanto estou com a bola, em vez de esperar que ela me escape / a sua escapada.','Reconheço que uma obra está terminada quando chega a hora do jantar/ o término de uma obra.','Espero que a passeata comece e termine em paz / começo e fim pacíficos para a passeata.','A empresa promete que a entrega se fará rapidamente / uma entrega rápida.','Ele gostaria de que todos viessem à festa /da chegada de todos à festa.'],
 r:4,
 e:'Em E, \'que todos viessem à festa\' (desejo de que as pessoas venham) foi trocado por \'da chegada de todos à festa\', que pressupõe que a chegada já aconteceu ou é um fato dado, alterando o sentido de desejo/expectativa da frase original. Nas demais, a substituição preserva o sentido.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Observe a seguinte frase:\n"Uma acumulação de fatos não é uma ciência, da mesma forma que uma porção de pedras não é uma casa".\nDois termos que são comparados nessa frase, são:\n(A) acumulação de fatos / ciência.\n(B) fatos / pedras.\n(C) acumulação / casa.\n(D) ciência / porção.\n(E) pedras / casa.',
 alts:['acumulação de fatos / ciência.','fatos / pedras.','acumulação / casa.','ciência / porção.','pedras / casa.'],
 r:1,
 e:'A frase compara, por analogia, \'fatos\' (elementos soltos) com \'pedras\' (elementos soltos): assim como pedras sozinhas não formam uma casa, fatos sozinhos não formam uma ciência. O paralelismo direto da comparação está entre os elementos brutos: fatos e pedras.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'O prefixo peta aplicado a qualquer unidade significa 2^50 vezes essa unidade. Sabe-se que o Google processa cerca de 24 petabytes de informação por dia.\nUtilizando a aproximação 2^10 ≅ 10^3, o número de bytes de informação que o Google processa por dia possui\n(A) 15 algarismos.\n(B) 16 algarismos.\n(C) 17 algarismos.\n(D) 18 algarismos.\n(E) 19 algarismos.',
 alts:['15 algarismos.','16 algarismos.','17 algarismos.','18 algarismos.','19 algarismos.'],
 r:2,
 e:'24 petabytes = 24 × 2^50 bytes. Como 2^50 = (2^10)^5 ≅ (10^3)^5 = 10^15, temos 24 × 10^15 = 2,4 × 10^16, um número entre 10^16 e 10^17, ou seja, com 17 algarismos.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Quatro pessoas estão em um elevador. A média aritmética dos pesos dessas quatro pessoas é 85 kg, e a mais pesada entre elas pesa 100 kg. A pessoa mais pesada sai do elevador e duas pessoas, de 50 kg cada uma, entram no elevador.\nA nova média dos pesos das pessoas que agora estão no elevador é:\n(A) igual à média anterior.\n(B) 13 kg menor que a média anterior.\n(C) 15 kg menor que a média anterior.\n(D) 17 kg menor que a média anterior.\n(E) 19 kg menor que a média anterior.',
 alts:['igual à média anterior.','13 kg menor que a média anterior.','15 kg menor que a média anterior.','17 kg menor que a média anterior.','19 kg menor que a média anterior.'],
 r:3,
 e:'Soma inicial: 4×85=340kg. Retirando a pessoa de 100kg: sobram 240kg (3 pessoas). Entram 2 pessoas de 50kg: soma final = 240+100=340kg, agora com 5 pessoas. Nova média = 340/5=68kg. Diferença: 85-68=17kg a menos.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Um terreno tem a forma de um quadrilátero ABCD em que os ângulos de vértices A e D são retos. São dadas as medidas de três lados: AB = 30 m, BC = 20 m e CD = 18 m.\nA área desse terreno em metros quadrados é igual a\n(A) 360.\n(B) 384.\n(C) 418.\n(D) 436.\n(E) 460.',
 alts:['360.','384.','418.','436.','460.'],
 r:1,
 e:'Como os ângulos em A e D são retos, ABCD é um trapézio retângulo com AB e CD paralelos e AD como altura. Colocando A=(0,0), B=(30,0), D=(0,h), C=(18,h): a distância BC=20 dá (30-18)²+h²=20² → 144+h²=400 → h=16. Área do trapézio = (AB+CD)/2 × h = (30+18)/2 × 16 = 24×16 = 384.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'João, Carlos, Pedro, Manoel e Francisco estão sentados em torno de uma mesa hexagonal regular e um lugar ficou vazio.\nSabe-se que:\n• Pedro é o vizinho à esquerda de Carlos.\n• Carlos não está em lugar oposto a Francisco.\n• João é o vizinho à direita de Manoel.\n• O lugar à direita de Francisco está vazio.\nAssim, é correto afirmar que\n(A) o lugar à esquerda de Pedro não está vazio.\n(B) Manoel está em lugar oposto a Pedro.\n(C) O vizinho à direita de Carlos é João.\n(D) Pedro e Francisco estão em lugares opostos.\n(E) o vizinho à direita de João não é Pedro.',
 alts:['o lugar à esquerda de Pedro não está vazio.','Manoel está em lugar oposto a Pedro.','O vizinho à direita de Carlos é João.','Pedro e Francisco estão em lugares opostos.','o vizinho à direita de João não é Pedro.'],
 r:0,
 e:'As pistas formam 3 blocos de vizinhos consecutivos: (Pedro,Carlos), (Manoel,João) e (Francisco,vazio). Testando as duas formas de encaixar esses blocos nos 6 lugares, só uma respeita \'Carlos não oposto a Francisco\': Pedro, Carlos, Francisco, vazio, Manoel, João (em sequência). Nessa disposição, o vizinho à esquerda de Pedro é João (ocupado, não vazio) — alternativa A correta. As demais contradizem o arranjo (o oposto de Carlos é Manoel, o vizinho à direita de Carlos é Francisco, o oposto de Pedro é o lugar vazio, e o vizinho à direita de João é justamente Pedro).',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Seja p/q = 1/3 + 2/5 − 3/8, em que p e q são primos entre si, isto é, a fração p/q está em sua forma irredutível.\nO valor de p + q é\n(A) 0.\n(B) 11.\n(C) 77.\n(D) 85.\n(E) 163.',
 alts:['0.','11.','77.','85.','163.'],
 r:4,
 e:'MMC(3,5,8)=120. 1/3=40/120, 2/5=48/120, 3/8=45/120. Soma: 40+48-45=43/120. Como 43 é primo e não divide 120, a fração já é irredutível: p=43, q=120. p+q=163.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Em uma urna há 4 bolas numeradas, cada uma com um número inteiro positivo. Sabe-se que a soma dos 4 números é par e que o produto dos 4 números também é par.\nNesse caso, é correto concluir que\n(A) nenhuma bola tem número par.\n(B) exatamente uma bola tem número par.\n(C) exatamente uma bola tem número ímpar.\n(D) no mínimo duas bolas têm números pares.\n(E) no mínimo duas bolas têm números ímpares.',
 alts:['nenhuma bola tem número par.','exatamente uma bola tem número par.','exatamente uma bola tem número ímpar.','no mínimo duas bolas têm números pares.','no mínimo duas bolas têm números ímpares.'],
 r:3,
 e:'Produto par exige ao menos 1 número par. Soma par exige uma quantidade par de números ímpares (0, 2 ou 4 ímpares). Se houvesse 4 ímpares, o produto seria ímpar (contradição). Então só restam os casos de 0 ou 2 números ímpares, ou seja, 4 ou 2 números pares — em qualquer caso, no mínimo duas bolas têm números pares.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Leia as seguintes afirmativas sobre as origens da Guerra Fria.\nI. A causa fundamental da Guerra Fria foi a ambição doentia de Stalin, a sua determinação em buscar segurança de tal modo que restava pouca ou nenhuma segurança para os demais atores da arena internacional. Uma causa secundária foi o fracasso ocidental por não agir suficientemente cedo para barrar Stalin.\nAdaptado de: GADDIS, John Lewis. The emerging post-revisionist synthesis on the origins of the Cold War. Diplomatic History, vol. 7, n 3,1983, p. 176.\nII. A Guerra Fria poderia ter sido evitada somente se a União Soviética não tivesse sido possuída por convicções tanto da infalibilidade da palavra comunista como da inevitabilidade do mundo comunista. Estas convicções transformaram um impasse entre Estados nacionais numa guerra religiosa, uma tragédia de possibilidade numa de necessidade. Poderíamos desejar que os Estados Unidos tivessem preservado o equilíbrio e a proporção dos primeiros anos da Guerra Fria e não tivesse sucumbido com o tempo às suas próprias formas de justiça própria. Mas a mais racional das políticas americanas dificilmente poderia ter evitado a Guerra Fria.\nAdaptado de: Schlesinger, Arthur. Origins of the Cold War, Foreign Affairs, Oct., 1967, Vol. 46, No. 1, 1967, p. 52.\nIII. Especialmente depois da criação e utilização da bomba atómica, a atitude dos Estados Unidos deixou aos soviéticos apenas uma opção real: ou aquiescer às propostas estadunidenses ou ser confrontados com o poder e a hostilidade estadunidense. Foi a decisão dos Estados Unidos empregar o seu novo e impressionante poder de acordo com a tradicional Política de Portas Abertas que cristalizou a guerra fria. Dizer isto não significa dizer que os Estados Unidos iniciaram ou causaram a guerra fria. A verdadeira questão é muito mais sútil: qual lado comprometeu o seu poder com políticas que endureceram as tensões e propensões naturais e inerentes a antagonismos amargos e posições inflexíveis. Os Estados Unidos tiveram, de 1944 a pelo menos 1962, uma vasta preponderância de poder real e potencial em relação à União Soviética.\nAdaptado de: Williams, William. The tragedy of American Diplomacy, New York: Dell Publishing Co, 1972, pp. 206-207.\nAssinale a afirmativa que menciona corretamente as diferentes interpretações do evento histórico apresentadas nos trechos citados.\n(A) O trecho I atribui à União Soviética a responsabilidade pela gênese da Guerra Fria, devido à sua política expansionista influenciada pelo marxismo, enquanto os trechos II e III enfatizam o imperialismo estadunidense como o fator desencadeador dos conflitos.\n(B) Os trechos I e II acreditam que a ideologia soviética provocou uma resposta dos Estados Unidos, dando origem à Guerra Fria, enquanto o trecho III destaca a agressividade da política externa norte-americana em relação aos russos.\n(C) O trecho II argumenta que o desgaste sofrido pela União Soviética após a Segunda Guerra Mundial impossibilitava atribuir-lhe a responsabilidade pelo início da Guerra Fria, enquanto os trechos I e III destacam suas capacidades bélicas.\n(D) O trecho III enfatiza o poder hegemônico dos Estados Unidos em relação aos soviéticos, enquanto os trechos I e II criticam a ambição estadunidense de impor uma nova ordem mundial por meio do sistema econômico capitalista.\n(E) Os trechos I, II e III atribuem a responsabilidade pela origem do conflito aos interesses soviéticos, que se manifestavam por meio da coerção e imposição bélica sobre outros países para exercer sua influência.',
 alts:['O trecho I atribui à União Soviética a responsabilidade pela gênese da Guerra Fria, devido à sua política expansionista influenciada pelo marxismo, enquanto os trechos II e III enfatizam o imperialismo estadunidense como o fator desencadeador dos conflitos.','Os trechos I e II acreditam que a ideologia soviética provocou uma resposta dos Estados Unidos, dando origem à Guerra Fria, enquanto o trecho III destaca a agressividade da política externa norte-americana em relação aos russos.','O trecho II argumenta que o desgaste sofrido pela União Soviética após a Segunda Guerra Mundial impossibilitava atribuir-lhe a responsabilidade pelo início da Guerra Fria, enquanto os trechos I e III destacam suas capacidades bélicas.','O trecho III enfatiza o poder hegemônico dos Estados Unidos em relação aos soviéticos, enquanto os trechos I e II criticam a ambição estadunidense de impor uma nova ordem mundial por meio do sistema econômico capitalista.','Os trechos I, II e III atribuem a responsabilidade pela origem do conflito aos interesses soviéticos, que se manifestavam por meio da coerção e imposição bélica sobre outros países para exercer sua influência.'],
 r:1,
 e:'Os trechos I e II atribuem a origem da Guerra Fria à ideologia/ambição soviética (Stalin e a crença na inevitabilidade comunista), o que provocou reação ocidental. Já o trecho III inverte a ênfase, destacando como o uso agressivo do poderio americano (Política de Portas Abertas, bomba atômica) cristalizou o conflito. Essa é a leitura correta apresentada na alternativa B.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'"Não seria a primeira vez que políticos e intelectuais vinculados a um novo momento atribuiriam a si mesmos os méritos da novidade e jogariam para outro período, em geral o imediatamente anterior, a designação de "ultrapassado". Novos momentos tendem a enxergar o passado a partir de lentes de curto alcance que deformam, e selecionam, tendo um ponto de vista ressaltado: o seu. Esse seria o caso da Revolução de 1930 e do Estado que foi logo autodesignado como "Novo": Estado Novo. Segundo essa visão, caberia só ao futuro o estabelecimento de uma verdadeira res publica, e a introdução de uma realidade social, moral e política deveras moderna."\nFonte: Schwarcz, Lilia; Starling, Heloisa. Brasil: Uma Biografia, São Paulo: Companhia das Letras, 2015, p. 523.\nA respeito das motivações que levaram à Revolução de 1930, assinale a afirmativa correta.\n(A) A reação foi contra a indicação do presidente da República em exercício de seu sucessor, que priorizava o fortalecimento econômico paulista por meio da expansão das exportações de café.\n(B) A reação começou com o descontentamento do setor popular em relação à alternância de governo que favorecia apenas as oligarquias cafeicultoras.\n(C) A reação surgiu contra a reforma eleitoral proposta pelo presidente da República, que eliminava o voto secreto, como medida para favorecer sua reeleição.\n(D) A reação surgiu contra a integração de setores militares na política republicana, em meio à crescente onda liberal de ampliação política.\n(E) A reação, limitada à região Sudeste do Brasil, onde se concentravam as maiores oligarquias cafeicultoras, advogava a favor da supressão do arranjo político vigente, que previa os privilégios paulistas.',
 alts:['A reação foi contra a indicação do presidente da República em exercício de seu sucessor, que priorizava o fortalecimento econômico paulista por meio da expansão das exportações de café.','A reação começou com o descontentamento do setor popular em relação à alternância de governo que favorecia apenas as oligarquias cafeicultoras.','A reação surgiu contra a reforma eleitoral proposta pelo presidente da República, que eliminava o voto secreto, como medida para favorecer sua reeleição.','A reação surgiu contra a integração de setores militares na política republicana, em meio à crescente onda liberal de ampliação política.','A reação, limitada à região Sudeste do Brasil, onde se concentravam as maiores oligarquias cafeicultoras, advogava a favor da supressão do arranjo político vigente, que previa os privilégios paulistas.'],
 r:0,
 e:'A Revolução de 1930 teve como estopim a indicação de Júlio Prestes (São Paulo) como sucessor de Washington Luís, rompendo o acordo da política \'café com leite\' com Minas Gerais e mantendo o predomínio paulista ligado à economia cafeeira exportadora — o que uniu a oposição na Aliança Liberal.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Analise as afirmativas a seguir, que descrevem os movimentos sociais de resistência ao regime militar brasileiro, e assinale (V) para a verdadeira e (F) para a falsa.\n( ) A Vanguarda Popular Revolucionária (VPR) foi uma organização guerrilheira formada por alguns dissidentes do Movimento Nacionalista Revolucionário (MNR). Seus membros incluíam estudantes, operários e, inclusive, militares desertores.\n( ) A guerrilha do Araguaia, centrada na área rural, foi liderada por integrantes do Partido Comunista do Brasil (PCdoB) e contou com o apoio da população que residia na confluência dos estados do Pará, do Maranhão e do Tocantins.\n( ) A Ação Libertadora Nacional (ALN) se conformou a partir de uma dissidência do Partido Comunista Brasileiro (PCB) e tinha como característica a crença na via eleitoral e pacífica como forma de derrubar o governo militar.\nAs afirmativas são, respectivamente,\n(A) V – V – F.\n(B) V – F – V.\n(C) F – F – V.\n(D) F – V – F.\n(E) V – V – V.',
 alts:['V – V – F.','V – F – V.','F – F – V.','F – V – F.','V – V – V.'],
 r:0,
 e:'As duas primeiras afirmativas são verdadeiras (VPR formada por dissidentes, incluindo desertores militares; guerrilha do Araguaia liderada pelo PCdoB na confluência PA-MA-TO). A terceira é falsa: a ALN, fundada por Carlos Marighella, defendia a luta armada, e não a via eleitoral e pacífica. Logo, V – V – F.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Censo 2022: o número de pessoas com 65 anos ou mais cresceu 57,4% em 12 anos.\nDisponível em: https://agenciadenoticias.ibge.gov.br Acesso: 28 abr.2024\nSobre o resultado apresentado na notícia, julgue as afirmativas a seguir:\nI. Comprova a diminuição no ritmo do crescimento populacional.\nII. Demonstra a necessidade de políticas públicas para a população idosa.\nIII. Evidencia a redução da população economicamente inativa do país.\nEstá correto o que se afirma em\n(A) I, apenas.\n(B) I e II, apenas.\n(C) I e III, apenas.\n(D) II e III, apenas.\n(E) I, II e III.',
 alts:['I, apenas.','I e II, apenas.','I e III, apenas.','II e III, apenas.','I, II e III.'],
 r:4,
 e:'O forte crescimento da população idosa (65+) é reflexo direto da queda da fecundidade/natalidade, sinalizando desaceleração do crescimento populacional (I) e reforçando a urgência de políticas públicas voltadas aos idosos, como saúde e previdência (II). A mudança na estrutura etária também reflete alterações na composição da população economicamente inativa do país (III), tema associado ao envelhecimento populacional avaliado pelo Censo.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Punk da Periferia\n"Das feridas\nQue a pobreza cria\nSou o pus\nSou o que de resto\nRestaria aos urubus\nPus por isso mesmo\nEste blusão carniça\nFiz no rosto\nEste make-up pó caliça\nQuis trazer assim\nNossa desgraça à luz...\nSou um punk da periferia\nSou da Freguesia do Ó\nÓ! Ó Ó Ó Ó Ó Ó Ó!\nAqui pra vocês!\nSou da Freguesia..."\nGILBERTO GIL. Punk da periferia. Rio de Janeiro: Warner Music Brasil, 1983. Disponível em: https://www.letras.mus.br/gilberto-gil/16135/. Acesso: 23 de abril de 2024\nUma característica do espaço urbano, a qual a letra da canção remete é a\n(A) centralização do poder.\n(B) eficiência na infraestrutura.\n(C) desigualdade no valor dos terrenos.\n(D) existência da autossegregação espacial.\n(E) ausência de territórios antropológicos.',
 alts:['centralização do poder.','eficiência na infraestrutura.','desigualdade no valor dos terrenos.','existência da autossegregação espacial.','ausência de territórios antropológicos.'],
 r:2,
 e:'A letra retrata a pobreza e a marginalização da periferia (Freguesia do Ó), remetendo à desigualdade socioespacial urbana, que se reflete diretamente na desigualdade do valor da terra entre centro e periferia — áreas periféricas, historicamente menos valorizadas, concentram a população mais pobre.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Ao tratar das memórias do rio Tietê, a Secretaria do Meio Ambiente, Infraestrutura e Logística do governo do Estado de São Paulo diz: "Ao longo de suas curvas sinuosas que atravessam 62 municípios, em seus mais de mil e cem quilômetros de extensão, a história se entrelaça e traz um profundo impacto na vida de muitas pessoas (...), que assim como o rio de água doce, fluem e se misturam."\nDisponível em: https://semil.sp.gov.br. Acesso: 21 abr. 2024.\nSobre o rio em questão, avalie as afirmativas a seguir.\nI. Consiste num regulador térmico ao longo de toda a extensão de suas margens.\nII. Constitui fonte de renda, alimentação e produção de energia hidrelétrica para moradores de várias cidades do Estado de São Paulo.\nIII. Teve parte da metrópole paulista construída sobre sua planície de inundação, passando por diferentes tipos de transformações e problemas.\nEstá correto o que se afirma em\n(A) I, apenas.\n(B) I e II, apenas.\n(C) II e III, apenas.\n(D) I e III, apenas.\n(E) I, II e III.',
 alts:['I, apenas.','I e II, apenas.','II e III, apenas.','I e III, apenas.','I, II e III.'],
 r:4,
 e:'Todas as afirmativas são corretas: rios funcionam como reguladores térmicos de seu entorno (I); o Tietê sustenta pesca, abastecimento e diversas usinas hidrelétricas ao longo do seu curso (II); e a metrópole de São Paulo, historicamente, ocupou a planície de inundação do rio, gerando enchentes e outros problemas urbanos (III).',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'"O território tanto quanto o lugar são esquizofrênicos, porque de um lado acolhem os vetores da globalização, que neles se instalam para impor sua nova ordem, e, de outro lado, neles se produz uma contraordem, porque há uma produção acelerada de pobres, excluídos, marginalizados."\nSANTOS, Milton. Por uma outra globalização: do pensamento único à consciência universal. Rio de Janeiro: Record, 2000. p.55-56\nSobre o momento da globalização na visão do autor, avalie se as afirmativas a seguir são verdadeiras (V) ou falsas (F).\n( ) A designação de países do Norte e do Sul remete a uma divisão baseada em níveis de desenvolvimento e qualidade de vida, sendo estes países denominados respectivamente de centrais e semiperiféricos ou periféricos.\n( ) Na atual etapa do século XXI as novas tecnologias do mundo globalizado conseguem superar as antigas desigualdades verificadas no início deste processo em diferentes escalas.\n( ) A evolução dos meios de transporte e comunicação, somada aos acordos econômicos e à exploração da mão de obra barata, possibilitou a oferta de produtos estrangeiros tradicionais e modernos, com preços atrativos em boa parte dos países do planeta.\nAs afirmativas são, respectivamente,\n(A) V – F – V.\n(B) V – V – V.\n(C) V – V – F.\n(D) F – F – V.\n(E) V – F – F.',
 alts:['V – F – V.','V – V – V.','V – V – F.','F – F – V.','V – F – F.'],
 r:0,
 e:'A primeira é verdadeira (Norte=países centrais/desenvolvidos, Sul=periféricos/semiperiféricos). A segunda é falsa: para Milton Santos, a globalização, ao contrário, aprofunda as desigualdades (\'produção acelerada de pobres, excluídos\'), não as supera. A terceira é verdadeira: transporte, comunicação, acordos econômicos e mão de obra barata realmente popularizaram produtos globais a preços acessíveis. Logo, V – F – V.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'SP EXPANDE PRODUTIVIDADE DA CANA-DE-AÇÚCAR\nSão Paulo lidera a produção sucroalcooleira no Brasil, que é o maior produtor mundial. Nos sete primeiros meses de 2023, o setor liderou as exportações no agro paulista.\nDisp. em: https://www.agricultura.sp.gov.br Acesso: 20 abr.2024 (Adap.)\nAvalie se os seguintes fatores justificam a posição do estado de São Paulo, apresentada na notícia:\nI. A existência de uma infraestrutura logística, com modais de transporte abundantes e variados.\nII. A presença de importantes instituições de pesquisa e desenvolvimento tecnológico, voltadas para o setor agroindustrial.\nIII. A topografia adequada ao processo de mecanização padronizada, desde o preparo do solo até a colheita.\nEstá correto o que se afirma em\n(A) I, apenas.\n(B) II, apenas.\n(C) I e II, apenas.\n(D) I e III, apenas.\n(E) I, II e III.',
 alts:['I, apenas.','II, apenas.','I e II, apenas.','I e III, apenas.','I, II e III.'],
 r:4,
 e:'Os três fatores realmente explicam a liderança paulista: infraestrutura logística diversificada (rodovias, ferrovias, portos), instituições de pesquisa agroindustrial de destaque (como IAC e universidades) e relevo predominantemente plano do interior paulista, favorável à mecanização agrícola em larga escala.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'A brasileira Rebeca Andrade conseguiu uma impressionante medalha de ouro nos últimos Jogos Pan-Americanos, em Santiago, Chile. Para esse resultado, a atleta teve de superar inclusive a campeã americana Simone Biles.\nFonte: g1 https://encurtador.com.br/cvAFI\nEsse feito se deu em uma das modalidades\n(A) do atletismo.\n(B) da natação.\n(C) dos esportes coletivos.\n(D) da ginástica artística.\n(E) do remo.',
 alts:['do atletismo.','da natação.','dos esportes coletivos.','da ginástica artística.','do remo.'],
 r:3,
 e:'Rebeca Andrade é uma ginasta, referência mundial na ginástica artística, modalidade em que superou a norte-americana Simone Biles nos Jogos Pan-Americanos de Santiago.',
 ano:2024},

{c:'pmesp', m:'Noções de Informática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Com base no uso do correio eletrônico, avalie as afirmações abaixo:\nI. O campo Cc (Cópia Carbono) é utilizado para enviar uma cópia do e-mail para outros destinatários sem que os destinatários principais ou outros destinatários Cc vejam que a cópia foi enviada.\nII. O campo Cco (Cópia Carbono Oculta) é utilizado para enviar uma cópia do e-mail para outros destinatários além do destinatário principal, e todos os destinatários podem ver quem recebeu a cópia.\nIII. Para enviar anexos, é importante verificar o tamanho dos arquivos e os limites do serviço de correio eletrônico, de modo a garantir que o e-mail seja entregue corretamente.\nEstá correto o que se afirma em\n(A) I, apenas.\n(B) II, apenas.\n(C) III, apenas.\n(D) I e III, apenas.\n(E) I, II e III.',
 alts:['I, apenas.','II, apenas.','III, apenas.','I e III, apenas.','I, II e III.'],
 r:2,
 e:'I é falsa: no campo Cc, todos os destinatários (principais e em cópia) veem quem recebeu a cópia — é o Cco que é oculto, não o Cc. II é falsa pelo motivo inverso: o Cco é justamente o campo que oculta dos demais quem recebeu a cópia. III é verdadeira: é preciso respeitar limites de tamanho de anexos do serviço de e-mail. Logo, apenas III.',
 ano:2024},

{c:'pmesp', m:'Noções de Adm. Pública', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Considere o seguinte problema hipotético: o Comandante de um Batalhão da Polícia Militar do Estado de São Paulo teria supostamente praticado um crime militar cometido contra um civil.\nNesse caso, à luz da Constituição do Estado de São Paulo, o referido agente será processado e julgado\n(A) pelo Tribunal de Justiça.\n(B) pelo Conselho de Justificação.\n(C) pelo Tribunal de Justiça Militar.\n(D) por um juiz de Direito do juízo militar.\n(E) pelo Conselho de Justiça Militar, sob a presidência do juiz de Direito.',
 alts:['pelo Tribunal de Justiça.','pelo Conselho de Justificação.','pelo Tribunal de Justiça Militar.','por um juiz de Direito do juízo militar.','pelo Conselho de Justiça Militar, sob a presidência do juiz de Direito.'],
 r:3,
 e:'Pela sistemática constitucional (art. 125, §4º, CF), compete ao juiz de Direito do juízo militar processar e julgar, monocraticamente, os crimes militares cometidos contra civis. Já os demais crimes militares (não envolvendo civis) são julgados pelo Conselho de Justiça, colegiado presidido pelo juiz de Direito.',
 ano:2024},

{c:'pmesp', m:'Noções de Adm. Pública', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Um grupo de servidores públicos, formado por ocupantes de cargos de provimento efetivo do Poder Executivo do Estado de São Paulo, almejava promover uma associação sindical.\nAo consultarem a Constituição do Estado de São Paulo, os servidores concluíram corretamente que o referido objetivo\n(A) é expressamente vedado.\n(B) pode ser livremente realizado.\n(C) depende de autorização do superior hierárquico.\n(D) depende de autorização do Governador do Estado.\n(E) será permitido, ou não, conforme venha a ser previsto em lei complementar estadual.',
 alts:['é expressamente vedado.','pode ser livremente realizado.','depende de autorização do superior hierárquico.','depende de autorização do Governador do Estado.','será permitido, ou não, conforme venha a ser previsto em lei complementar estadual.'],
 r:1,
 e:'O art. 37, VI, da Constituição Federal (replicado na Constituição paulista) garante ao servidor público civil o direito à livre associação sindical, sem necessidade de autorização de superiores ou do Governador.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia a tira a seguir, dos quadrinhos de Snoopy (Peanuts), para responder à questão.\n\nQuadro 1 – A garota (Sally) diz ao irmão (Charlie Brown), que a ajuda com a lição de casa: "OBRIGADA POR AJUDAR COM A LIÇÃO DE CASA, IRMÃOZÃO..."\nQuadro 2 – Ela continua: "VOCÊ SAI GANHANDO COM ISSO TAMBÉM, SABIA..."\nQuadro 3 – O irmão pergunta, curioso: "E O QUE É?"\nQuadro 4 – Ela responde: "MINHA PEDINTE GRATIDÃO!"\n(Charles M. Schulz, Snoopy – Feliz Dia dos Namorados!)\n\nA fala da garota, ao final da tira, sugere que',
 alts:['sua gratidão é limitada àquele momento.','ela continuará solicitando a ajuda do irmão.','nada a motiva a ser agradecida pela ajuda.','o irmão não costuma ajudá-la com as lições.','o irmão, a princípio, havia se recusado a ajudá-la.'],

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nÉ correto concluir que, no texto, o autor contrapõe os exercícios de imaginação das crianças aos exercícios filosóficos,',
 alts:['questionando o passado, quando a contemplação infantil não levava a nada.','afirmando a importância do devaneio dos filósofos para criar ideias proveitosas.','valorizando os primeiros, que provocam sensações mais agradáveis.','colocando-os em igualdade de condições para atingir o conhecimento.','destacando a importância do pensamento filosófico, pois produzem o saber.'],
 r:2,
 e:'O texto afirma que os exercícios de imaginação da infância "eram muito mais divertidos... que os de vossas ideias" dos filósofos, valorizando os primeiros por proporcionarem sensações mais agradáveis.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nO trecho do texto no qual o autor afirma que as ideias dos que filosofam nada têm de original é:',

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nAssinale a alternativa em que o trecho destacado está reescrito, nos parênteses, atendendo à norma-padrão de emprego dos pronomes.',
 alts:['Que se punham a figurar dragões – (figurá-los)','Senhores que leem graves estudos de filosofia – (leem-os)','Adultos colocavam cadeiras na calçada – (colocavam-as)','Era observar a forma das nuvens – (observar elas)','Galinha que acabava pondo um ovo luminoso – (pondo-lhe)'],
 r:0,
 e:'"Dragões" é objeto direto de "figurar", substituído corretamente pelo pronome "os", na forma "figurá-los" (com assimilação do -r final do infinitivo). As demais alternativas apresentam erro de forma ou de regência pronominal.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nAs conjunções destacadas no texto ("Mas" em "Mas não há de ser nada..." e "Porque" em "Porque estou me lembrando agora...") podem ser substituídas, sem prejuízo de sentido, correta e respectivamente, por:',
 alts:['Ou e Logo.','Porém e Embora.','Entretanto e Pois.','Portanto e Como.','Também e Enquanto.'],
 r:2,
 e:'"Mas" tem valor adversativo, substituível por "Entretanto"; "Porque" tem valor explicativo/causal, substituível por "Pois". As demais opções alteram o sentido original das conjunções.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nColocando-se a palavra "Talvez" no início das passagens – "Há senhores, graves senhores, que leem graves estudos de filosofia" e "a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens" –, a flexão correta dos verbos destacados ("há" e "era") será:',
 alts:['haverá ... foi','houvesse ... fora','houvera ... seria','havia ... será','haja ... fosse'],
 r:4,
 e:'"Talvez" pede o modo subjuntivo: "Talvez haja" (presente do subjuntivo de haver) e "Talvez... fosse" (pretérito imperfeito do subjuntivo de ser), conforme a norma-padrão.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nA passagem do texto em que a expressão destacada está empregada em sentido figurado é:',
 alts:['... procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias.','... exercícios muito mais divertidos [...] que os de vossas ideias, isto é, os de vossas nuvens interiores.','... a preocupação dos pequenos, alheios à conversa da gente grande ...','... estou me lembrando agora é dos tempos em que havia cadeiras na calçada ...','... observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados ...'],
 r:1,
 e:'"Nuvens interiores" é metáfora para os pensamentos/ideias abstratas dos filósofos, uso figurado da linguagem; as demais passagens empregam as palavras em sentido literal.',

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nExercícios\n\nHá senhores, graves senhores, que leem graves estudos de filosofia ou coisas afins, ou procuram sozinhos filosofar, considerando as suas ideias que eles julgam próprias. Isto em geral os leva à redescoberta da pólvora. Mas não há de ser nada... Porque estou me lembrando agora é dos tempos em que havia cadeiras na calçada e muitas estrelas lá em cima, e a preocupação dos pequenos, alheios à conversa da gente grande, era observar a forma das nuvens, que se punham a figurar dragões ou bichos mais complicados, ou fragatas que terminavam naufragando, ou mais prosaicamente uma vasta galinha que acabava pondo um ovo luminoso: a lua.\nE esses exercícios eram muito mais divertidos, meus graves senhores, que os de vossas ideias, isto é, os de vossas nuvens interiores.\n(Mario Quintana, A vaca e o hipogrifo.)\n\nAssinale a alternativa em que a nova pontuação adotada para as passagens está de acordo com a norma-padrão.',
 alts:['Há senhores (graves senhores) que leem graves estudos filosóficos. / E a galinha acabava pondo um ovo luminoso – a lua.','Há, senhores – graves senhores, que leem, graves estudos filosóficos. / E a galinha acabava pondo um ovo luminoso; a lua.','Há, senhores – graves senhores – que leem, graves estudos filosóficos. / E a galinha acabava pondo um ovo luminoso, a lua.','Há senhores (graves senhores), que leem graves estudos filosóficos. / E a galinha, acabava pondo um ovo luminoso a lua!','Há senhores: graves senhores, que leem, graves estudos filosóficos. / E, a galinha, acabava pondo um ovo luminoso – a lua!'],
 r:0,
 e:'O aposto "graves senhores" pode ser isolado corretamente por parênteses, sem vírgula indevida antes de "que" (oração restritiva); o travessão antes de "a lua" isola apropriadamente o aposto explicativo final. As demais alternativas inserem vírgulas indevidas entre termos essenciais da oração.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nSinais de quem sofre bullying\n\nApesar das inúmeras campanhas de conscientização, o bullying segue sendo um tema que merece a nossa atenção. Uma pesquisa realizada pela Microsoft, em 2020, em 32 países, incluindo o Brasil, aponta que 43% dos entrevistados estiveram envolvidos em incidentes de bullying na internet, conhecido como cyberbullying.\nPor sua vez, a Pesquisa Nacional de Saúde Escolar 2019, feita pelo Instituto Brasileiro de Geografia e Estatística com 188 mil estudantes com idades entre 13 e 17 anos, aponta que um em cada 10 adolescentes já se sentiu ameaçado, ofendido e humilhado em redes sociais ou aplicativos. Além disso, 23% dos estudantes afirmaram ter sido vítimas de bullying em ambiente escolar. Os motivos? Aparência do corpo (16,5%), aparência do rosto (11,6%) e cor ou raça (4,6%).\nAlém de seguir com as campanhas de conscientização e de abordar o assunto com as crianças e os adolescentes, entendo que é importante que pais e responsáveis estejam 100% atentos ao comportamento dos seus filhos. A forma como estes agem pode nos dizer muitas coisas, entre elas, demonstrar se eles estão sendo autores ou vítimas de bullying. Esse é um dos melhores meios para identificar se uma criança sofre com zombarias, ridicularizações, humilhações e outro tipo de violência emocional.\nO assunto precisa ser tratado com seriedade pelos pais e responsáveis. É interessante que encarem as situações juntos, sem pressionar os filhos a reagir ou minimizar a situação, fazendo com que eles se sintam pior.\nNesse momento, é relevante pedir discrição para lidar com o assunto, pois expor o menor não irá ajudar. Ao contrário, apenas irá incentivar os colegas a aumentar a prática. Em paralelo, vale buscar a ajuda de um profissional experiente na área.\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nSegundo o texto,',
 alts:['campanhas de conscientização conseguiram erradicar o cyberbullying entre jovens em idade escolar.','pesquisas têm constatado que vem se reduzindo o número de jovens atingidos por bullying no ambiente escolar.','a ação enérgica dos pais para limitar o bullying é o caminho adequado para levar o jovem a refletir sobre essa prática.','observar com interesse a forma de agir dos filhos permite identificar se eles vivem situações de bullying.','questões raciais ainda são a principal causa de bullying, seguidas de constrangimentos relacionados ao aspecto físico.'],
 r:3,
 e:'O texto afirma que "a forma como estes [os filhos] agem pode nos dizer muitas coisas... demonstrar se eles estão sendo autores ou vítimas de bullying", confirmando que observar o comportamento dos filhos ajuda a identificar bullying.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nSinais de quem sofre bullying\n\nApesar das inúmeras campanhas de conscientização, o bullying segue sendo um tema que merece a nossa atenção. Uma pesquisa realizada pela Microsoft, em 2020, em 32 países, incluindo o Brasil, aponta que 43% dos entrevistados estiveram envolvidos em incidentes de bullying na internet, conhecido como cyberbullying.\nPor sua vez, a Pesquisa Nacional de Saúde Escolar 2019, feita pelo Instituto Brasileiro de Geografia e Estatística com 188 mil estudantes com idades entre 13 e 17 anos, aponta que um em cada 10 adolescentes já se sentiu ameaçado, ofendido e humilhado em redes sociais ou aplicativos. Além disso, 23% dos estudantes afirmaram ter sido vítimas de bullying em ambiente escolar. Os motivos? Aparência do corpo (16,5%), aparência do rosto (11,6%) e cor ou raça (4,6%).\nAlém de seguir com as campanhas de conscientização e de abordar o assunto com as crianças e os adolescentes, entendo que é importante que pais e responsáveis estejam 100% atentos ao comportamento dos seus filhos. A forma como estes agem pode nos dizer muitas coisas, entre elas, demonstrar se eles estão sendo autores ou vítimas de bullying. Esse é um dos melhores meios para identificar se uma criança sofre com zombarias, ridicularizações, humilhações e outro tipo de violência emocional.\nO assunto precisa ser tratado com seriedade pelos pais e responsáveis. É interessante que encarem as situações juntos, sem pressionar os filhos a reagir ou minimizar a situação, fazendo com que eles se sintam pior.\nNesse momento, é relevante pedir discrição para lidar com o assunto, pois expor o menor não irá ajudar. Ao contrário, apenas irá incentivar os colegas a aumentar a prática. Em paralelo, vale buscar a ajuda de um profissional experiente na área.\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nAssinale a alternativa em que a passagem do primeiro parágrafo – Apesar das inúmeras campanhas de conscientização – está reescrita preservando o sentido do texto.',
 alts:['Durante as inúmeras campanhas de conscientização ...','Além das inúmeras campanhas de conscientização ...','Desde as inúmeras campanhas de conscientização ...','Graças às inúmeras campanhas de conscientização ...','Mesmo com as inúmeras campanhas de conscientização ...'],
 r:4,
 e:'"Apesar de" tem valor concessivo, adequadamente substituído por "Mesmo com", mantendo a ideia de que o bullying persiste apesar das campanhas.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir, observando os trechos em destaque no 3º e no 4º parágrafos.\n\nSinais de quem sofre bullying\n\nApesar das inúmeras campanhas de conscientização, o bullying segue sendo um tema que merece a nossa atenção. Uma pesquisa realizada pela Microsoft, em 2020, em 32 países, incluindo o Brasil, aponta que 43% dos entrevistados estiveram envolvidos em incidentes de bullying na internet, conhecido como cyberbullying.\nPor sua vez, a Pesquisa Nacional de Saúde Escolar 2019, feita pelo Instituto Brasileiro de Geografia e Estatística com 188 mil estudantes com idades entre 13 e 17 anos, aponta que um em cada 10 adolescentes já se sentiu ameaçado, ofendido e humilhado em redes sociais ou aplicativos. Além disso, 23% dos estudantes afirmaram ter sido vítimas de bullying em ambiente escolar. Os motivos? Aparência do corpo (16,5%), aparência do rosto (11,6%) e cor ou raça (4,6%).\n[3º parágrafo] Além de seguir com as campanhas de conscientização e de abordar o assunto com as crianças e os adolescentes, entendo que é importante que pais e responsáveis estejam 100% atentos ao comportamento dos seus filhos. A forma como estes agem pode nos dizer muitas coisas, entre elas, demonstrar se eles estão sendo autores ou vítimas de bullying. Esse é um dos melhores meios para identificar se uma criança sofre COM ZOMBARIAS, RIDICULARIZAÇÕES, HUMILHAÇÕES E OUTRO TIPO DE VIOLÊNCIA EMOCIONAL (expressão em destaque).\n[4º parágrafo] O assunto precisa ser tratado COM SERIEDADE (expressão em destaque) pelos pais e responsáveis. É interessante que encarem as situações juntos, sem pressionar os filhos a reagir ou minimizar a situação, fazendo com que eles se sintam pior.\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nAs expressões em destaque no 3º e no 4º parágrafos expressam, correta e respectivamente, as noções de',
 alts:['causa e modo.','modo e condição.','meio e lugar.','companhia e estado.','restrição e tempo.'],
 r:0,
 e:'No 3º parágrafo, "com zombarias, ridicularizações..." indica a causa do sofrimento da criança; no 4º parágrafo, "com seriedade" indica o modo como o assunto deve ser tratado. Logo, causa e modo, respectivamente.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nSinais de quem sofre bullying\n\n(...) Nesse momento, é relevante pedir discrição para lidar com o assunto, pois expor o menor não irá ajudar. Ao contrário, apenas irá incentivar os colegas a aumentar a prática. Em paralelo, vale buscar a ajuda de um profissional experiente na área.\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nA passagem do 5º parágrafo – irá incentivar os colegas a aumentar a prática – está reescrita de acordo com a norma-padrão de regência em:',
 alts:['irá dar incentivo dos colegas com aumentar a prática','irá dar incentivo para os colegas por aumentar a prática','irá dar incentivo nos colegas em aumentar a prática','irá dar incentivo com os colegas de aumentar a prática','irá dar incentivo aos colegas para aumentar a prática'],
 r:4,
 e:'O verbo "incentivar" rege a preposição "a" (incentivar alguém A algo); na forma nominal "dar incentivo", mantém-se essa regência com "aos colegas", e a finalidade é expressa por "para", conforme (E).',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nSinais de quem sofre bullying\n\n(...) Além de seguir com as campanhas de conscientização e de abordar o assunto com as crianças e os adolescentes, entendo que é importante que pais e responsáveis estejam 100% atentos ao comportamento dos seus filhos. A forma como estes agem pode nos dizer muitas coisas, entre elas, demonstrar se eles estão sendo autores ou vítimas de bullying. (...)\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nO enunciado entre colchetes que reescreve o original de acordo com a norma-padrão de emprego do sinal indicativo de crase é:',
 alts:['irá incentivar os colegas [irá estimular à algumas colegas]','tema que merece a nossa atenção [tema à que devemos dar atenção]','seguir com as campanhas [dar sequência às mesmas campanhas]','é interessante que encarem as situações [é interessante que enfrentem à todas as situações]','pode nos dizer muitas coisas [pode nos levar à concluir muitas coisas]'],
 r:2,
 e:'Crase ocorre na junção da preposição "a" com o artigo feminino "a(s)": "dar sequência às mesmas campanhas" está correto, pois "campanhas" é palavra feminina antecedida de artigo. As demais alternativas usam crase indevidamente antes de palavra masculina, pronome indefinido ou verbo no infinitivo.',
 ano:2023},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto a seguir.\n\nSinais de quem sofre bullying\n\n(...) Nesse momento, é relevante pedir discrição para lidar com o assunto, pois expor o menor não irá ajudar. Ao contrário, apenas irá incentivar os colegas a aumentar a prática. Em paralelo, vale buscar a ajuda de um profissional experiente na área.\n(Sueli Bravi Conte, Revista Bem-Estar, 05.06.2022. Adaptado)\n\nSão expressões antônimas de discrição e incentivar, adequadas ao contexto do último parágrafo, respectivamente,',
 alts:['estardalhaço e desencorajar.','indisposição e desaconselhar.','gritaria e pressionar.','cuidado e desestimular.','fofoca e sugerir.'],
 r:0,
 e:'"Discrição" (reserva) opõe-se a "estardalhaço" (alarde); "incentivar" opõe-se a "desencorajar". As demais opções não formam pares antonímicos precisos com as palavras do texto.',
