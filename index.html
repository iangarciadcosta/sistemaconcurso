<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cartão-Resposta · Simulados para Concursos</title>
<meta name="description" content="Simulados rápidos para PMESP, GCM e Correios. Responda, veja o gabarito e revise os erros.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --tinta:#17202B;        /* texto principal */
    --tinta-2:#5A6673;      /* texto secundário */
    --papel:#F4F6F9;        /* fundo da página */
    --cartao:#FFFFFF;       /* superfícies */
    --linha:#DDE3EA;        /* bordas */
    --farda:#16283F;        /* navy PMESP — primário */
    --farda-2:#0F1C2E;      /* navy escuro */
    --insignia:#C9971C;     /* dourado — usado com parcimônia */
    --certo:#1E8A4C;
    --certo-bg:#E7F4EC;
    --erro:#C43D3D;
    --erro-bg:#FBEAEA;
    --raio:14px;
    --sombra:0 1px 2px rgba(23,32,43,.06), 0 4px 14px rgba(23,32,43,.07);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--papel);
    color:var(--tinta);
    font-family:'Inter',system-ui,sans-serif;
    font-size:16px; line-height:1.55;
    min-height:100vh;
  }
  .shell{max-width:560px; margin:0 auto; padding:0 16px 96px;}

  /* ---------- topo ---------- */
  header.app{
    background:var(--farda); color:#fff;
    padding:18px 16px 16px;
    border-bottom:3px solid var(--insignia);
  }
  header.app .inner{max-width:560px; margin:0 auto; display:flex; align-items:center; gap:12px;}
  .logo-bubble{
    width:38px; height:38px; border-radius:50%;
    border:2.5px solid var(--insignia); flex:none;
    display:grid; place-items:center;
    font-family:'Archivo'; font-weight:900; font-size:17px; color:var(--insignia);
  }
  header.app h1{
    font-family:'Archivo'; font-weight:800; font-size:19px; letter-spacing:.01em;
    margin:0; line-height:1.15;
  }
  header.app small{display:block; font-family:'Inter'; font-weight:500; font-size:12px; color:#AEB9C7; letter-spacing:.04em; text-transform:uppercase; margin-top:2px;}

  .eyebrow{
    font-family:'Archivo'; font-weight:700; font-size:12px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--tinta-2); margin:28px 0 10px;
  }

  /* ---------- cards de concurso ---------- */
  .concurso{
    display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    background:var(--cartao); border:1px solid var(--linha); border-radius:var(--raio);
    padding:16px; margin-bottom:12px; cursor:pointer; box-shadow:var(--sombra);
    transition:transform .08s ease, border-color .12s ease;
    font-family:inherit; color:inherit;
  }
  .concurso:active{transform:scale(.985);}
  .concurso .sigla{
    flex:none; width:52px; height:52px; border-radius:12px;
    background:var(--farda); color:#fff;
    display:grid; place-items:center;
    font-family:'Archivo'; font-weight:900; font-size:15px;
  }
  .concurso.gcm .sigla{background:#25405B;}
  .concurso.correios .sigla{background:#3A5573;}
  .concurso h3{margin:0; font-family:'Archivo'; font-weight:800; font-size:17px;}
  .concurso p{margin:3px 0 0; font-size:13px; color:var(--tinta-2);}
  .concurso .n{margin-left:auto; flex:none; text-align:right; font-size:12px; color:var(--tinta-2);}
  .concurso .n b{display:block; font-family:'Archivo'; font-weight:800; font-size:20px; color:var(--tinta); font-variant-numeric:tabular-nums;}

  /* ---------- botões ---------- */
  .btn{
    display:block; width:100%; border:none; border-radius:var(--raio);
    padding:16px; font-family:'Archivo'; font-weight:800; font-size:16px;
    letter-spacing:.02em; cursor:pointer; text-align:center;
    transition:transform .08s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(.985);}
  .btn-primario{background:var(--farda); color:#fff;}
  .btn-primario:disabled{opacity:.4; cursor:not-allowed;}
  .btn-claro{background:var(--cartao); color:var(--farda); border:1.5px solid var(--linha);}
  .btn-linha{background:none; color:var(--tinta-2); font-family:'Inter'; font-weight:600; font-size:14px; padding:12px;}

  /* ---------- setup ---------- */
  .painel{background:var(--cartao); border:1px solid var(--linha); border-radius:var(--raio); padding:18px; box-shadow:var(--sombra); margin-bottom:14px;}
  .painel h4{margin:0 0 12px; font-family:'Archivo'; font-weight:800; font-size:15px;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    border:1.5px solid var(--linha); background:var(--papel); color:var(--tinta);
    border-radius:999px; padding:9px 14px; font-family:'Inter'; font-weight:600; font-size:13.5px;
    cursor:pointer; transition:all .1s ease;
  }
  .chip.on{background:var(--farda); border-color:var(--farda); color:#fff;}
  .chip .qtd{opacity:.65; font-weight:500;}

  /* ---------- quiz: faixa gabarito ---------- */
  .faixa{
    position:sticky; top:0; z-index:10;
    background:var(--papel); padding:12px 0 10px;
    border-bottom:1px solid var(--linha); margin-bottom:18px;
  }
  .faixa .meta{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .faixa .meta b{font-family:'Archivo'; font-weight:800; font-size:14px;}
  .faixa .meta span{font-size:12px; color:var(--tinta-2); font-variant-numeric:tabular-nums;}
  .strip{display:flex; gap:4px;}
  .strip i{
    flex:1; height:7px; border-radius:4px; background:#E2E8EF; border:1px solid var(--linha);
    transition:background .15s ease;
  }
  .strip i.feita{background:var(--farda); border-color:var(--farda);}
  .strip i.atual{border-color:var(--insignia); box-shadow:0 0 0 1.5px var(--insignia);}

  .q-materia{
    display:inline-block; font-family:'Archivo'; font-weight:700; font-size:11.5px;
    letter-spacing:.1em; text-transform:uppercase; color:var(--farda);
    background:#E8EDF4; border-radius:6px; padding:4px 9px; margin-bottom:12px;
  }
  .q-texto{font-size:16.5px; font-weight:500; line-height:1.6; margin:0 0 6px; white-space:pre-line;}
  .q-fonte{font-size:12px; color:var(--tinta-2); margin:0 0 10px;}

  /* ---------- dica sutil ---------- */
  .dica-btn{
    display:inline-block; background:none; border:none; font-family:'Inter';
    font-weight:600; font-size:12px; color:var(--tinta-2); opacity:.5;
    cursor:pointer; padding:2px 0 0; margin:0 0 16px; text-decoration:underline dotted;
    text-underline-offset:2px; transition:opacity .15s ease;
  }
  .dica-btn:hover, .dica-btn:active{opacity:.85;}
  .dica-caixa{
    display:none; background:#FBF6E9; border:1px dashed var(--insignia);
    border-radius:10px; padding:10px 12px; margin:0 0 16px;
    font-size:13px; line-height:1.5; color:var(--tinta-2);
  }
  .dica-caixa.aberta{display:block;}

  /* ---------- alternativas estilo cartão-resposta ---------- */
  .alts{display:flex; flex-direction:column; gap:10px;}
  .alt{
    display:flex; align-items:flex-start; gap:13px; width:100%; text-align:left;
    background:var(--cartao); border:1.5px solid var(--linha); border-radius:var(--raio);
    padding:14px; cursor:pointer; font-family:inherit; font-size:15.5px; color:inherit;
    line-height:1.5; transition:border-color .1s ease, background .1s ease;
  }
  .alt .bolha{
    flex:none; width:30px; height:30px; border-radius:50%;
    border:2px solid #9AA6B4; display:grid; place-items:center;
    font-family:'Archivo'; font-weight:800; font-size:14px; color:var(--tinta-2);
    transition:all .1s ease; margin-top:1px;
  }
  .alt.sel{border-color:var(--farda); background:#F0F4F9;}
  .alt.sel .bolha{background:var(--farda); border-color:var(--farda); color:#fff;}
  .alt.certa{border-color:var(--certo); background:var(--certo-bg);}
  .alt.certa .bolha{background:var(--certo); border-color:var(--certo); color:#fff;}
  .alt.errada{border-color:var(--erro); background:var(--erro-bg);}
  .alt.errada .bolha{background:var(--erro); border-color:var(--erro); color:#fff;}

  .nav-quiz{display:flex; gap:10px; margin-top:22px;}
  .nav-quiz .btn{flex:1;}

  /* ---------- resultado ---------- */
  .placar{
    background:var(--farda); color:#fff; border-radius:var(--raio);
    padding:26px 20px; text-align:center; margin-top:24px; box-shadow:var(--sombra);
    border-bottom:3px solid var(--insignia);
  }
  .placar .nota{font-family:'Archivo'; font-weight:900; font-size:52px; line-height:1; font-variant-numeric:tabular-nums;}
  .placar .nota small{font-size:22px; font-weight:700; color:#8FA0B5;}
  .placar p{margin:8px 0 0; font-size:14px; color:#C4CFDC;}
  .placar .selo{
    display:inline-block; margin-top:14px; font-family:'Archivo'; font-weight:800; font-size:13px;
    letter-spacing:.08em; text-transform:uppercase; border-radius:999px; padding:7px 16px;
  }
  .selo.ok{background:var(--certo); color:#fff;}
  .selo.quase{background:var(--insignia); color:#fff;}
  .selo.ruim{background:var(--erro); color:#fff;}

  .barras{margin-top:14px;}
  .barra-linha{margin-bottom:12px;}
  .barra-linha .rot{display:flex; justify-content:space-between; font-size:13px; font-weight:600; margin-bottom:5px;}
  .barra-linha .rot span:last-child{color:var(--tinta-2); font-variant-numeric:tabular-nums; font-weight:500;}
  .barra-bg{height:9px; border-radius:5px; background:#E2E8EF; overflow:hidden;}
  .barra-fill{height:100%; border-radius:5px; background:var(--farda);}
  .barra-fill.baixa{background:var(--erro);}
  .barra-fill.media{background:var(--insignia);}

  /* ---------- revisão ---------- */
  .rev{background:var(--cartao); border:1px solid var(--linha); border-left:4px solid var(--erro); border-radius:var(--raio); padding:16px; margin-bottom:14px; box-shadow:var(--sombra);}
  .rev.acerto{border-left-color:var(--certo);}
  .rev .num{font-family:'Archivo'; font-weight:800; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--tinta-2); margin-bottom:8px;}
  .rev .enun{font-size:14.5px; font-weight:500; margin:0 0 12px; white-space:pre-line;}
  .rev .linha-resp{display:flex; gap:10px; align-items:flex-start; font-size:14px; margin-bottom:6px;}
  .rev .linha-resp .tag{flex:none; font-family:'Archivo'; font-weight:800; font-size:11px; letter-spacing:.06em; text-transform:uppercase; border-radius:6px; padding:3px 8px; margin-top:1px;}
  .tag.sua{background:var(--erro-bg); color:var(--erro);}
  .tag.gab{background:var(--certo-bg); color:var(--certo);}
  .rev .explica{margin-top:10px; padding-top:10px; border-top:1px dashed var(--linha); font-size:13.5px; color:var(--tinta-2);}
  .rev .explica b{color:var(--tinta);}

  .filtros-rev{display:flex; gap:8px; margin:18px 0 14px;}

  /* ---------- histórico ---------- */
  .hist{display:flex; align-items:center; gap:12px; background:var(--cartao); border:1px solid var(--linha); border-radius:var(--raio); padding:13px 15px; margin-bottom:10px; font-size:13.5px;}
  .hist .pct{flex:none; font-family:'Archivo'; font-weight:800; font-size:16px; width:52px; font-variant-numeric:tabular-nums;}
  .hist .pct.ok{color:var(--certo);} .hist .pct.ruim{color:var(--erro);}
  .hist .info b{display:block; font-weight:600;}
  .hist .info span{color:var(--tinta-2); font-size:12px;}

  .vazio{text-align:center; color:var(--tinta-2); font-size:14px; padding:24px 12px;}
  .aviso{font-size:12.5px; color:var(--tinta-2); margin-top:18px; text-align:center;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<header class="app">
  <div class="inner">
    <div class="logo-bubble">A</div>
    <div>
      <h1>Cartão-Resposta</h1>
      <small>Simulados · Concursos Públicos</small>
    </div>
  </div>
</header>

<main class="shell" id="app"></main>

<script>
/* =====================================================================
   BANCO DE QUESTÕES
   ---------------------------------------------------------------------
   Para adicionar questões, copie um objeto abaixo e edite. Campos:
   c: id do concurso | m: matéria | q: enunciado | alts: alternativas
   r: índice da correta (0 = A) | e: explicação | f: fonte/estilo
   Peça ao Claude Code: "adicione 10 questões de crase estilo VUNESP
   no banco de questões do concurso pmesp".
   ===================================================================== */
const CONCURSOS = [
  {id:'pmesp', sigla:'PM', nome:'PM-ESP · Soldado 2ª Classe', banca:'Estilo VUNESP', desc:'Português, Matemática, C. Gerais, Informática e Adm. Pública',
   prova:{'Língua Portuguesa':20,'Matemática':15,'Conhecimentos Gerais':15,'Noções de Informática':5,'Noções de Adm. Pública':5}, corte:30},
  {id:'gcm', sigla:'GCM', nome:'GCM Sorocaba', banca:'Guarda Civil Municipal', desc:'Português, Matemática e Legislação das Guardas'},
  {id:'correios', sigla:'ECT', nome:'Correios · Agente', banca:'Nível médio', desc:'Português, Matemática e Informática'},
];

const BANCO = [
/* ---------------- PMESP · Língua Portuguesa ---------------- */
{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · concordância verbal',
 q:'Assinale a alternativa em que a concordância verbal está de acordo com a norma-padrão da língua portuguesa.',
 alts:['Fazem dez anos que o policiamento comunitário foi implantado no bairro.',
       'Haviam muitos candidatos inscritos no concurso da Polícia Militar.',
       'Faz dez anos que o policiamento comunitário foi implantado no bairro.',
       'Existe, na corporação, policiais com mais de vinte anos de serviço.',
       'Devem haver novas turmas de formação no próximo semestre.'],
 r:2,
 e:'O verbo "fazer" indicando tempo decorrido é impessoal e fica no singular: "Faz dez anos". "Haver" no sentido de existir também é impessoal ("Havia muitos candidatos"; "Deve haver novas turmas"). Já "existir" é pessoal e concorda: "Existem policiais".',
 dica:'Troque mentalmente "fazer"/"haver" por "existir": se der pra dizer "existem", o verbo concorda; se for tempo decorrido, ele fica sempre no singular.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · crase',
 q:'Assinale a alternativa em que o sinal indicativo de crase está empregado corretamente.',
 alts:['O soldado chegou à tempo para o início da ronda.',
       'A ocorrência foi comunicada à autoridade competente.',
       'O batalhão fica à duzentos metros da estação.',
       'Ele se referiu à todos os presentes na reunião.',
       'Começou à chover durante o patrulhamento.'],
 r:1,
 e:'Crase = preposição "a" + artigo "a". "Comunicar a + a autoridade" → "à autoridade". Não ocorre crase antes de palavras masculinas ("a tempo"), numerais ("a duzentos metros"), pronomes indefinidos ("a todos") nem verbos ("a chover").',
 dica:'Troque a palavra depois do "a" por uma equivalente masculina: se ficar bem dizer "ao", há crase; se soar estranho, não há.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · regência',
 q:'Considerando a regência verbal segundo a norma-padrão, assinale a alternativa correta.',
 alts:['O policial assistiu o filme institucional durante o curso.',
       'Todos aspiravam o cargo de oficial da corporação.',
       'O comandante visava à melhoria dos índices de segurança.',
       'Prefiro mais trabalhar de dia do que de noite.',
       'O tenente obedeceu o regulamento sem questionar.'],
 r:2,
 e:'"Visar" no sentido de objetivar pede preposição "a": "visava à melhoria". "Assistir" (ver) pede "a" ("assistiu ao filme"); "aspirar" (desejar) pede "a" ("aspiravam ao cargo"); "preferir" não admite "mais... do que" ("prefiro X a Y"); "obedecer" pede "a" ("obedeceu ao regulamento").',
 dica:'Pergunte-se: esse verbo pede complemento com a preposição "a"? "Assistir", "aspirar", "obedecer" e "visar" costumam ser os vilões dessas questões.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · interpretação',
 q:'Leia o trecho:\n\n"A confiança da população na polícia não se constrói apenas com resultados operacionais; ela depende, sobretudo, da forma como cada agente trata o cidadão no contato cotidiano."\n\nDe acordo com o trecho, é correto afirmar que:',
 alts:['os resultados operacionais são irrelevantes para a confiança da população.',
       'o tratamento dispensado ao cidadão é o fator principal na construção da confiança.',
       'a confiança da população já está consolidada e independe da conduta dos agentes.',
       'o contato cotidiano com o cidadão deve ser evitado pelos agentes.',
       'a polícia constrói confiança exclusivamente por meio de campanhas publicitárias.'],
 r:1,
 e:'"Sobretudo" indica que o tratamento ao cidadão é o fator principal — mas não o único: os resultados operacionais também contam ("não se constrói APENAS com..."). Por isso a alternativa que diz "irrelevantes" extrapola o texto.',
 dica:'Repare na palavra "sobretudo" — ela marca o fator MAIS importante, não o ÚNICO. Desconfie de alternativas com "apenas", "exclusivamente" ou "irrelevante".'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · colocação pronominal',
 q:'Assinale a alternativa em que a colocação pronominal atende à norma-padrão.',
 alts:['Me informaram sobre a alteração na escala de serviço.',
       'Nunca desrespeitou-se a hierarquia naquele batalhão.',
       'Informaram-me sobre a alteração na escala de serviço.',
       'Quando apresentou-se ao quartel, já era noite.',
       'Em se tratando de emergência, deve-se acionar-se o COPOM.'],
 r:2,
 e:'Não se inicia frase com pronome oblíquo átono: o correto é a ênclise "Informaram-me". Palavras atrativas como "nunca" e "quando" exigem próclise ("nunca se desrespeitou", "quando se apresentou").',
 dica:'Frase nunca pode começar com "me", "se", "lhe" etc. Veja também se há uma palavra "atrativa" (nunca, quando, que...) antes do verbo — ela puxa o pronome pra antes dele.'},

/* ---------------- PMESP · Matemática ---------------- */
{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · regra de três',
 q:'Uma equipe de 6 policiais realiza a vistoria de 90 veículos em 3 horas. Mantida a mesma produtividade individual, o número de veículos que 8 policiais vistoriam em 2 horas é:',
 alts:['70','75','80','85','95'],
 r:2,
 e:'Cada policial vistoria 90 ÷ 6 ÷ 3 = 5 veículos por hora. Então 8 policiais × 2 horas × 5 = 80 veículos.',
 dica:'Ache primeiro quanto UM policial faz em UMA hora — depois é só multiplicar pelos novos números de policiais e horas.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · porcentagem',
 q:'Em um mês, foram registradas 250 ocorrências em um município. No mês seguinte, esse número caiu 12%. O total de ocorrências do segundo mês foi:',
 alts:['200','210','215','220','230'],
 r:3,
 e:'12% de 250 = 30. Logo, 250 − 30 = 220 ocorrências.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · razão e proporção',
 q:'Em um pelotão, a razão entre o número de soldados e o de cabos é de 7 para 2. Se o pelotão tem, ao todo, 45 militares entre soldados e cabos, o número de soldados é:',
 alts:['28','30','32','35','36'],
 r:3,
 e:'7 + 2 = 9 partes. Cada parte vale 45 ÷ 9 = 5. Soldados: 7 × 5 = 35.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · velocidade média',
 q:'Uma viatura percorre 180 km em 2 horas e 30 minutos. A velocidade média da viatura nesse percurso é de:',
 alts:['60 km/h','66 km/h','72 km/h','75 km/h','80 km/h'],
 r:2,
 e:'2h30 = 2,5 h. Velocidade média = 180 ÷ 2,5 = 72 km/h.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · equação do 1º grau',
 q:'A soma das idades de dois irmãos é 34 anos. O mais velho tem 6 anos a mais que o mais novo. A idade do irmão mais novo é:',
 alts:['12 anos','13 anos','14 anos','15 anos','16 anos'],
 r:2,
 e:'x + (x + 6) = 34 → 2x = 28 → x = 14. O mais novo tem 14 anos (e o mais velho, 20).'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · interpretação',
 q:'Leia o trecho:\n\n"O uso de câmeras corporais reduziu o número de reclamações contra agentes em diversas corporações. Contudo, especialistas alertam que a tecnologia, sozinha, não substitui o treinamento contínuo dos policiais."\n\nDe acordo com o texto, é correto afirmar que:',
 alts:['as câmeras corporais aumentaram as reclamações contra agentes.',
       'a tecnologia é suficiente para dispensar o treinamento dos policiais.',
       'as câmeras trouxeram resultados positivos, mas não eliminam a necessidade de treinamento.',
       'os especialistas são contrários ao uso de câmeras corporais.',
       'o treinamento contínuo tornou-se desnecessário nas corporações.'],
 r:2,
 e:'O conectivo "contudo" introduz uma ressalva: as câmeras deram resultado (reduziram reclamações), mas o treinamento continua necessário. As demais alternativas contradizem ou extrapolam o texto.',
 dica:'"Contudo" é uma conjunção adversativa — sinaliza uma ressalva a seguir, sem anular o que foi dito antes dela.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · sinonímia',
 q:'Na frase "O policial agiu com cautela ao abordar o veículo suspeito", o termo destacado pode ser substituído, sem alteração de sentido, por:',
 alts:['pressa','prudência','negligência','arrogância','indiferença'],
 r:1,
 e:'"Cautela" significa cuidado, precaução — sinônimo de "prudência". As demais opções alteram ou invertem o sentido da frase.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · pontuação',
 q:'Assinale a alternativa em que a pontuação está empregada conforme a norma-padrão.',
 alts:['Os candidatos aprovados, iniciarão o curso em março.',
       'O comandante disse, que a ronda começaria mais cedo.',
       'O sargento, responsável pela equipe, orientou os novatos.',
       'Compramos coletes capacetes e rádios para a equipe.',
       'Após o treinamento os soldados, descansaram.'],
 r:2,
 e:'As vírgulas isolam corretamente o aposto explicativo "responsável pela equipe". Nas demais: não se separa sujeito do verbo nem verbo do complemento com vírgula, e enumerações exigem vírgulas ("coletes, capacetes e rádios").',
 dica:'Regra de ouro: nunca se separa sujeito do verbo com vírgula. Descarte de cara qualquer alternativa que faça isso.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · acentuação',
 q:'Assinale a alternativa em que todas as palavras estão acentuadas corretamente.',
 alts:['orgão, política, saúde','órgão, politica, saúde','órgão, política, saúde','órgão, política, saude','orgão, politica, saude'],
 r:2,
 e:'"Órgão" é paroxítona terminada em -ão (acentuada); "política" é proparoxítona (todas as proparoxítonas são acentuadas); "saúde" tem hiato com "u" tônico.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · mal/mau',
 q:'Assinale a alternativa que preenche, correta e respectivamente, as lacunas:\n\n"Ele é um ___ exemplo para os colegas; comportou-se ___ durante toda a ocorrência."',
 alts:['mau … mal','mal … mau','mau … mau','mal … mal','mal … mais'],
 r:0,
 e:'"Mau" é adjetivo (contrário de bom): "mau exemplo". "Mal" é advérbio (contrário de bem): "comportou-se mal".',
 dica:'Troque a palavra por "bom"/"ruim" — se encaixar, é "mau". Troque por "bem" — se encaixar, é "mal".'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · uso dos porquês',
 q:'Assinale a alternativa que preenche, correta e respectivamente, as lacunas:\n\n"Ninguém explicou o ___ da mudança na escala; você sabe ___ ela foi alterada?"',
 alts:['porque … porquê','porquê … por que','por que … porque','porquê … por quê','por quê … porque'],
 r:1,
 e:'"O porquê" (com artigo) é substantivo e significa "o motivo". "Por que" (separado, sem acento) é usado em perguntas indiretas no meio da frase: "sabe por que ela foi alterada".',
 dica:'Se der pra trocar por "o motivo", é "o porquê" junto e com acento. Se vier antes de uma pergunta implícita, é "por que" separado.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · concordância nominal',
 q:'Assinale a alternativa em que a concordância nominal está de acordo com a norma-padrão.',
 alts:['Seguem anexos os relatórios solicitados.',
       'Segue anexo as certidões exigidas no edital.',
       'É proibido a entrada de pessoas não autorizadas.',
       'Ela mesmo assinou o boletim de ocorrência.',
       'Havia menas viaturas disponíveis naquele dia.'],
 r:0,
 e:'"Anexo" é adjetivo e concorda: "anexos os relatórios". Com artigo, seria "é proibida a entrada"; "mesma" concorda com "ela"; e "menos" é invariável — "menas" não existe.',
 dica:'"Anexo" funciona como adjetivo e concorda em gênero/número com o que vem depois — não é uma palavra fixa, como muita gente pensa.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · valor das conjunções',
 q:'Na frase "Embora estivesse cansado, o soldado completou a ronda", a oração destacada expressa ideia de:',
 alts:['causa','condição','concessão','finalidade','conclusão'],
 r:2,
 e:'"Embora" é conjunção concessiva: indica um fato contrário que não impede a ação principal (estava cansado, mas mesmo assim completou a ronda).'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · vozes verbais',
 q:'Transpondo a frase "Os policiais prenderam o suspeito" para a voz passiva, obtém-se:',
 alts:['O suspeito prendeu os policiais.',
       'O suspeito foi preso pelos policiais.',
       'Os policiais foram presos pelo suspeito.',
       'Prendeu-se os policiais.',
       'O suspeito tinha prendido os policiais.'],
 r:1,
 e:'Na voz passiva, o objeto vira sujeito e o verbo assume a forma "ser + particípio" no mesmo tempo: "foi preso pelos policiais".'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · pronome relativo',
 q:'Assinale a alternativa que preenche corretamente a lacuna:\n\n"O soldado ___ viatura apresentou defeito pediu apoio pelo rádio."',
 alts:['que a','cuja','cujo a','onde a','a qual'],
 r:1,
 e:'"Cujo/cuja" indica posse (a viatura do soldado) e concorda com o substantivo seguinte: "cuja viatura". Não se usa artigo depois de "cujo".',
 dica:'"Cujo" já tem a força de um artigo embutido — nunca coloque "a"/"o" logo depois dele.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · denotação e conotação',
 q:'Na frase "A cidade dormia quando a viatura iniciou o patrulhamento", o verbo "dormir" foi empregado em sentido:',
 alts:['denotativo, pois indica o sono dos moradores.',
       'conotativo, pois atribui uma ação humana à cidade.',
       'técnico, próprio da linguagem policial.',
       'literal, sem qualquer recurso expressivo.',
       'ambíguo, pois impede a compreensão da frase.'],
 r:1,
 e:'Cidade não dorme literalmente: é personificação, uso figurado (conotativo) que sugere silêncio e tranquilidade.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · tempos verbais',
 q:'Na frase "Quando o telefone tocou, o soldado preenchia o relatório", a forma verbal "preenchia" indica:',
 alts:['ação futura em relação ao toque do telefone.',
       'ação concluída antes de o telefone tocar.',
       'ação em andamento no momento em que o telefone tocou.',
       'hipótese que não se realizou.',
       'ordem dada ao soldado.'],
 r:2,
 e:'O pretérito imperfeito ("preenchia") expressa ação contínua no passado, em curso quando outra ação pontual ("tocou", pretérito perfeito) aconteceu.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · coesão',
 q:'Leia: "Os moradores procuraram a base comunitária. Eles queriam registrar uma reclamação."\n\nO pronome "Eles" retoma, no texto, a expressão:',
 alts:['a base comunitária','uma reclamação','os moradores','a comunidade','os policiais da base'],
 r:2,
 e:'"Eles" é um pronome anafórico: refere-se ao termo já citado "os moradores", garantindo a coesão entre as frases.'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · há/a',
 q:'Assinale a alternativa que preenche, correta e respectivamente, as lacunas:\n\n"___ dois anos ele ingressou na corporação; daqui ___ três meses, será promovido."',
 alts:['Há … a','A … há','Há … há','A … a','A … à'],
 r:0,
 e:'"Há" (verbo haver) indica tempo passado/decorrido: "há dois anos". "A" (preposição) indica tempo futuro: "daqui a três meses".',
 dica:'Tempo que já passou = "há" (do verbo haver). Tempo que ainda vai chegar, contado a partir de agora, = "a".'},

{c:'pmesp', m:'Língua Portuguesa', f:'Estilo VUNESP · semântica',
 q:'Na frase "O efetivo da companhia foi ampliado no último semestre", o termo destacado pode ser substituído, sem prejuízo de sentido, por:',
 alts:['reduzido','aumentado','mantido','extinto','remanejado'],
 r:1,
 e:'"Ampliado" significa tornado maior — sinônimo de "aumentado". As demais alternativas modificam o sentido original.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · média aritmética',
 q:'O número de ocorrências atendidas por uma equipe, de segunda a sexta-feira, foi: 12, 15, 9, 18 e 16. A média diária de ocorrências nessa semana foi:',
 alts:['12','13','14','15','16'],
 r:2,
 e:'Soma: 12 + 15 + 9 + 18 + 16 = 70. Média: 70 ÷ 5 = 14 ocorrências por dia.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · MMC',
 q:'Dois policiais tiraram serviço juntos hoje. Um deles retorna à escala a cada 6 dias e o outro, a cada 8 dias. Eles voltarão a tirar serviço juntos daqui a:',
 alts:['12 dias','18 dias','24 dias','36 dias','48 dias'],
 r:2,
 e:'É o mínimo múltiplo comum: MMC(6, 8) = 24. Eles coincidem novamente em 24 dias.',
 dica:'Quando dois eventos se repetem em ciclos diferentes e você quer saber quando coincidem de novo, pense em MMC — não em MDC.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · juros simples',
 q:'Um capital de R$ 2.000,00 foi aplicado a juros simples, à taxa de 1,5% ao mês, durante 8 meses. Os juros obtidos nessa aplicação foram de:',
 alts:['R$ 180,00','R$ 200,00','R$ 220,00','R$ 240,00','R$ 260,00'],
 r:3,
 e:'J = C × i × t = 2.000 × 0,015 × 8 = R$ 240,00.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · desconto',
 q:'Um equipamento custa R$ 480,00. Na compra à vista, a loja oferece 15% de desconto. O valor pago à vista é de:',
 alts:['R$ 396,00','R$ 400,00','R$ 408,00','R$ 412,00','R$ 420,00'],
 r:2,
 e:'15% de 480 = 72. Logo, 480 − 72 = R$ 408,00 (ou 480 × 0,85 = 408).'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · grandezas inversas',
 q:'Doze operários constroem um muro em 30 dias. Mantido o mesmo ritmo de trabalho, 20 operários construiriam o mesmo muro em:',
 alts:['15 dias','16 dias','18 dias','20 dias','22 dias'],
 r:2,
 e:'Grandezas inversamente proporcionais: 12 × 30 = 360 "dias-homem". Então 360 ÷ 20 = 18 dias.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · perímetro',
 q:'Um terreno retangular tem 30 m de comprimento e 20 m de largura. Para cercá-lo completamente, serão necessários, de tela:',
 alts:['90 m','100 m','110 m','120 m','600 m'],
 r:1,
 e:'Perímetro do retângulo: 2 × (30 + 20) = 100 m. Atenção: 600 m² seria a área, não o contorno.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · probabilidade',
 q:'Em uma caixa há 4 bolas azuis e 6 bolas vermelhas. Retirando-se uma bola ao acaso, a probabilidade de ela ser azul é de:',
 alts:['1/5','2/5','3/5','1/2','4/6'],
 r:1,
 e:'São 4 azuis em um total de 10 bolas: 4/10 = 2/5.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · sequências',
 q:'Observe a sequência numérica: 3, 7, 11, 15, … O próximo termo dessa sequência é:',
 alts:['17','18','19','20','21'],
 r:2,
 e:'A sequência cresce de 4 em 4 (progressão aritmética de razão 4): 15 + 4 = 19.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · consumo',
 q:'Uma viatura consome 1 litro de combustível a cada 8 km rodados. Para percorrer 96 km, ela consumirá:',
 alts:['10 litros','11 litros','12 litros','13 litros','14 litros'],
 r:2,
 e:'96 ÷ 8 = 12 litros.'},

{c:'pmesp', m:'Matemática', f:'Estilo VUNESP · sistema de equações',
 q:'Em um pátio há carros e motocicletas, num total de 20 veículos e 64 rodas. O número de motocicletas no pátio é:',
 alts:['6','7','8','10','12'],
 r:2,
 e:'Sendo c o número de carros: 4c + 2(20 − c) = 64 → 2c + 40 = 64 → c = 12 carros. Motos: 20 − 12 = 8.'},

{c:'pmesp', m:'Conhecimentos Gerais', f:'Censo IBGE 2022',

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o poema:\n\nHá estes dias em que pressentimos na casa\na ruína da casa\ne no corpo\na morte do corpo\ne no amor\no fim do amor\nestes dias\nem que tomar o ônibus é no entanto perdê-lo\ne chegar a tempo é já chegar demasiado tarde\nnão são coisas que se expliquem\napenas são dias em que de repente sabemos\no que sempre soubemos e todos sabem\nque a madeira é apenas o que vem logo antes\nda cinza\ne por mais vidas que tenha\ncada gato\né o cadáver de um gato\n\n(Ana Martins Marques. O livro das semelhanças. São Paulo: Companhia das Letras, 2015)\n\nA partir da leitura do poema, é correto afirmar que o eu lírico expressa',
 alts:['desencantamento pelas circunstâncias presentes e tentativa de recuperar o passado.','consciência sobre a impermanência de todos os seres, sejam eles animados ou inanimados.','preocupação pelo descaso com que os humanos tratam suas vidas e as dos demais seres.','dificuldade em aceitar os obstáculos encontrados no cotidiano, como a perda de um ônibus.','nostalgia de coisas que marcaram sua vida, como as casas e os amores do passado.'],
 r:1,
 e:'O poema encadeia várias imagens de fim/transformação (casa->ruína, corpo->morte, amor->fim, madeira->cinza, gato->cadáver), mostrando que tudo, animado ou inanimado, é passageiro. As demais alternativas atribuem ao eu lírico sentimentos (nostalgia, desencantamento, indignação, dificuldade de aceitação) que não são o foco central do texto.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o poema:\n\nHá estes dias em que pressentimos na casa\na ruína da casa\ne no corpo\na morte do corpo\ne no amor\no fim do amor\nestes dias\nem que tomar o ônibus é no entanto perdê-lo\ne chegar a tempo é já chegar demasiado tarde\nnão são coisas que se expliquem\napenas são dias em que de repente sabemos\no que sempre soubemos e todos sabem\nque a madeira é apenas o que vem logo antes\nda cinza\ne por mais vidas que tenha\ncada gato\né o cadáver de um gato\n\n(Ana Martins Marques. O livro das semelhanças. São Paulo: Companhia das Letras, 2015)\n\nAssinale a alternativa em que o acréscimo de vírgula(s) está em conformidade com a norma-padrão de emprego desse sinal de pontuação.',
 alts:['Há, estes dias em que pressentimos, na casa','apenas são, dias em que, de repente sabemos','em que tomar o ônibus é, no entanto, perdê-lo','e chegar a tempo, é já chegar demasiado tarde','que a madeira, é apenas o que vem logo antes'],

 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nNos últimos tempos, rompeu-se o elo colaborativo entre gerações. Nas famílias tradicionais, por milhares de anos, ter filhos significava que, quando os pais envelhecessem e não pudessem mais trabalhar, os filhos adultos cuidariam deles. Assim, garantia-se um equilíbrio entre a idade adulta produtiva e os dependentes (crianças e idosos) em uma cadeia de solidariedade intergeracional. Mas o que acontece quando a maioria dos adultos não tem filhos, como vem acontecendo?\n\nNos países nórdicos, políticas públicas garantem lares dignos para idosos e saúde gratuita para a população envelhecida. O que antes era responsabilidade das famílias, agora é assegurado em escala coletiva. Nos apartamentos exíguos da família nuclear, não há espaço para os avós, mas ao menos há apoio público. Já em países como EUA, e sobretudo no Brasil, os idosos enfrentam apoio familiar declinante e políticas sociais precárias. Os asilos privados? Caríssimos e mal administrados - quando não criminosamente negligenciados. Sistemas que só visam lucro máximo não são opção de gestão adequada - pra dizer o mínimo. E a ansiedade acerca de nosso futuro quando idosos já é sentida quando estamos na meia idade.\n\n(Ladislau Dowbor. Adaptado)\n\nQuanto à comparação feita no texto entre o Brasil e outros países, é correto afirmar:',
 alts:['Os países nórdicos e o Brasil negligenciam tanto o papel do Estado quanto o da família no cuidado com os mais velhos.','Nos países nórdicos, a responsabilidade com os idosos permanece majoritariamente com as famílias, enquanto no Brasil o Estado complementa a assistência.','Os asilos privados tanto no Brasil quanto nos EUA são em geral bem administrados, mas inacessíveis para a maioria da população.','A atuação das políticas públicas nos países nórdicos assegura dignidade aos idosos, enquanto no Brasil os asilos são opções insatisfatórias.','Os modelos de gestão baseados no lucro máximo vigoram nos países nórdicos, mas não no Brasil, e são uma solução adequada para o cuidado dos idosos.'],
 r:3,
 e:'O texto afirma que nos países nórdicos as políticas públicas garantem lares dignos aos idosos, enquanto no Brasil os asilos privados são caríssimos e mal administrados. As demais alternativas invertem ou distorcem essas informações.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nNos últimos tempos, rompeu-se o elo colaborativo entre gerações. Nas famílias tradicionais, por milhares de anos, ter filhos significava que, quando os pais envelhecessem e não pudessem mais trabalhar, os filhos adultos cuidariam deles. Assim, garantia-se um equilíbrio entre a idade adulta produtiva e os dependentes (crianças e idosos) em uma cadeia de solidariedade intergeracional. Mas o que acontece quando a maioria dos adultos não tem filhos, como vem acontecendo?\n\nNos países nórdicos, políticas públicas garantem lares dignos para idosos e saúde gratuita para a população envelhecida. O que antes era responsabilidade das famílias, agora é assegurado em escala coletiva. Nos apartamentos exíguos da família nuclear, não há espaço para os avós, mas ao menos há apoio público. Já em países como EUA, e sobretudo no Brasil, os idosos enfrentam apoio familiar declinante e políticas sociais precárias. Os asilos privados? Caríssimos e mal administrados - quando não criminosamente negligenciados. Sistemas que só visam lucro máximo não são opção de gestão adequada - pra dizer o mínimo. E a ansiedade acerca de nosso futuro quando idosos já é sentida quando estamos na meia idade.\n\n(Ladislau Dowbor. Adaptado)\n\nConsidere os trechos:\n• Nos apartamentos exíguos da família nuclear, não há espaço para os avós... (2º parágrafo)\n• ...sobretudo no Brasil, os idosos enfrentam apoio familiar declinante... (2º parágrafo)\nNo contexto em que foram empregadas, as palavras destacadas têm como sinônimos, respectivamente,',
 alts:['íntimos e descendente.','extensos e grave.','apertados e excludente.','reduzidos e crescente.','pequenos e decadente.'],
 r:4,
 e:'\'Exíguos\' significa pequenos, apertados, e \'declinante\' significa em decadência/diminuição. A alternativa correta é \'pequenos e decadente\'. As demais trazem ao menos um sinônimo incorreto (por exemplo, \'crescente\' é o oposto de \'declinante\').',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nAssassinato digital\n\nAo contrário de tempos passados, quando sumir com alguém exigia certo grau de dificuldade e até risco criminal, hoje tornou-se facílimo dar fim a uma pessoa. Bastam um dedo e algumas teclas. É possível mudar completamente o círculo de amizades, sumir da turma, buscar novos ares, sem grandes enfrentamentos. Um amigo estava falando de sua ex: "Bloqueei". Explicou que bloqueou em tudo: no WhatsApp, no Instagram, no Face. Em qualquer outra rede social, uma pessoa existe ou não existe. Se é bloqueada em todos os canais em que pode se comunicar com a outra, tecnicamente não existe mais. Simplesmente deixa de estar presente. Mesmo porque, na atualidade, a presença é mais digital que física em um número imenso de casos.\n\nHouve um tempo em que eu me admirava ao dar uma "limpa" no celular. Por que tanta gente, com quem nunca converso, tantos endereços que já não fazem parte do meu dia a dia? Para meu susto, recebi reclamações: "Por que você me deletou?", "Me bloqueou?". Na prática, respondia: "Porque a gente não se falava mais". Descobri que estar na minha rede mesmo sem papo era um modo de afirmar a existência da pessoa em minha vida. Portanto, era ofensivo ser excluído. Parecia sem sentido. Mas entendi. Se a pessoa for deletada ou, pior, bloqueada, simplesmente deixa de existir. A comparação é forte, mas inevitável: morre.\n\nEu ainda acredito nas relações de carne e osso, nos abraços, nos encontros longos e profundos. Mas descubro que os relacionamentos digitais tomaram um espaço impressionante. Deletar equivale a dizer adeus. E dizer adeus é sempre uma forma de luto.\n\n(Walcyr Carrasco. Adaptado)\n\nA respeito das transformações nas formas de relacionamento interpessoal com as tecnologias digitais, o autor do texto',
 alts:['reconhece o impacto das redes sociais, mas valoriza, acima delas, as relações presenciais e concretas.','afirma que, no passado, as relações humanas eram menos sólidas, pois não havia redes sociais para mantê-las.','considera que o bloqueio em redes sociais não gera maiores consequências para a percepção da existência do outro.','entende que excluir alguém das redes sociais, nos dias de hoje, é um crime mais grave do que matar uma pessoa.','defende que as relações digitais substituíram de forma saudável e definitiva os vínculos presenciais.'],
 r:0,
 e:'No último parágrafo, o autor diz \'Eu ainda acredito nas relações de carne e osso... Mas descubro que os relacionamentos digitais tomaram um espaço impressionante\', reconhecendo o peso das redes sociais sem deixar de valorizar as relações presenciais acima delas. As demais alternativas contradizem o texto.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\n\nAssassinato digital\n\nAo contrário de tempos passados, quando sumir com alguém exigia certo grau de dificuldade e até risco criminal, hoje tornou-se facílimo dar fim a uma pessoa. Bastam um dedo e algumas teclas. É possível mudar completamente o círculo de amizades, sumir da turma, buscar novos ares, sem grandes enfrentamentos. Um amigo estava falando de sua ex: "Bloqueei". Explicou que bloqueou em tudo: no WhatsApp, no Instagram, no Face. Em qualquer outra rede social, uma pessoa existe ou não existe. Se é bloqueada em todos os canais em que pode se comunicar com a outra, tecnicamente não existe mais. Simplesmente deixa de estar presente. Mesmo porque, na atualidade, a presença é mais digital que física em um número imenso de casos.\n\nHouve um tempo em que eu me admirava ao dar uma "limpa" no celular. Por que tanta gente, com quem nunca converso, tantos endereços que já não fazem parte do meu dia a dia? Para meu susto, recebi reclamações: "Por que você me deletou?", "Me bloqueou?". Na prática, respondia: "Porque a gente não se falava mais". Descobri que estar na minha rede mesmo sem papo era um modo de afirmar a existência da pessoa em minha vida. Portanto, era ofensivo ser excluído. Parecia sem sentido. Mas entendi. Se a pessoa for deletada ou, pior, bloqueada, simplesmente deixa de existir. A comparação é forte, mas inevitável: morre.\n\nEu ainda acredito nas relações de carne e osso, nos abraços, nos encontros longos e profundos. Mas descubro que os relacionamentos digitais tomaram um espaço impressionante. Deletar equivale a dizer adeus. E dizer adeus é sempre uma forma de luto.\n\n(Walcyr Carrasco. Adaptado)\n\nConsidere o trecho:\n• Houve um tempo em que eu me admirava ao dar uma "limpa" no celular. Por que tanta gente, com quem nunca converso, tantos endereços que já não fazem parte do meu dia a dia?\nAs expressões destacadas ("em que", "com quem" e "que") podem ser substituídas, respectivamente e em conformidade com a norma-padrão de emprego dos pronomes, por:',
 alts:['no qual … que … onde','de que … com as quais … nos quais','onde … que … os quais','onde … de quem … nos quais','no qual … com a qual … os quais'],
 r:4,
 e:'\'Em que\' retoma \'tempo\' (masculino singular) e pode virar \'no qual\'; \'com quem\' retoma \'gente\' (gramaticalmente feminino singular) e pode virar \'com a qual\'; \'que\' retoma \'endereços\' (masculino plural) e pode virar \'os quais\'. A combinação correta é \'no qual … com a qual … os quais\'.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a alternativa redigida em conformidade com a norma-padrão de concordância.',
 alts:['Durante a nossa infância era comum brincadeiras em que se respeitava as regras do jogo.','Haviam muitas crianças que brincavam no parque junto à professora que a acompanhava.','Foi preciso que as crianças permanecessem no parque depois daquele fatídico intervalo.','Comprou-se para o pátio da escola alguns brinquedos novos que foi alvo de depredação.','Para aprender a se balançar bem, é necessário muita prudência nas primeiras tentativas.'],

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Ao iniciar mais um dia de trabalho, um pequeno comércio tinha R$ 1.280,00 de dinheiro em caixa na loja. Durante esse dia, aconteceram os seguintes eventos:\n• Pagamento de fornecedor: R$ 675,00\n• Recebimento ao realizar venda: R$ 42,00\n• Recebimento ao realizar venda: R$ 67,00\n• Recebimento ao realizar venda: R$ 148,00\n• Recebimento ao realizar venda: R$ 95,00\n• Pagamento de fornecedor: R$ 742,00\n• Recebimento ao realizar venda: R$ 127,00\n• Pagamento de fornecedor: R$ 159,00\nConsiderando que todos esses pagamentos e recebimentos foram feitos utilizando apenas o dinheiro do caixa, é correto afirmar que o saldo em caixa, após essas movimentações, foi de',

 r:1,
 e:'1.280 - 675 + 42 + 67 + 148 + 95 - 742 + 127 - 159 = 183. O saldo final é R$ 183,00.',

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O resultado do censo populacional em um município mostrou que 17.076 habitantes são pessoas do sexo feminino, representando 3/5 da população total. O censo também indicou que 1/3 das pessoas do sexo feminino do município tem menos de 30 anos de idade e que 3/8 das pessoas do sexo masculino do município têm 30 anos de idade ou mais.\nA Secretaria de Saúde desse município encomendou 15 mil doses de uma vacina para ser aplicada na população com menos de 30 anos de idade; logo, se todas as pessoas nessa faixa etária receberem uma dose dessa vacina, o número de doses que sobrará da encomenda será',
 alts:['4.822.','2.268.','2.794.','2.193.','5.039.'],
 r:3,
 e:'População total = 17.076 ÷ (3/5) = 28.460; homens = 11.384. Mulheres <30 = 17.076/3 = 5.692. Homens ≥30 = 3/8 × 11.384 = 4.269, logo homens <30 = 11.384 - 4.269 = 7.115. Total <30 = 5.692 + 7.115 = 12.807. Sobra = 15.000 - 12.807 = 2.193 doses.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O gerente de um escritório resolveu distribuir para três de seus funcionários os 378 processos que precisavam ser arquivados. A quantidade de processos que cada funcionário arquivará será diretamente proporcional às horas que cada um deles tem disponíveis para o trabalho, sendo que um deles dispõe de 3 horas, outro dispõe de 5 horas e outro dispõe de 6 horas.\nDistribuídos dessa maneira, a quantidade somada de processos que os dois funcionários com menos horas disponíveis receberão para arquivar supera a quantidade a ser recebida pelo outro funcionário em',
 alts:['65.','70.','58.','54.','48.'],
 r:3,
 e:'Total de partes = 3+5+6 = 14; cada parte = 378/14 = 27. Assim, 3h → 81, 5h → 135, 6h → 162. Os dois funcionários com menos horas (3h e 5h) recebem juntos 81+135=216, que supera os 162 do outro funcionário em 216-162=54.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Sabe-se que o preço de um produto na loja A é o triplo do preço do mesmo produto na loja B. O lojista da loja A aplicou um desconto de x% no preço desse produto, o lojista da loja B aplicou um aumento também de x% no preço desse produto, e, após esses reajustes, o novo preço da loja A passou a ser o dobro do novo preço da loja B.\nCom essas informações, é correto afirmar que o valor de x é',
 alts:['25.','10.','30.','15.','20.'],
 r:4,
 e:'Seja p o preço em B; em A é 3p. Após os reajustes: 3p(1 - x/100) = 2p(1 + x/100). Simplificando: 3 - 3x/100 = 2 + 2x/100, logo 1 = 5x/100, ou seja, x = 20.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'A sequência a seguir foi criada com um padrão lógico matemático:\n5, 5, 10, 20, 60, 10, 10, 20, 40, 120, 15, 15, 30, 60, 180, 20, 20, 40, ...\nSeja J o 35o elemento dessa sequência, K o 44o elemento e L o 51o elemento.\nO valor numérico da expressão J - K - L é igual a',
 alts:['175.','180.','170.','185.','165.'],
 r:3,
 e:'A sequência é formada em blocos de 5 termos; o bloco k (k=1,2,3,...) é [5k, 5k, 10k, 20k, 60k]. O 35o termo é o último termo do bloco 7: 60×7=420 (J). O 44o termo é o 4o termo do bloco 9: 20×9=180 (K). O 51o termo é o 1o termo do bloco 11: 5×11=55 (L). J - K - L = 420 - 180 - 55 = 185.',
 ano:2025},

{c:'pmesp', m:'Matemática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Considere que as afirmações a seguir são verdadeiras:\nI. Todo jogador de futebol é um atleta.\nII. Há pessoas que gostam de música e que são jogadores de futebol.\nA partir dessas informações, é logicamente correto concluir que',
 alts:['há algum atleta que gosta de música.','não há pessoa que seja jogador de futebol e goste de música.','os atletas que gostam de música não são jogadores de futebol.','todo atleta gosta de música.','qualquer pessoa que gosta de música é um atleta.'],
 r:0,
 e:'Como todo jogador de futebol é atleta (I) e existe interseção não vazia entre \'gosta de música\' e \'jogador de futebol\' (II), essa interseção também pertence ao conjunto dos atletas. Logo, existe pelo menos um atleta que gosta de música. As demais alternativas extrapolam o que as premissas garantem.',

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\nQuando falamos da Primeira Guerra Mundial, falamos muito sobre as batalhas, os novos armamentos, as estratégias militares, as origens e os desdobramentos do conflito. Isso tudo é muito importante. Mas precisamos falar mais da vida cotidiana, da história social, explorar a vida e os sentimentos dos soldados que participaram dos combates. Eles têm muito a dizer, e a partir dessas falas podemos compreender melhor as nuances da Grande Guerra. Mais do que um sistema de posição e fortificação, as trincheiras eram um ecossistema cultural, extremamente dinâmico e complexo.\n(Bruno Leal, "A vida cotidiana nas trincheiras da Primeira Guerra Mundial", Boletim Café História. Adaptado)\nEm relação às trincheiras na Primeira Guerra Mundial, é correto afirmar que',
 alts:['surgiram a partir das convenções de guerra, que estabeleceram limites para os conflitos entre os exércitos e a população civil e restringiram o enfrentamento armado à linha de frente da guerra, reduzindo drasticamente a mortalidade dos civis.','revelaram as ambiguidades da guerra, pois expressavam, ao mesmo tempo, o ódio nacionalista dos militares e o reconhecimento empático entre soldados de exércitos rivais, como no caso da trégua de Natal de 1914.','se restringiram aos combates de guerra ocorridos fora do continente europeu, especialmente na África e na Ásia, enquanto o conflito na Europa ficou marcado pelo avanço por terra da Alemanha em relação à França.','se constituíram como um espaço privilegiado de representação dos interesses nacionais de cada país envolvido no conflito, tendo em vista a participação equânime de todas as classes sociais na linha de frente da guerra.','marcaram a última grande guerra antes do desenvolvimento tecnológico da indústria bélica, em um conflito caracterizado pela utilização de armas não automáticas e pela inexistência de granadas ou bombardeios aéreos.'],
 r:1,
 e:'A trégua de Natal de 1914, em que soldados inimigos confraternizaram nas trincheiras, ilustra bem a ambiguidade entre o ódio nacionalista da guerra e momentos de empatia humana entre combatentes rivais. As demais alternativas trazem afirmações historicamente incorretas.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Leia o texto:\nAs Constituições de 1934 e de 1946 marcaram períodos democráticos no país. A Carta de 1934 dava amplos poderes aos Estados e assegurava preponderância do Poder Legislativo. A de 1946, elaborada após o período autoritário do Estado Novo, reforçou direitos individuais e políticos e estabeleceu independência dos Poderes Judiciário e Legislativo e separação entre igreja e Estado.\n(Agência Senado. Adaptado)\nAinda que tenha reforçado direitos políticos, a Constituição de 1946 não assegurou o voto',
 alts:['das mulheres.','obrigatório.','secreto.','dos analfabetos.','direto.'],
 r:3,
 e:'A Constituição de 1946 manteve a exclusão dos analfabetos do direito de voto, restrição que só foi extinta pela Constituição de 1988. O voto feminino já havia sido conquistado em 1932, e o voto secreto, direto e obrigatório já eram características do sistema eleitoral da época.',
 ano:2025},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Fenômeno essencial para a manutenção da vida na Terra, que consiste na retenção de grande parte do calor irradiado pela superfície terrestre nas partículas de gases presentes na atmosfera, que absorvem a radiação infravermelha emitida pela Terra, impedindo que todo esse calor se dissipe para o espaço.\nO conceito apresentado refere-se',

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O Ministério da Ciência, Tecnologia e Inovação publicou em junho de 2025 a versão final do Plano Brasileiro de Inteligência Artificial, que estabelece as diretrizes para o desenvolvimento ético e sustentável da inteligência artificial no país até 2028. O plano prevê R$ 23,03 bilhões em investimentos públicos e privados, distribuídos entre ações de curto prazo e programas estruturantes de médio e longo prazo.\n(telesintese. Adaptado)\nEntre os pilares do Plano Brasileiro de Inteligência Artificial está o de',
 alts:['concentrar a pesquisa em inteligência artificial no setor militar.','permitir a livre exploração de dados pessoais por empresas estrangeiras.','garantir a soberania tecnológica nacional com inclusão social.','promover a substituição de empregos humanos por sistemas autônomos.','ampliar o uso de sistemas automatizados desconsiderando impactos ambientais.'],
 r:2,
 e:'O Plano Brasileiro de IA tem entre seus eixos centrais a soberania tecnológica nacional aliada à inclusão social e ao desenvolvimento ético. As demais alternativas contradizem os objetivos declarados do plano.',

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O Brasil responde por quase 96% dos casos de chikungunya confirmados neste ano nas Américas, segundo dados divulgados pela Organização Mundial da Saúde (OMS). O País também contabiliza cerca de 72% das mortes pela doença no mundo. A OMS relaciona o avanço da doença impulsionada pela urbanização desordenada, falta de saneamento, falhas em programas de controle dos vetores e pelas mudanças climáticas.\n(CNN. Adaptado)\nEntre as causas que contribuíram para o avanço dessa doença, encontram-se',
 alts:['a poluição atmosférica, o crescimento industrial e a escassez de recursos hídricos.','a urbanização desordenada, a falta de saneamento básico e o aumento do comércio internacional.','a expansão das áreas rurais, o uso de pesticidas e a criação extensiva de gado.','o desmatamento amazônico, o aumento da exportação de commodities e a redução da umidade do ar.','o excesso de chuvas, o uso de agrotóxicos e a concentração de atividades agrícolas.'],
 r:1,
 e:'O texto atribui o avanço da doença à \'urbanização desordenada\' e à \'falta de saneamento\', exatamente as causas citadas na alternativa correta. As demais trazem fatores (poluição industrial, agropecuária, desmatamento, excesso de chuvas) não mencionados no texto.',
 ano:2025},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Em uma planilha de escala de serviço no MS-Excel 2016 (versão em português brasileiro), a coluna A contém o identificador do policial, a coluna B contém as horas cumpridas pelo policial no mês, em formato numérico, e a coluna C indica o pelotão ("A", "B" ou "C"). A primeira linha contém o cabeçalho das colunas (A1:C1) e os dados estão completamente preenchidos no intervalo de células A2:C31, sendo que cada uma das 30 linhas representa um policial diferente. O comandante pede a quantidade de policiais do pelotão A que cumpriram 160 horas ou mais no mês e o soldado decide usar uma fórmula em E2.\nConsiderando o separador ponto e vírgula (;) no Excel em pt-BR, qual fórmula atende ao pedido sem criar colunas auxiliares?',
 alts:['=CONT.SE(C2:C31;"A")','=CONT.VALORES(B2:B31;"A")','=SE(C2:C31="A";B2:B31>=160)','=CONT.SES(C2:C31;"A";B2:B31;">=160")','=SOMASE(B2:B31;">=160")'],
 r:3,
 e:'CONT.SES (equivalente a COUNTIFS) permite contar registros que atendem a múltiplos critérios simultaneamente - pelotão igual a \'A\' e horas maiores ou iguais a 160 - sem precisar de colunas auxiliares. CONT.SE só aceita um critério, CONT.VALORES apenas conta células não vazias, SE não funciona dessa forma para contagem, e SOMASE somaria valores em vez de contá-los.',
 ano:2025},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'No Microsoft Word 2016 (em português do Brasil), um soldado está editando um relatório fotográfico com 12 imagens. As legendas das figuras foram inseridas por meio do comando Referências → Inserir legenda, e um Índice de Ilustrações foi criado ao final do documento. A opção "Controlar Alterações" está desativada e não existem campos em cabeçalhos, rodapés, notas de rodapé ou caixas de texto. Após mover duas imagens de posição, o usuário percebe que a numeração das legendas automáticas e o Índice de Ilustrações ficaram desatualizados. Para atualizar todas as legendas automáticas e o Índice de Ilustrações, o usuário deve pressionar ___ para selecionar todo o conteúdo do corpo do documento, depois pressionar ___ para atualizar todos os campos selecionados e, por fim, clicar sobre o Índice de Ilustrações e escolher Atualizar índice inteiro.\nAssinale a alternativa que preenche, correta e respectivamente, as lacunas do enunciado.',
 alts:['Ctrl+Shift+End … F5','Ctrl+E ... F9','Ctrl+A ... F9','Ctrl+U ... F5','Ctrl+S … F5'],
 r:2,
 e:'Ctrl+A seleciona todo o conteúdo do documento, e F9 é o atalho padrão do Word para atualizar campos selecionados, como legendas numeradas e índices. As demais combinações não correspondem às funções descritas no enunciado.',
 ano:2025},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'O soldado precisa imprimir a página de um mapa on-line com rotas de deslocamento e quer checar o layout antes de gastar papel e tinta. Ele acessa o site institucional no navegador Google Chrome (Versão 141.0.7390.108 - 64 bits) em um computador com sistema operacional Windows, em configuração padrão. Nos navegadores modernos, existe um atalho de teclado que abre diretamente a interface de impressão com visualização prévia automática do documento, permitindo verificar como o conteúdo será impresso no papel e ajustar configurações como Orientação e Margens antes de enviar para a impressora física.\nNesse contexto, qual atalho de teclado o soldado deve utilizar para acessar diretamente a interface padrão de impressão com visualização prévia no Google Chrome?',
 alts:['Ctrl+P','Ctrl+F','Ctrl+S','Ctrl+N','Ctrl+I'],
 r:0,
 e:'Ctrl+P é o atalho universal para abrir a interface de impressão com pré-visualização no Google Chrome e na maioria dos navegadores. Ctrl+F abre a busca na página, Ctrl+S salva, Ctrl+N abre uma nova janela e Ctrl+I não possui função de impressão no Chrome.',
 ano:2025},

{c:'pmesp', m:'Noções de Adm. Pública', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Diante da instauração de uma grave crise nacional de segurança pública impulsionada pela atuação de uma máfia, a Presidência da República, por meio do Ministério da Defesa, avalia a possibilidade do acionamento das forças auxiliares e reserva para apoiar o Exército Brasileiro na atuação terrestre. Caso sejam acionadas, além das polícias militares, o exército poderá contar também com',
 alts:['as guardas metropolitanas.','os corpos de bombeiros militares.','as polícias civis.','a polícia federal.','as polícias penais.'],

{c:'pmesp', m:'Noções de Adm. Pública', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Após sentença transitada em julgado, um oficial da Polícia Militar foi condenado na Justiça comum à pena privativa de liberdade por dois anos. Posteriormente, por meio de decisão do Tribunal de Justiça Militar do Estado, esse mesmo oficial foi julgado indigno do oficialato. Dada essa situação, o oficial militar',
 alts:['perderá o posto, mas não a patente, pois já recebeu como punição a privação da liberdade.','não perderá nem o posto nem a patente, pois foi condenado pela Justiça comum.','perderá a patente, mas não o posto, pois a condenação à pena privativa de liberdade foi inferior a três anos.','não perderá nem o posto nem a patente, pois não cabe ao Tribunal de Justiça Militar do Estado essa decisão.','perderá o posto e a patente, uma vez que os elementos necessários para tanto estão presentes.'],

{c:'pmesp', m:'Noções de Adm. Pública', f:'VUNESP 2025 · PM-ESP Soldado 2ª Classe',
 q:'Por meio da plataforma Fala.SP, um cidadão apresentou pedido de acesso a informações de interesse público destinadas à Polícia Militar do Estado de São Paulo. Dentro do prazo legal, o pedido formulado por esse cidadão foi indeferido pelo órgão militar. No inteiro teor de decisão de negativa de acesso, verificou-se que a disponibilização das informações requeridas comprometeria atividades de inteligência, bem como de investigação ou fiscalização em andamento, relacionadas com a prevenção de infrações. Como consequência desse motivo, as informações requeridas apresentavam graus de sigilo ultrassecreto, secreto e reservado, o que corresponde, respectivamente, aos seguintes prazos máximos:',
 alts:['25, 20 e 15 anos.','20, 15 e 10 anos.','25, 15 e 5 anos.','20, 10 e 5 anos.','25, 10 e 5 anos.'],
 r:2,
 e:'Conforme a Lei de Acesso à Informação (Lei nº 12.527/2011, art. 24), os prazos máximos de restrição de acesso a informações classificadas são de 25 anos para as ultrassecretas, 15 anos para as secretas e 5 anos para as reservadas.',
 ano:2025},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'As opções abaixo mostram definições de palavras. Assinale aquela que mostra um tipo de definição não técnica, diferente das demais por seu caráter criativo.',

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que todos os sinais de pontuação foram bem-empregados.\n(A) A verdadeira questão não é se as máquinas pensam, mas se os homens pensam.\n(B) Antigamente, a cidade era o mundo hoje o mundo é uma cidade.\n(C) Ciência, sem consciência, não é senão, uma ruína da alma.\n(D) A ciência é o grande antídoto do veneno, do entusiasmo, e da superstição.\n(E) Genética é uma coisa, hereditária.',
 alts:['A verdadeira questão não é se as máquinas pensam, mas se os homens pensam.','Antigamente, a cidade era o mundo hoje o mundo é uma cidade.','Ciência, sem consciência, não é senão, uma ruína da alma.','A ciência é o grande antídoto do veneno, do entusiasmo, e da superstição.','Genética é uma coisa, hereditária.'],
 r:0,
 e:'A alternativa A está corretamente pontuada. As demais têm vírgulas indevidas (separando termos que não deveriam ser separados, como sujeito/predicado ou elementos de uma enumeração) ou falta de vírgula entre orações (B).',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que o sinal indicativo da crase está bem-empregado.\n(A) É difícil ensinar o alfabeto à garotos atualmente, pois todos pensam que o "vê" vem depois do "tê".\n(B) Uma mão lava à outra e a poluição suja as duas.\n(C) O progresso é a injustiça que cada geração comete em relação à geração precedente.\n(D) Vou usar o computador com reservas. Esse equipamento invade à privacidade humana.\n(E) O automóvel resolve à ansiedade dos homens.',
 alts:['É difícil ensinar o alfabeto à garotos atualmente, pois todos pensam que o "vê" vem depois do "tê".','Uma mão lava à outra e a poluição suja as duas.','O progresso é a injustiça que cada geração comete em relação à geração precedente.','Vou usar o computador com reservas. Esse equipamento invade à privacidade humana.','O automóvel resolve à ansiedade dos homens.'],
 r:2,
 e:'Em C há crase correta: a locução \'em relação a\' exige a preposição \'a\', que se funde com o artigo feminino \'a\' de \'geração\' (à geração). Nas demais, o verbo (invadir, resolver) ou o substantivo não exige a preposição \'a\' antes de palavra feminina determinada, ou o termo seguinte é masculino/indeterminado, não cabendo crase.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'As frases abaixo mostram locuções adjetivas que foram substituídas por adjetivos, indicados entre parênteses. Entre as substituições propostas, assinale aquela que é inadequada.\n(A) Um beijo de minha mãe (materno) fez de mim um pintor.\n(B) O importante na obra de arte (artística) é o espanto.\n(C) A obra-prima é uma variedade do milagre (milagrosa).\n(D) Apreciar os defeitos do próximo (alheios) é ter talento?\n(E) Nenhuma arte pode imitar a indústria da natureza (natural).',
 alts:['Um beijo de minha mãe (materno) fez de mim um pintor.','O importante na obra de arte (artística) é o espanto.','A obra-prima é uma variedade do milagre (milagrosa).','Apreciar os defeitos do próximo (alheios) é ter talento?','Nenhuma arte pode imitar a indústria da natureza (natural).'],
 r:2,
 e:'Em C, o adjetivo \'milagrosa\' deveria concordar e substituir semanticamente \'do milagre\' qualificando \'variedade\', mas \'milagrosa\' sugere que a obra-prima É milagrosa, e não que é uma espécie/variedade DE milagre — a substituição altera o sentido original, sendo inadequada.',
 ano:2024},

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',

 r:4,

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a frase em que a palavra sublinhada \'luz\' está empregada em sentido figurado.\n(A) A primeira criatura que Deus fez foi a luz.\n(B) Tudo quanto está debaixo da terra, o tempo porá a descoberto à luz do sol.\n(C) A luz é o ouro das casas dos pobres.\n(D) A luz da lua é vista como romântica.\n(E) As palavras dele trouxeram luz a nosso estudo.',

{c:'pmesp', m:'Língua Portuguesa', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Observe o seguinte texto:\n"A casa era pequena, no centro do terreno, toda branca com janelas azuis, como todas as da pequena cidade. Após passar pela porta, o visitante se deparava com cômodos pequenos, mas simpáticos, muito bem arrumados. Na parte de trás, um terreno grande com grande diversidade de árvores frutíferas."\nA observação correta em relação a ele é:\n(A) o texto é descritivo e a descrição realizada é de caráter físico, tendo por objeto uma casa, que é focalizada de fora para dentro.\n(B) o texto é narrativo, contando a história de uma casa em uma cidade do interior.\n(C) o texto é narrativo e descritivo, pois, ao mesmo tempo que nos dá a história da casa, mostra detalhes dela.\n(D) a descrição realizada é feita de forma estática, em que observador e objeto estão imóveis.\n(E) a casa que é objeto da descrição é observada de cima para baixo.',
 alts:['o texto é descritivo e a descrição realizada é de caráter físico, tendo por objeto uma casa, que é focalizada de fora para dentro.','o texto é narrativo, contando a história de uma casa em uma cidade do interior.','o texto é narrativo e descritivo, pois, ao mesmo tempo que nos dá a história da casa, mostra detalhes dela.','a descrição realizada é feita de forma estática, em que observador e objeto estão imóveis.','a casa que é objeto da descrição é observada de cima para baixo.'],
 r:0,
 e:'O texto descreve a casa começando pelo exterior (fachada branca, janelas) e só depois entra nos cômodos internos, ou seja, vai de fora para dentro — é descrição física, não há narrativa (não há ações/eventos encadeados no tempo).',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Um dado número somado com a sua terça parte dá como resultado 228. A soma dos algarismos do número dado é\n(A) 5.\n(B) 6.\n(C) 7.\n(D) 8.\n(E) 9.',

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Em certa loja um artigo que custa 80 reais pode ser comprado, na promoção, por 66 reais. O valor do desconto é\n(A) 14%.\n(B) 16,5%.\n(C) 17,5%.\n(D) 18%.\n(E) 19,5%.',
 alts:['14%.','16,5%.','17,5%.','18%.','19,5%.'],
 r:2,
 e:'Desconto em reais: 80 - 66 = 14. Em percentual: 14/80 = 0,175 = 17,5%.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Em uma lanchonete todos os sanduíches têm o mesmo preço e todos os sucos têm mesmo preço. Certo dia, Joana e Laura compraram, nessa lanchonete, 2 sanduíches e 3 sucos pagando o total de 51 reais. Na semana seguinte, as duas levaram Maria a essa lanchonete. Elas compraram 3 sanduíches e 4 sucos e pagaram o total de 72 reais. Nessa lanchonete o preço do sanduíche é\n(A) 9 reais.\n(B) 10 reais.\n(C) 11 reais.\n(D) 12 reais.\n(E) 13 reais.',
 alts:['9 reais.','10 reais.','11 reais.','12 reais.','13 reais.'],
 r:3,
 e:'Sistema: 2s+3j=51 e 3s+4j=72. Multiplicando a primeira por 3 e a segunda por 2: 6s+9j=153 e 6s+8j=144. Subtraindo: j=9. Substituindo: 2s+27=51 → s=12.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Uma máquina leva 2 minutos e 15 segundos (2min15s) para imprimir e encadernar certo livro. Para imprimir e encadernar 24 exemplares desse livro, trabalhando continuamente, a máquina levará\n(A) 50min.\n(B) 51min45s.\n(C) 52min30s.\n(D) 53min15s.\n(E) 54min.',
 alts:['50min.','51min45s.','52min30s.','53min15s.','54min.'],
 r:4,
 e:'2min15s = 135s. Para 24 livros: 24 × 135 = 3240s = 54min exatos (3240/60=54).',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Em um encontro de 57 Policiais Militares, há apenas sargentos, cabos e soldados. Para cada cabo, há 5 soldados, e para cada sargento, há 3 cabos. O número de soldados nesse encontro é igual a\n(A) 50.\n(B) 48.\n(C) 45.\n(D) 42.\n(E) 40.',
 alts:['50.','48.','45.','42.','40.'],
 r:2,
 e:'Seja s = nº de sargentos. Cabos = 3s. Soldados = 5×(3s) = 15s. Total: s+3s+15s = 19s = 57 → s=3. Soldados = 15×3 = 45.',
 ano:2024},

{c:'pmesp', m:'Matemática', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Um número N é tal que dividido por 6 deixa resto 2 e dividido por 8 também deixa resto 2. A soma dos algarismos do menor número N (maior que os divisores) que satisfaz essas condições é\n(A) 8.\n(B) 7.\n(C) 6.\n(D) 5.\n(E) 4.',
 alts:['8.','7.','6.','5.','4.'],
 r:0,
 e:'N-2 deve ser múltiplo de 6 e de 8, logo múltiplo de mmc(6,8)=24. O menor N nessas condições é N=26 (24+2). Soma dos algarismos de 26: 2+6=8.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'O plano Schlieffen, nomeado em homenagem ao seu idealizador, o conde Schlieffen, foi uma estratégia militar implementada pela Alemanha no início da Primeira Guerra Mundial. Assinale a afirmativa que apresenta corretamente os objetivos do plano Schlieffen.\n(A) O plano tinha como objetivo provocar o desgaste do inimigo, visando a uma guerra de trincheiras em solo alemão, como uma medida preventiva frente ao conhecimento do plano russo de ataque à Alemanha.\n(B) O plano tinha como objetivo prolongar o conflito, adotando a tática de empregar gradualmente as forças militares alemãs nos primeiros confrontos com a Rússia e, posteriormente, com a França.\n(C) O plano tinha como objetivo atacar a França através da Bélgica, contornando as defesas francesas e empregando um alto investimento militar, com a expectativa de uma rápida vitória alemã.\n(D) O plano tinha como objetivo empreender ataques frontais nas duas frentes, francesa e russa, simultaneamente, visando desmoralizar os exércitos inimigos, que culminaria na tomada de Paris e o armistício com a Rússia.\n(E) O plano tinha como objetivo adotar uma postura defensiva contra os ataques russos e franceses, priorizando investimentos em fortificações nas fronteiras do território alemão.',
 alts:['O plano tinha como objetivo provocar o desgaste do inimigo, visando a uma guerra de trincheiras em solo alemão, como uma medida preventiva frente ao conhecimento do plano russo de ataque à Alemanha.','O plano tinha como objetivo prolongar o conflito, adotando a tática de empregar gradualmente as forças militares alemãs nos primeiros confrontos com a Rússia e, posteriormente, com a França.','O plano tinha como objetivo atacar a França através da Bélgica, contornando as defesas francesas e empregando um alto investimento militar, com a expectativa de uma rápida vitória alemã.','O plano tinha como objetivo empreender ataques frontais nas duas frentes, francesa e russa, simultaneamente, visando desmoralizar os exércitos inimigos, que culminaria na tomada de Paris e o armistício com a Rússia.','O plano tinha como objetivo adotar uma postura defensiva contra os ataques russos e franceses, priorizando investimentos em fortificações nas fronteiras do território alemão.'],
 r:2,
 e:'O plano Schlieffen previa invadir a França rapidamente através da neutra Bélgica, driblando as fortificações francesas na fronteira, para vencer no Ocidente antes que a Rússia mobilizasse suas tropas no Oriente.',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Assinale a afirmativa que descreve corretamente as inovações introduzidas pelas constituições brasileiras do período contemporâneo.\n(A) A constituição de 1934 ampliou a participação eleitoral, concedendo pela primeira vez o direito de voto aos analfabetos.\n(B) A constituição de 1937 confirmou a liberdade partidária e a independência dos poderes Legislativo e Judiciário em relação ao Executivo.\n(C) A constituição de 1946 estabeleceu a legalidade da pena de morte para punir determinados crimes e a eleição indireta para o cargo de presidente.\n(D) A constituição de 1967 suprimiu o Congresso Nacional e reforçou o poder do Judiciário como principal responsável por garantir a segurança nacional.\n(E) A constituição de 1988 reduziu quatro horas semanais da jornada de trabalho e garantiu o direito à greve e à liberdade sindical.',
 alts:['A constituição de 1934 ampliou a participação eleitoral, concedendo pela primeira vez o direito de voto aos analfabetos.','A constituição de 1937 confirmou a liberdade partidária e a independência dos poderes Legislativo e Judiciário em relação ao Executivo.','A constituição de 1946 estabeleceu a legalidade da pena de morte para punir determinados crimes e a eleição indireta para o cargo de presidente.','A constituição de 1967 suprimiu o Congresso Nacional e reforçou o poder do Judiciário como principal responsável por garantir a segurança nacional.','A constituição de 1988 reduziu quatro horas semanais da jornada de trabalho e garantiu o direito à greve e à liberdade sindical.'],
 r:4,
 e:'A Constituição de 1988 reduziu a jornada semanal de 48 para 44 horas e assegurou expressamente o direito de greve e a liberdade sindical. As demais alternativas invertem fatos históricos (1934 não deu voto a analfabetos, 1937 foi ditatorial/Estado Novo, 1946 não legalizou pena de morte, 1967 não suprimiu o Congresso).',
 ano:2024},

{c:'pmesp', m:'Conhecimentos Gerais', f:'FGV 2024 · PM-ESP Soldado 2ª Classe',
 q:'Nos últimos tempos, a popularização do acesso às ferramentas de inteligência artificial tem mudado diversos aspectos da sociedade. É o caso do ChatGPT, da empresa OpenAI, com brasileiros representando 5,16% do seu tráfego total em janeiro deste ano. O ChatGPT é uma ferramenta de inteligência artificial\n(A) reativa.\n(B) simbólica.\n(C) geral.\n(D) híbrida.\n(E) generativa.',
