{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Com base nas informações que constam no site da Polícia Militar do Estado de São Paulo, pode-se concluir que, no mês de setembro de 2022, a cada hora, para cada pessoa presa em flagrante, 3 resgates foram efetuados. Se, no referido período de tempo, a soma do número de pessoas presas em flagrante com o número de resgates efetuados totalizou 36, então, o número de resgates foi igual a',
 alts:['21.','27.','33.','15.','9.'],
 r:1,
 e:'Sendo x o número de presos e 3x o número de resgates: x+3x=36 → 4x=36 → x=9. Logo, resgates = 3×9 = 27.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Para esvaziar um reservatório de água, três saídas d\'água, com a mesma vazão e abertas ao mesmo tempo, realizam o trabalho em 2 horas e 20 minutos. Utilizando-se apenas duas dessas saídas d\'água nas mesmas condições, a razão entre o tempo para esvaziar esse reservatório com duas saídas e o tempo para esvaziar esse reservatório com três saídas é',
 alts:['1,3.','1,6.','1,4.','1,5.','1,7.'],
 r:3,
 e:'Com 3 saídas, o tempo é 140 minutos; o volume equivale a 3×140=420 unidades de vazão×tempo. Com 2 saídas, o tempo será 420/2=210 minutos. A razão pedida é 210/140=1,5.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'A tabela a seguir apresenta o número de municípios em quatro das cinco Grandes Regiões brasileiras, em 2020, sendo omitido apenas o número de municípios da Grande Região Centro-Oeste:\n\nNúmero de Municípios, por Grandes Regiões Brasileiras – 2020\nNorte: 450\nNordeste: 1.794\nSudeste: 1.668\nSul: 1.191\nTotal (das quatro regiões apresentadas): 5.103\n(IBGE. Adaptado)\n\nSabendo que a média aritmética simples do número de municípios das cinco Grandes Regiões brasileiras, naquele ano, era igual a 1.114, pode-se afirmar, corretamente, que, em 2020, a diferença entre os números de municípios das Grandes Regiões Centro-Oeste e Norte era igual a',
 alts:['17.','23.','19.','15.','21.'],
 r:0,
 e:'Como a média das 5 regiões é 1.114, o total das 5 regiões é 5×1.114=5.570. Assim, Centro-Oeste = 5.570−5.103=467. A diferença entre Centro-Oeste (467) e Norte (450) é 467−450=17.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'O gráfico a seguir, elaborado com dados divulgados no site da Secretaria de Segurança Pública do Estado de São Paulo, apresenta a distribuição dos números de homicídios doloso e culposo e o número de tentativas de homicídio, associados à violência contra mulheres, no mês de outubro de 2022:\n\nDistribuição dos números de homicídios e tentativa de homicídios (Violência contra mulheres – Outubro de 2022):\n- Tentativa de homicídio: 46% do total\n- Homicídio doloso (soma de feminicídio e não feminicídio): 40% do total; dentro desse grupo de homicídios dolosos: 57% classificados como feminicídio e 43% como não feminicídio\n- Homicídio culposo: 14% do total\n\nSe adicionados os números de homicídios e de tentativas de homicídios tem-se 92 casos, então, o número de homicídios dolosos classificados como feminicídios foi maior ou igual a',
 alts:['17 e menor que 20.','26 e menor que 29.','23 e menor que 26.','20 e menor que 23.','14 e menor que 17.'],
 r:3,
 e:'O total de homicídios dolosos é 40% de 92 = 36,8. Desses, 57% são feminicídios: 0,57×36,8 ≈ 20,98, valor entre 20 (inclusive) e 23.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'De acordo com a Companhia Nacional de Abastecimento (Conab), a produção de arroz irrigado na Região Sudeste, na safra 2021/2022, foi de 36,3 mil toneladas, uma diminuição de 14% em relação à produção do mesmo produto, na safra 2020/2021. Essa diminuição corresponde a um valor compreendido entre',
 alts:['5,4 e 5,6 mil toneladas de arroz.','5,8 e 6,0 mil toneladas de arroz.','5,2 e 5,4 mil toneladas de arroz.','6,0 e 6,2 mil toneladas de arroz.','5,6 e 5,8 mil toneladas de arroz.'],
 r:1,
 e:'Se 36,3 corresponde a 86% da produção anterior, então a produção anterior = 36,3/0,86 ≈ 42,21 mil toneladas. A diminuição foi de aproximadamente 42,21−36,3 = 5,91 mil toneladas, valor entre 5,8 e 6,0.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Considere a seguinte informação apresentada no site Distrito, a respeito das tendências tecnológicas do setor da saúde, elaboradas para o ano de 2022 e publicada em fevereiro de 2022:\n\nSó em 2021, já foram investidos mais de US$ [X] milhões em startups de inteligência artificial no Brasil. Para se ter uma ideia da evolução dos aportes, em 2020 foram apenas US$ [Y] milhão investido na categoria. O desenvolvimento de novas tecnologias, aliado à necessidade de melhorar a precisão dos diagnósticos e tratamentos, está contribuindo para a evolução desse mercado no mundo todo.\n(https://distrito.me/blog/tendencias-setor-da-saude/. Adaptado)\n\nSabendo que a razão de X para Y corresponde a 82/3, e que X é US$ 39,5 milhões maior que Y, é correto afirmar que, para que X correspondesse a 30 vezes o valor Y, seria necessário acrescentar, em X, o valor de',
 alts:['US$ 4,5 milhões.','US$ 3,5 milhões.','US$ 5,0 milhões.','US$ 5,5 milhões.','US$ 4,0 milhões.'],
 r:4,
 e:'Sendo X=82k e Y=3k, X−Y=79k=39,5 → k=0,5. Logo X=41 e Y=1,5. Para que X fosse 30 vezes Y, X deveria valer 30×1,5=45. Como X já vale 41, é necessário acrescentar 45−41=4 milhões.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'A tabela a seguir, reproduzida a partir de documento com análises mensais publicadas pela Conab, apresenta algumas informações a respeito do trigo em grão, no Brasil, para as últimas cinco safras completas (em mil toneladas):\n\nSafra | Estoque inicial | Produção | Importação | Exportação | Consumo interno | Estoque final\n2017/18 | 3.188,7 | 4.262,1 | 6.387,5 | 206,2 | 11.244,7 | 2.387,4\n2018/19 | 2.387,4 | 5.427,6 | 6.738,6 | 582,9 | 11.360,8 | 2.609,9\n2019/20 | 2.609,9 | 5.154,7 | 6.676,7 | 342,3 | 11.860,6 | 2.238,4\n2020/21 | 2.238,4 | 6.234,6 | 6.007,8 | (não informado) | (não informado) | (não informado)\n2021/22 | (não informado) | 7.679,4 | 6.080,1 | 3.045,9 | 12.049,8 | 722,5\n(Conab. Adaptado)\n\nCom base nas informações apresentadas, é correto afirmar que o total relativo à exportação e ao consumo interno de trigo, na safra 2020/21, foi igual a',
 alts:['12.637,1 mil toneladas.','12.513,1 mil toneladas.','12.701,8 mil toneladas.','12.422,1 mil toneladas.','12.899,8 mil toneladas.'],
 r:3,
 e:'Em cada safra vale: Estoque inicial + Produção + Importação = Exportação + Consumo interno + Estoque final. Pela safra 2021/22: Estoque inicial = (3.045,9+12.049,8+722,5) − (7.679,4+6.080,1) = 15.818,2 − 13.759,5 = 2.058,7, que é também o estoque final de 2020/21 (continuidade entre safras). Aplicando a relação a 2020/21: Exportação+Consumo = (2.238,4+6.234,6+6.007,8) − 2.058,7 = 14.480,8 − 2.058,7 = 12.422,1 mil toneladas.',
 ano:2023},

{c:'pmesp', m:'Matemática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Uma chapa plana de alumínio, de espessura desprezível, tem o formato de um triângulo retângulo isósceles de área 32 cm². Dela, será retirada uma parte, também no formato de triângulo retângulo isósceles, com área de 0,72 cm², cortada rente a um dos ângulos agudos do triângulo original, com os catetos do pedaço retirado paralelos aos catetos do triângulo original, de modo que a peça restante tenha o formato de um trapézio com as bases paralelas à base do triângulo original.\n\nApós ser retirada a parte triangular, a parte remanescente da chapa de alumínio terá o formato de um trapézio, cuja diferença entre as medidas de suas bases será de',
 alts:['7,0 cm.','7,4 cm.','7,2 cm.','7,6 cm.','6,8 cm.'],
 r:4,
 e:'O triângulo original, isósceles de catetos L: L²/2=32 → L=8 cm. O triângulo retirado, semelhante e também isósceles, tem catetos l: l²/2=0,72 → l=1,2 cm. Como o corte é paralelo à base, a base maior do trapézio é 8 cm e a base menor é 1,2 cm. A diferença entre as bases é 8−1,2=6,8 cm.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'A 8 de janeiro de 1918 (antes, portanto, do fim da guerra), o presidente dos Estados Unidos, Woodrow Wilson, divulgou um plano de 14 pontos, destinado a orientar as discussões de paz.\n(Alceu L. Pazzinato e Maria Helena V. Senise, História Moderna e Contemporânea)\n\nAssinale a alternativa que apresenta uma das proposições desse plano.',
 alts:['Os territórios alemães invadidos pela França ao longo do século XIX deveriam ser devolvidos, inclusive a contestada região da Alsácia-Lorena, e caberia aos franceses a desmilitarização de todas as suas fronteiras.','Um Estado polonês independente deveria ser estabelecido, compreendendo os territórios habitados por populações incontestavelmente polonesas, às quais seria mantido um acesso livre e seguro ao mar.','As tropas francesas deveriam desocupar a região dos Balcãs, onde se formaria uma única nação que congregasse todos os povos com origem eslava, que ficaria sob a proteção da Grã-Bretanha e do Império Turco-Otomano.','A Alemanha, a Rússia e a Sérvia deveriam ser consideradas responsáveis pelo conflito mundial, ser desmilitarizadas, perder espaços coloniais e pagar indenizações aos países que foram vítimas de agressão.','Os espaços coloniais na África e na Ásia deveriam respeitar as diretrizes das suas respectivas metrópoles e quaisquer movimentos em direção à autonomia nacional das colônias precisariam ser chancelados pela Liga das Nações.'],
 r:1,
 e:'Um dos 14 pontos de Wilson previa a criação de um Estado polonês independente, com território habitado por população polonesa e acesso livre ao mar. As demais alternativas distorcem fatos históricos.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'No fim de janeiro de 1946, Dutra tomou posse e começaram os trabalhos da Constituinte. Em setembro era promulgada a nova Constituição brasileira, que se afastava da Carta de 1937, optando pelo figurino liberal-democrático. Em alguns pontos, entretanto, houve continuidade entre a Carta de 1937 e a Constituição de 1945.\n(Boris Fausto, História concisa do Brasil. Texto adaptado)\n\nEm relação à Constituição de 1946, é correto afirmar que',
 alts:['o Poder Executivo seria exercido pelo presidente da República, eleito por voto direto e secreto para um período de cinco anos e suprimiu-se a representação profissional na Câmara dos Deputados prevista na Carta de 1934.','o Poder Legislativo passou a ser bicameral, composto pelo Senado Federal e pela Câmara dos Deputados, recebeu a prerrogativa de elaborar e aprovar a Lei Orçamentária Anual.','os poderes dos chefes de Executivo, nos níveis federal, estadual e municipal, foram ampliados e, dessa forma, as atribuições do Legislativo e do Judiciário foram bastante enfraquecidas.','a organização dos trabalhadores foi radicalmente reformulada e os constituintes depuraram da legislação qualquer referência ao sistema presente no Estado Novo, com o fim do imposto sindical e da unicidade sindical.','os estados federativos perderam consideravelmente a autonomia política e administrativa e os orçamentos estaduais passaram a depender da anuência das autoridades econômicas do governo federal.'],
 r:0,
 e:'A Constituição de 1946 restabeleceu o presidencialismo com eleição direta e mandato de cinco anos, sem repetir a representação classista da Carta de 1934. As demais alternativas contrariam as mudanças de 1946.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Às dez da noite de 13 de dezembro de 1968 o ministro da Justiça, Gama e Silva, em cadeia nacional de rádio e televisão, fizera uma rápida introdução de cinco minutos e passara a palavra a Alberto Curi, que durante dezoito minutos havia apresentado, num tom monocórdico e solene, o texto do Ato Institucional nº 5 (AI-5).\n(Lilia M. Schwarcz e Heloísa M. Starling, Brasil: uma biografia. Texto adaptado)\n\nO AI-5 autorizava o presidente da República, entre outras possibilidades,',
 alts:['suspender os direitos políticos de parlamentares, desde que houvesse a permissão da Justiça; decretar estado de sítio apenas em caso de conflito externo; nomear prefeitos.','manter o Congresso em recesso por até 30 dias; legislar por decreto nas cidades de Área de Interesse de Segurança Nacional; escolher os integrantes das direções dos partidos políticos.','criar uma instância jurídica acima do Supremo Tribunal Federal; interferir na gestão de empresas privadas de capital aberto; determinar o valor máximo do superávit primário.','intervir nos estados e municípios; cassar mandatos parlamentares; suspender, por dez anos, os direitos políticos de qualquer cidadão.','interferir na direção de empresas privadas consideradas de segurança nacional; indicar o secretário da Justiça de cada estado; e elaborar uma constituição federal.'],
 r:3,
 e:'O AI-5 conferia ao presidente poderes excepcionais: intervir em estados e municípios, cassar mandatos eletivos e suspender por até dez anos os direitos políticos de qualquer cidadão, sem necessidade de aprovação judicial ou do Congresso.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Em 1984, pela primeira vez em vinte anos, a sucessão presidencial não seguiu os trâmites normais do período militar. Por um lado, o governo procurava evitar a Emenda Dante de Oliveira; por outro, não conseguia controlar as divergências internas do PDS em torno da definição de um candidato à presidência. A Emenda Dante de Oliveira seria votada. Entretanto, apesar de o envolvimento nas manifestações representar a vontade da maioria da população brasileira em reestabelecer as eleições diretas, a emenda acabou sendo rejeitada em 25 de abril de 1984.\n(Conceição Aparecida Cabrini, 16 de abril de 1984 – Diretas Já. Em: Circe Bittencourt (org.), Dicionários de datas da história do Brasil. Texto adaptado)\n\nCom a derrota da Emenda Dante de Oliveira,',
 alts:['a oposição liberal e setores progressistas uniram-se em torno da candidatura do governador paulista, Franco Montoro, do PMDB, que disputou e venceu o candidato situacionista, Aureliano Chaves, em eleições indiretas.','grupos políticos mais conservadores, caso do PTB, assumiram a direção das manifestações públicas pelas eleições diretas e conseguiram impor uma vitoriosa candidatura situacionista no Colégio Eleitoral.','as forças políticas que defendiam a volta das eleições diretas mantiveram-se unidas e conseguiram aprovar uma reforma constitucional que determinava que o novo presidente seria eleito diretamente em 1988.','os partidos oposicionistas, com a liderança do PDT, condenaram a manutenção das eleições indiretas por meio do Colégio Eleitoral e colocaram em pauta uma nova emenda constitucional com o objetivo de eleições diretas em 1985.','setores moderados da oposição, conduzidos pelo PMDB, aliaram-se ao PFL, partido fundado por dissidentes do PDS, e lançaram como candidato à presidência o governador de Minas Gerais Tancredo Neves, do PMDB.'],
 r:4,
 e:'Com a derrota das diretas, a oposição moderada, liderada pelo PMDB, aliou-se à Frente Liberal (que originaria o PFL), dissidente do PDS, e lançou a candidatura de Tancredo Neves, eleito indiretamente pelo Colégio Eleitoral em 1985.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Trata-se de uma área de livre comércio que tem por objetivo promover "a livre circulação de bens, serviços e fatores produtivos entre os países, através, entre outros, da eliminação dos direitos alfandegários e restrições não-tarifárias à circulação de mercadorias e de qualquer outra medida de efeito equivalente", foi criado a partir do Tratado de Assunção, assinado em 1991 pelos estados partes e estados associados.\n(ROSS, J. L. S. (org.). Geografia do Brasil, 1995, p. 261)\n\nO texto remete às características do',
 alts:['G8.','Fundo Monetário Internacional.','Mercosul.','BREXIT.','BRICS.'],
 r:2,
 e:'O Tratado de Assunção (1991) criou o Mercosul (Mercado Comum do Sul), bloco de livre comércio entre Brasil, Argentina, Paraguai e Uruguai.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Observe a descrição do mapa "Brasil – Tipos Climáticos": o mapa exibe as regiões climáticas do território brasileiro, delimitadas pela Linha do Equador (0º) ao norte e pelo Trópico de Capricórnio (23º27\') ao sul, com padrões gráficos distintos para cada tipo climático. Duas áreas estão numeradas: a área 1 é um núcleo de menor extensão, localizado no interior da região Nordeste, com padrão gráfico diferente da vasta área tropical que a circunda (área associada à irregularidade de chuvas e extensa aridez, típica do sertão nordestino); a área 2 está situada no extremo sul do país, abaixo do Trópico de Capricórnio, distinguindo-se por padrão gráfico próprio dessa faixa mais fria do território.\n(ROSS, Jurandyr L. Sanches (Org.) Geografia do Brasil, 2005, pg. 109)\n\nOs números 1 e 2, indicados no mapa, representam, respectivamente, os tipos climáticos:',
 alts:['equatorial e tropical de altitude.','semiárido e subtropical.','tropical de altitude e subtropical.','semiárido e equatorial úmido.','semiárido e equatorial.'],
 r:1,
 e:'A área 1 corresponde ao núcleo semiárido do interior nordestino (sertão), cercado por clima tropical; a área 2, ao sul do Trópico de Capricórnio, corresponde ao clima subtropical, característico da Região Sul do Brasil.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'A estimativa do Instituto Brasileiro de Geografia e Estatística aponta que o Brasil tem, na atualidade, mais de 215 milhões de habitantes. A taxa de crescimento anual tem diminuído nas últimas décadas estando, na atualidade, inferior a 1%, devido, principalmente,',
 alts:['ao crescimento natural ou vegetativo.','aos altos índices de criminalidade.','à manutenção das migrações internas.','ao incremento da população urbana nas grandes cidades.','ao aumento da imigração nas últimas décadas.'],
 r:0,
 e:'A redução da taxa de crescimento populacional brasileiro está associada, principalmente, à queda do crescimento natural (vegetativo), resultado da transição demográfica (redução da natalidade).',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Região que possui drenagens perenes para os cursos d\'água principais e secundários, envolvendo, porém, o desaparecimento temporário dos caminhos d\'água de menor ordem de grandeza por ocasião do período seco do meio do ano.\n(AB\'SÁBER, A. N. Os domínios de natureza no Brasil, 2003, p. 119)\n\nNa atualidade, é uma área com ocupação marcada pela produção de grãos e por impactos ambientais provocados pela contaminação dos mananciais e do solo pelo uso de agroquímicos. Essa região compreende a área de abrangência do domínio morfoclimático',
 alts:['dos Mares de Morros.','das Caatingas.','do Cerrado.','Amazônico.','das Pradarias.'],
 r:2,
 e:'A drenagem sazonal e a associação com produção de grãos (soja, milho) e uso intensivo de agroquímicos caracterizam o domínio morfoclimático do Cerrado.',
 ano:2023},

{c:'pmesp', m:'Conhecimentos Gerais', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Os participantes da COP 27 (27ª Conferência das Nações Unidas sobre as Mudanças Climáticas) concordaram com a criação de um fundo compensatório para danos relacionados às mudanças climáticas em países particularmente vulneráveis, uma demanda histórica das nações mais pobres, que pressionavam há décadas pela criação de tal mecanismo. O fundo visa amortecer as consequências inevitáveis do aquecimento global como secas, inundações e tempestades, além do aumento do nível do mar e da desertificação.\n(DW. Adaptado)\n\nA declaração final considera também a',
 alts:['eliminação gradual do carvão como fonte de energia.','extinção total dos veículos movidos por derivados de petróleo até 2028.','criação de um fundo destinado a pesquisas com energia solar.','proibição de construção de novas usinas nucleares a partir de 2030.','criação de comissão para elaborar normas referentes à instalação de fontes de energia em alto mar.'],
 r:0,
 e:'A declaração final da COP 27 reafirmou o compromisso com a eliminação gradual do uso do carvão como fonte de energia. As demais alternativas trazem medidas que não constaram da declaração.',
 ano:2023},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Um usuário do MS-Word 2010, em sua configuração padrão, digitou um documento de texto, com as marcas de parágrafo ativadas, contendo o seguinte conteúdo (onde a seta → representa uma tabulação e o símbolo ¶ representa uma marca de fim de parágrafo):\n\nSoldado → de → 2ª Classe → – Polícia → Militar¶\n¶\n\nEm seguida, selecionou todo o texto visto acima e clicou na opção "Inserir Tabela..." do ícone Tabela no grupo Tabelas da guia Inserir. Ao fazer isso, uma tabela foi criada.\n\nO número de linhas e colunas, respectivamente, na tabela criada, conforme o enunciado é',
 alts:['2 e 5.','2 e 4.','1 e 2.','1 e 5.','1 e 4.'],
 r:3,
 e:'O texto digitado contém apenas um parágrafo com conteúdo, dividido por 4 tabulações em 5 segmentos ("Soldado", "de", "2ª Classe", "– Polícia", "Militar"); a segunda marca de parágrafo é uma linha vazia que não gera linha na tabela. Por isso, o Word cria uma tabela de 1 linha e 5 colunas.',
 ano:2023},

{c:'pmesp', m:'Noções de Informática', f:'VUNESP 2023 · PM-ESP Soldado 2ª Classe',
 q:'Observe a planilha a seguir, elaborada por meio do MS-Excel 2010, em sua configuração padrão, com os seguintes valores:\n\nCélula A1 = 1, B1 = 2, C1 = 1\nCélula A2 = 1, B2 = 4, C2 = 2\nCélula A3 = 5, B3 = 1, C3 = 3\n(A célula A4 está vazia antes da fórmula ser inserida.)\n\nAo preencher a fórmula =MAIOR(A1:C3;4) na célula A4, o valor exibido por esta será:',
 alts:['3','4','2','1','5'],
 r:2,
 e:'A função MAIOR(intervalo;k) retorna o k-ésimo maior valor do intervalo. Os valores de A1:C3 são {1,2,1,1,4,2,5,1,3}. Ordenando do maior para o menor: 5,4,3,2,2,1,1,1,1. O 4º maior valor é 2.',
 ano:2023},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (letra de música)',
 q:'Leia a letra da música:\n\nSapato 36\n\nEu calço é 37\nMeu pai me dá 36\nDói, mas no dia seguinte\nAperto meu pé outra vez\n\nPai eu já tô crescidinho\nPague prá ver, que eu aposto\nVou escolher meu sapato\nE andar do jeito que eu gosto\n\nPor que cargas d\'águas\nVocê acha que tem o direito\nDe afogar tudo aquilo que eu\nSinto em meu peito\n\nVocê só vai ter o respeito que quer\nNa realidade\nNo dia em que você souber respeitar\nA minha vontade\n\nMeu pai\nPai já tô indo-me embora\nQuero partir sem brigar\nPois eu já escolhi meu sapato\nQue não vai mais me apertar\n\n(Raul Seixas)\n\nA partir da leitura do texto, é correto afirmar que:',
 alts:['na primeira estrofe, o eu lírico demonstra conformismo em aceitar o que o pai lhe impõe.',
       'na terceira estrofe, o eu lírico reconhece que o pai tem consciência do respeito que deve ao filho.',
       'em "Vou escolher meu sapato", o eu lírico debocha das escolhas de sapatos feitas pelo pai.',
       'a quarta estrofe evidencia o gênio violento e desrespeitoso que o eu lírico tem em relação ao pai.'],
 r:0,
 e:'Na primeira estrofe, o eu lírico ainda aceita calçar o sapato que o pai lhe dá, mesmo doendo ("Dói, mas no dia seguinte / Aperto meu pé outra vez") — um comportamento de conformismo que só é rompido nas estrofes seguintes, quando decide escolher o próprio sapato.'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (letra de música)',
 q:'Leia a letra da música:\n\nSapato 36\n\nEu calço é 37\nMeu pai me dá 36\nDói, mas no dia seguinte\nAperto meu pé outra vez\n\nPai eu já tô crescidinho\nPague prá ver, que eu aposto\nVou escolher meu sapato\nE andar do jeito que eu gosto\n\nPor que cargas d\'águas\nVocê acha que tem o direito\nDe afogar tudo aquilo que eu\nSinto em meu peito\n\nVocê só vai ter o respeito que quer\nNa realidade\nNo dia em que você souber respeitar\nA minha vontade\n\nMeu pai\nPai já tô indo-me embora\nQuero partir sem brigar\nPois eu já escolhi meu sapato\nQue não vai mais me apertar\n\n(Raul Seixas)\n\nO tema da letra da música gira em torno de:',
 alts:['busca da independência econômica devido às brutais agressões verbais.',
       'afirmação da própria identidade frente a imposições familiares.',
       'afinidade de gostos nas escolhas das diferentes gerações.',
       'brigas violentas na infância, resultando em quebra dos vínculos afetivos.'],
 r:1,
 e:'O sapato funciona como metáfora da autonomia: o eu lírico busca afirmar sua própria identidade e vontade diante da imposição do pai, sem que isso configure agressão física/verbal ou ruptura afetiva definitiva.'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (letra de música)',
 q:'Leia a letra da música:\n\nSapato 36\n\nEu calço é 37\nMeu pai me dá 36\nDói, mas no dia seguinte\nAperto meu pé outra vez\n\nPai eu já tô crescidinho\nPague prá ver, que eu aposto\nVou escolher meu sapato\nE andar do jeito que eu gosto\n\nPor que cargas d\'águas\nVocê acha que tem o direito\nDe afogar tudo aquilo que eu\nSinto em meu peito\n\nVocê só vai ter o respeito que quer\nNa realidade\nNo dia em que você souber respeitar\nA minha vontade\n\nMeu pai\nPai já tô indo-me embora\nQuero partir sem brigar\nPois eu já escolhi meu sapato\nQue não vai mais me apertar\n\n(Raul Seixas)\n\nNa terceira estrofe, há palavra empregada em sentido figurado na alternativa:',
 alts:['direito.','afogar.','respeito.','realidade.'],
 r:1,
 e:'"Afogar" não é usado no sentido literal (submergir em água), mas em sentido figurado: sufocar, reprimir os sentimentos do eu lírico ("De afogar tudo aquilo que eu / Sinto em meu peito").'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (letra de música)',
 q:'Leia os versos:\n\n"Dói, mas no dia seguinte\nAperto meu pé outra vez\n[...]\nPois eu já escolhi meu sapato\nQue não vai mais me apertar"\n\nOs termos "mas" e "pois", nesses versos, expressam, correta e respectivamente, sentido de:',
 alts:['explicação e causa.','conformidade e conclusão.','conclusão e concessão.','oposição e explicação.'],
 r:3,
 e:'"Mas" introduz uma ideia de oposição/contraste (dói, MAS mesmo assim ele repete o gesto); "pois", no início do verso final, tem valor explicativo (equivale a "porque/já que").'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (texto jornalístico)',
 q:'Leia o texto:\n\nO método Jokic\n\nMuitos entusiastas do basquetebol foram cativados pelo esporte influenciados pelo excepcional Michael Jordan. O esporte naturalmente evolui, e suas dificuldades também; os ídolos se renovam com o tempo. Basta lembrar do nosso "Mão Santa", Oscar Schmidt, um dos maiores cestinhas da história do esporte e uma lenda do basquetebol brasileiro.\n\nGostaria de destacar um jogador de basquete profissional cujo talento é equiparável ao dos demais que se destacaram, mas com uma particularidade digna de nota. Estou me referindo a Nikola Jokic. Atualmente, ele atua na National Basketball Association (NBA) pela equipe do Denver Nuggets. Foi selecionado apenas como a 41ª escolha geral no Draft de 2014, e conquistou o prêmio de Most Valuable Player e a final da temporada 2022-2023 da NBA, quando o Denver Nuggets ganhou o título inédito.\n\nOriginalmente situado na posição de pivô (jogador especializado em defender e atacar próximo ao aro); a posição garante a defesa e os bloqueios dos arremessos dos adversários no garrafão, o atleta é conhecido por suas habilidades versáteis, destacando-se em assistências.\n\nNo basquete, a assistência refere-se ao ato de um jogador passar a bola para um companheiro de equipe que, em seguida, converte a cesta. Essa é a habilidade do jogador que cria oportunidades ofensivas para seus colegas; quem presta assistência não marca ponto, mas ajuda o outro a fazê-lo. Enfim, a equipe é a beneficiária. A assistência é a obsessão de Nikola. Ele não quer marcar ponto, quer servir o companheiro.\n\nEssa atitude demonstra uma humildade peculiar e um olhar para o outro que gera confiança, respeito e influência. Seu jogo supre a necessidade alheia, pois é desapegado do objetivo primordial do basquete que normalmente glorifica o jogador: o ponto. Pode-se pensar que a especialização nas assistências seja um subterfúgio para escamotear uma habilidade precária. Nada disso! Nikola Jokic compreende o jogo plenamente. Quando é preciso, ele marca pontos de várias maneiras. A sua polivalência lhe rendeu o apelido The Joker (o coringa).\n\nTudo isso revela um estilo peculiar de liderança que chamo de "o método Jokic". Quanto mais ele serve a equipe, mais se destaca como referência de liderança. Ele não é um líder ostensivo, mas alguém que lidera por ações para a equipe, não para si. Seu compromisso é com o sucesso coletivo, não com o individual.\n\nAssistir a uma partida com Nikola Jokic é uma lição de liderança, fundamentada numa das mais belas qualidades humanas: a assistência ao outro.\n\n(Fernando F. Rossi. O Estado de S. Paulo, 7 de abril de 2024. Adaptado)\n\nOs termos "escamotear" e "precária", no 5º parágrafo, têm como sinônimos, correta e respectivamente:',
 alts:['ludibriar; estável.','acobertar; contínua.','esconder; insuficiente.','ocultar; assídua.'],
 r:2,
 e:'"Escamotear" significa esconder, disfarçar; "precária" significa insuficiente, deficiente. As demais opções alteram o sentido de pelo menos um dos dois termos.'},

 r:3,

ciso, ele marca pontos de várias maneiras. A sua polivalência lhe rendeu o apelido The Joker (o coringa).\n\nTudo isso revela um estilo peculiar de liderança que chamo de "o método Jokic". Quanto mais ele serve a equipe, mais se destaca como referência de liderança. Ele não é um líder ostensivo, mas alguém que lidera por ações para a equipe, não para si. Seu compromisso é com o sucesso coletivo, não com o individual.\n\nAssistir a uma partida com Nikola Jokic é uma lição de liderança, fundamentada numa das mais belas qualidades humanas: a assistência ao outro.\n\n(Fernando F. Rossi. O Estado de S. Paulo, 7 de abril de 2024. Adaptado)\n\nO texto informa que, no jogo de basquetebol, a assistência é uma habilidade que:',

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (colocação pronominal)',
 q:'Leia o trecho: "Pode-se pensar que a especialização nas assistências seja um subterfúgio para escamotear uma habilidade precária."\n\nAssinale a alternativa em que a mudança de colocação do pronome indicada nos parênteses contraria a norma-padrão.',
 alts:['Pode-se pensar que a especialização... (Se pode pensar que a especialização...)',
       'A sua polivalência lhe rendeu o apelido... (A sua polivalência rendeu-lhe o apelido...)',
       'Estou me referindo... (Estou referindo-me...)',
       '... os ídolos se renovam com o tempo. (... os ídolos renovam-se com o tempo.)'],
 r:0,
 e:'Não se inicia oração com pronome oblíquo átono na norma-padrão: "Se pode pensar..." está incorreto; o correto é "Pode-se pensar...", como no texto original. As demais reescrituras (ênclise/próclise) são admissíveis.'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (pontuação)',
 q:'No trecho: "Assistir a uma partida com Nikola Jokic é uma lição de liderança, fundamentada numa das mais belas qualidades humanas: a assistência ao outro." — os dois pontos foram utilizados para:',
 alts:['realçar um termo.','distinguir uma palavra.','explicar uma ideia.','mostrar uma condição.'],
 r:2,
 e:'Os dois pontos introduzem uma explicação/especificação do que seria essa "bela qualidade humana": a assistência ao outro.'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (crase)',
 q:'A frase que apresenta o emprego do sinal indicativo de crase de acordo com a norma-padrão está na alternativa:',
 alts:['Assistir à um jogo com Nikola é uma lição de liderança.',
       'O autor do texto refere-se às habilidades do jogador.',
       'Seu jogo complementa, com humildade, à necessidade alheia.',
       'Nikola começa à jogar dando assistência aos seus colegas.'],
 r:1,
 e:'"Referir-se a" + "as habilidades" (artigo feminino plural) = "às habilidades" — crase correta. Não há crase antes de verbo ("à jogar"), diante de artigo masculino/indefinido ("à um jogo") nem quando o verbo não exige a preposição "a" regendo substantivo feminino determinado ("à necessidade").',
 dica:'Crase nunca aparece antes de verbo. Descarte de cara qualquer opção com "à" seguido de um verbo no infinitivo.'},

{c:'gcm', m:'Língua Portuguesa', f:'VUNESP 2024 · GCM Lins-SP (concordância)',
 q:'Assinale a alternativa em que a frase apresenta concordância de acordo com a norma-padrão.',
 alts:['O jogador cria oportunidades ofensivas aos companheiros, as quais lhe garante muito respeito.',
       'As habilidades versáteis do jogador o tornam um importante exemplo de liderança.',
       'Um dos maiores cestinhas da história do esporte influenciaram muitos jovens.',
       'A equipe pode beneficiarem-se intensamente com os atos de humildade do jogador.'],
 r:1,
 e:'"As habilidades... tornam" concorda corretamente no plural com o sujeito. Nas demais: "garante" deveria concordar com "as quais" (garantem); "um dos que se destacou" pede singular ("influenciou"); "a equipe" é sujeito singular, logo "pode beneficiar-se" (sem flexão no infinitivo).'},

{c:'gcm', m:'Matemática', f:'VUNESP 2024 · GCM Lins-SP · média e idades',
 q:'A média aritmética simples das atuais idades de três motoristas é 33 anos, sendo que o mais novo tem 28 anos, e a diferença entre as idades dos outros dois motoristas é de 9 anos. Se o motorista com a maior idade faz aniversário no próximo mês, então é verdade que ele completará:',
 alts:['38 anos.','39 anos.','40 anos.','41 anos.'],
 r:3,
 e:'Soma das três idades: 33 × 3 = 99. Excluindo o mais novo (28), restam 71 anos para os outros dois, com diferença de 9: resolvendo, as idades são 40 e 31. O mais velho tem 40 anos e completará 41 no aniversário do mês seguinte.'},

{c:'gcm', m:'Matemática', f:'VUNESP 2024 · GCM Lins-SP · porcentagem',
 q:'Em um concurso público, os salários de dois dos cargos oferecidos eram distintos, sendo que o maior deles, de R$ 2.760,00, era 15% mais alto que o menor dos salários. A diferença entre esses dois salários era de:',
 alts:['R$ 360,00.','R$ 370,00.','R$ 398,00.','R$ 414,00.'],
 r:0,
 e:'Menor salário = 2.760 ÷ 1,15 = R$ 2.400,00. Diferença: 2.760 − 2.400 = R$ 360,00.'},

{c:'gcm', m:'Matemática', f:'VUNESP 2024 · GCM Lins-SP · MDC',
 q:'Dois rolos de fita de sinalização zebrada, um com 180 m e outro com 300 m de comprimento, serão divididos em partes, todas com o mesmo comprimento, o maior possível, sem desperdício, para um curso de formação dos novos agentes contratados em determinado município. O número de partes que será obtido do rolo com o maior comprimento de fita será igual a:',
 alts:['8.','6.','5.','4.'],
 r:2,
 e:'MDC(180, 300) = 60 m é o maior comprimento possível de cada parte, sem desperdício. O rolo maior (300 m) resultará em 300 ÷ 60 = 5 partes.'},

{c:'gcm', m:'Raciocínio Lógico', f:'VUNESP 2024 · GCM Lins-SP · sequência lógica',
 q:'A sequência a seguir foi criada com um padrão lógico:\n\n10, 21, 24, 12, 25, 28, 14, 29, 32, 16, ...\n\nO 26º termo dessa sequência é o número:',
 alts:['31.','47.','53.','59.'],
 r:2,
 e:'A sequência forma grupos de 3 termos: o 1º termo de cada grupo cresce de 2 em 2 (10, 12, 14, 16...), o 2º cresce de 4 em 4 (21, 25, 29...) e o 3º cresce de 4 em 4 (24, 28, 32...). O 26º termo está na posição 2 do 9º grupo: 21 + 4 × 8 = 53.'},

{c:'gcm', m:'Raciocínio Lógico', f:'VUNESP 2024 · GCM Lins-SP · negação lógica',
 q:'Considere a proposição: "Se todas as ruas foram vistoriadas, então a ronda está completa." Uma proposição que corresponde à negação lógica da proposição inicial é:',
 alts:['Se nem todas as ruas foram vistoriadas, então a ronda não está completa.',
       'Nem todas as ruas foram vistoriadas ou a ronda está completa.',
       'Se a ronda não está completa, então todas as ruas foram vistoriadas.',
       'Todas as ruas foram vistoriadas e a ronda não está completa.'],
 r:3,
 e:'A negação de "se P então Q" é "P e não Q": todas as ruas foram vistoriadas (P verdadeiro), e a ronda não está completa (Q falso).'},

{c:'gcm', m:'Raciocínio Lógico', f:'VUNESP 2024 · GCM Lins-SP · proposição equivalente',
 q:'Considere a proposição: "A proteção não é suficiente ou o local está seguro." Uma proposição equivalente logicamente a essa é:',
 alts:['A proteção é suficiente, e o local não está seguro.',
       'Se a proteção é suficiente, então o local está seguro.',
       'Se o local está seguro, então a proteção é suficiente.',
       'A proteção é suficiente ou o local está seguro.'],
 r:1,
 e:'"Não P ou Q" é logicamente equivalente a "se P então Q": "se a proteção é suficiente, então o local está seguro".'},

{c:'gcm', m:'Raciocínio Lógico', f:'VUNESP 2024 · GCM Lins-SP · valores lógicos',
 q:'Considere as afirmações e seus respectivos valores lógicos:\n\nI. Se Francisco não é honesto, então Geraldo é esforçado. VERDADE.\nII. Se Geraldo não é esforçado, então José é trabalhador. FALSIDADE.\nIII. Manoel é preguiçoso e Francisco é honesto. FALSIDADE.\n\nA partir dessas informações, é logicamente verdadeiro que:',
 alts:['Geraldo é esforçado.','Manoel não é preguiçoso.','Francisco não é honesto.','José é trabalhador.'],
 r:1,
 e:'De II falsa: "Geraldo não é esforçado" é verdade e "José é trabalhador" é falso. De I verdadeira, com consequente falso, o antecedente também é falso: "Francisco não é honesto" é falso, logo Francisco é honesto. De III falsa, com "Francisco é honesto" verdadeiro, "Manoel é preguiçoso" precisa ser falso — logo, Manoel não é preguiçoso.'},

{c:'gcm', m:'Noções de Informática', f:'VUNESP 2024 · GCM Lins-SP · Windows / recortar e colar',
 q:'Considere um computador com MS-Windows 10, em sua configuração padrão, contendo duas pastas locais: pasta X, com os arquivos a.txt e b.docx; e pasta Y, com os arquivos a.docx e b.docx. O usuário acessou a pasta X, selecionou todos os arquivos e pressionou Ctrl+X. Em seguida, acessou a pasta Y e pressionou Ctrl+V. Sabendo que o usuário tem permissão para executar todas as ações (e escolheu sobrepor, caso exista mensagem de confirmação), assinale a alternativa que apresenta a quantidade de arquivos na pasta Y após as ações descritas.',
 alts:['1','2','3','4'],
 r:2,
 e:'A pasta Y já tinha a.docx e b.docx. Ao colar os arquivos recortados de X (a.txt e b.docx): a.txt é adicionado sem conflito; b.docx sobrescreve o b.docx já existente em Y (mesmo nome). Resultado: a.docx, b.docx e a.txt = 3 arquivos.'},

{c:'gcm', m:'Noções de Informática', f:'VUNESP 2024 · GCM Lins-SP · Word / alinhamento',
 q:'Um usuário do MS-Word 2016, em sua configuração padrão, a partir de um novo documento vazio, realizou as seguintes ações, nessa ordem:\n\n1 – Pressiona o botão Alinhar à Direita.\n2 – Digita "Projetos".\n3 – Pressiona Enter.\n4 – Pressiona o botão Centralizar.\n5 – Digita "De".\n6 – Pressiona Enter.\n7 – Digita "Sinalização".\n8 – Pressiona Enter.\n9 – Pressiona o botão Alinhar à Esquerda.\n10 – Digita "Viária".\n\nApós todas as ações, o número de parágrafos centralizados é:',
 alts:['1','2','3','4'],
 r:1,
 e:'Parágrafo 1 ("Projetos") fica alinhado à direita. Ao pressionar Centralizar antes de digitar "De" (parágrafo 2), esse parágrafo passa a centralizado; o parágrafo 3 ("Sinalização"), criado logo depois, herda o alinhamento centralizado do parágrafo anterior. Só no parágrafo 4 ("Viária") o alinhamento muda para a esquerda. Total de parágrafos centralizados: 2 ("De" e "Sinalização").'},

/* ---------------- GCM · Legislação (VUNESP 2024 · GCM Lins-SP) ---------------- */
{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · CF/88, art. 5º',
 q:'Nos termos do artigo 5º da Constituição da República Federativa do Brasil, é correto afirmar que:',
 alts:['nenhum brasileiro poderá ser extraditado.',
       'a pena de morte somente poderá ser aplicada em caso de guerra declarada contra agressão estrangeira.',
       'nenhum estrangeiro poderá ser extraditado.',
       'o direito de petição aos Poderes Públicos, em defesa de direitos ou contra ilegalidade ou abuso de poder, dependerá de pagamento de taxas.'],
 r:1,
 e:'Art. 5º, XLVII, "a", CF/88: não há pena de morte, salvo em caso de guerra declarada (art. 84, XIX). O brasileiro nato nunca é extraditado, mas o naturalizado pode ser em casos específicos; o direito de petição é gratuito, independente de taxas.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · CF/88, art. 6º',
 q:'São direitos sociais, insculpidos no artigo 6º da Constituição da República Federativa do Brasil:',
 alts:['a educação, a saúde e a previdência social.',
       'a alimentação, o trabalho e o sufrágio universal.',
       'a moradia, o transporte e o plebiscito.',
       'o lazer, a segurança, e o referendo.'],
 r:0,
 e:'Art. 6º CF/88 elenca como direitos sociais: educação, saúde, alimentação, trabalho, moradia, transporte, lazer, segurança, previdência social, entre outros. Sufrágio, plebiscito e referendo são institutos de participação política (art. 14), não direitos sociais.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · CF/88, art. 144',
 q:'De acordo com o artigo 144 da Constituição da República Federativa do Brasil, é correto afirmar que:',
 alts:['a polícia rodoviária federal possui a atribuição de apuração de infrações penais ocorridas nas rodovias federais.',
       'as polícias civis, dirigidas por delegados de polícia de carreira, possuem, ressalvada a competência da União, as funções de polícia judiciária e de apuração de infrações penais, inclusive os crimes militares.',
       'a execução de atividades de defesa civil é atribuição dos corpos de bombeiros militares.',
       'as guardas municipais possuem as atribuições de polícia ostensiva e a preservação da ordem pública.'],
 r:2,
 e:'Art. 144, §5º, CF/88: aos corpos de bombeiros militares, além das atribuições definidas em lei, incumbe a execução de atividades de defesa civil. A polícia rodoviária federal patrulha ostensivamente as rodovias federais; polícias civis não apuram crimes militares; polícia ostensiva e preservação da ordem pública são atribuições das polícias militares (art. 144, §5º), não das guardas municipais.',
 dica:'Cuidado pra não confundir as atribuições de cada órgão do art. 144 — cada um tem uma função bem específica, e a banca adora trocar uma pela outra.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Código Penal',
 q:'Constitui crime de _____ a conduta de agenciar, aliciar, recrutar, transportar, transferir, comprar, alojar ou acolher pessoa, mediante grave ameaça, violência, coação, fraude ou abuso, com a finalidade de realizar adoção ilegal. Assinale a alternativa que preenche corretamente a lacuna.',
 alts:['Intimidação sistemática (bullying)','Cárcere privado','Redução a condição análoga à de escravo','Tráfico de pessoas'],
 r:3,
 e:'Art. 149-A do Código Penal tipifica o tráfico de pessoas, cujas finalidades incluem, entre outras, a remoção de órgãos, a exploração sexual e a adoção ilegal.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Código Penal (concussão)',
 q:'Maria e João, guardas municipais, prévia e nominalmente escalados em serviço de ronda escolar, durante o patrulhamento, surpreendem Joana, estudante, pichando o muro de uma escola municipal com tinta spray. Como condição para deixarem de adotar as providências legais cabíveis, Maria e João exigiram de Joana o pagamento de R$ 1.000,00 em espécie, cuja exigência foi recusada por Antônio, genitor de Joana. A conduta dos guardas municipais configura, em tese:',
 alts:['fato atípico, vez que houve recusa por parte de Antônio.',
       'o crime de concussão.',
       'a contravenção penal de violação de dever funcional.',
       'o crime de corrupção passiva.'],
 r:1,
 e:'Concussão (art. 316 do CP) é exigir, para si ou para outrem, vantagem indevida, em razão da função, antes ou depois de assumi-la. O crime se consuma com a mera exigência, independentemente do recebimento — a recusa da vítima não afasta a tipicidade.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · CPP, prisão em flagrante',
 q:'Sobre o tema "prisão em flagrante", previsto no Código de Processo Penal, assinale a alternativa correta.',
 alts:['Qualquer pessoa do povo tem o dever legal de prender aquele que for encontrado em flagrante delito.',
       'A prisão em flagrante não será possível na hipótese de infrações permanentes.',
       'A falta de testemunhas da infração obstará a lavratura do auto de prisão em flagrante.',
       'O auto de prisão em flagrante será assinado por duas testemunhas instrumentárias, caso o preso se recuse a assiná-lo.'],
 r:3,
 e:'Art. 304, §2º, CPP: se o preso se recusar a assinar, não souber ou não puder fazê-lo, o auto será assinado por duas testemunhas que tenham presenciado a leitura do auto na presença do preso. Para o cidadão comum, prender em flagrante é uma faculdade, não um dever; nas infrações permanentes, considera-se o agente em flagrante enquanto não cessar a permanência; a falta de testemunhas da infração não impede a lavratura, que pode contar com testemunhas do próprio ato de apresentação.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · ECA',
 q:'Nos termos do Estatuto da Criança e do Adolescente, é correto afirmar que:',
 alts:['o ato infracional diz respeito à conduta descrita como crime, enquanto o ato contravencional refere-se à conduta descrita como contravenção penal.',
       'a internação, antes da sentença, pode ser determinada pelo prazo máximo de noventa dias.',
       'medidas socioeducativas não são aplicáveis a crianças, autoras de ato infracional.',
       'a internação, antes da sentença, deve ser determinada pelo prazo máximo de sessenta dias.'],
 r:2,
 e:'O ECA reserva as medidas socioeducativas aos adolescentes (12 a 18 anos incompletos); às crianças autoras de ato infracional aplicam-se medidas de proteção (arts. 101 e 105), não medidas socioeducativas. Além disso, ato infracional é a conduta descrita como crime OU contravenção penal (art. 103) — a alternativa "a" separa indevidamente os dois; a internação provisória, antes da sentença, tem prazo máximo de 45 dias (art. 108).'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · ECA, Conselho Tutelar',
 q:'Sobre o tema "Conselho Tutelar", insculpido no Estatuto da Criança e do Adolescente, é correto afirmar que:',
 alts:['cada Conselho Tutelar será composto de 07 (sete) membros.',
       'o Conselheiro Tutelar tem o mandato de 03 (três) anos, permitida recondução por novos processos de escolha.',
       'um dos requisitos para a candidatura a membro do Conselho Tutelar é a idade mínima de 30 (trinta) anos.',
       'as decisões do Conselho Tutelar somente poderão ser revistas pela autoridade judiciária a pedido de quem tenha legítimo interesse.'],
 r:3,
 e:'Art. 137 do ECA: as decisões do Conselho Tutelar só podem ser revistas pela autoridade judiciária a pedido de quem tenha legítimo interesse. O Conselho é composto de 5 membros (art. 132), com mandato de 4 anos, e a idade mínima para candidatura é 21 anos (art. 133, I).'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · ECA, crimes',
 q:'Sobre a disciplina dada pelo Estatuto da Criança e do Adolescente (ECA) aos crimes nele previstos, assinale a alternativa correta.',
 alts:['Aos crimes cometidos contra a criança e o adolescente, independentemente da pena prevista, não se aplica a Lei nº 9.099/1995 (Juizados Especiais Criminais).',
       'Nos casos de violência doméstica e familiar contra a criança e o adolescente, é permitida a aplicação de penas de cesta básica ou de outras de prestação pecuniária.',
       'Os crimes definidos no ECA podem ser de ação pública incondicionada ou condicionada à representação dos pais ou responsáveis da vítima, criança ou adolescente.',
       'A condenação por qualquer crime previsto no ECA implicará necessariamente na perda de cargo, função pública ou mandato eletivo do agente público.'],
 r:0,
 e:'O ECA afasta a aplicação da Lei 9.099/95 aos crimes nele previstos, independentemente da pena cominada. É vedada a aplicação de cesta básica ou penas pecuniárias em casos de violência doméstica; os crimes do ECA são, em regra, de ação pública incondicionada; a perda de cargo não é consequência automática, dependendo de decisão fundamentada específica.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Estatuto do Idoso',
 q:'O Estatuto da Pessoa Idosa é destinado a regular os direitos assegurados às pessoas com idade _____. Entre as pessoas idosas, é assegurada prioridade especial aos maiores de _____, atendendo-se suas necessidades sempre preferencialmente em relação às demais pessoas idosas. Assinale a alternativa que preenche corretamente as lacunas.',
 alts:['igual ou superior a 60 (sessenta) anos ... 70 (setenta) anos',
       'superior a 60 (sessenta) anos ... 70 (setenta) anos',
       'igual ou superior a 60 (sessenta) anos ... 80 (oitenta) anos',
       'superior a 65 (sessenta e cinco) anos ... 80 (oitenta) anos'],
 r:2,
 e:'Art. 1º da Lei 10.741/2003 (Estatuto do Idoso): pessoas com idade igual ou superior a 60 anos. Art. 3º, §2º: entre os idosos, é assegurada prioridade especial aos maiores de 80 anos.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Estatuto do Desarmamento',
 q:'Dispõe o Estatuto do Desarmamento (Lei nº 10.826/2003) que:',
 alts:['a autorização para o porte de arma de fogo de uso restrito, em todo o território nacional, é de competência da Polícia Federal e somente será concedida após autorização do Sinarm.',
       'compete ao Ministério da Justiça o registro e a concessão de porte de trânsito de arma de fogo para colecionadores, atiradores e caçadores e de representantes estrangeiros em competição internacional oficial de tiro realizada no território nacional.',
       'um dos requisitos para a concessão de porte de arma de fogo, na categoria caçador para subsistência, é o requerente possuir a idade mínima de 21 (vinte e um) anos.',
       'o caçador para subsistência que der outro uso à sua arma de fogo, independentemente de outras tipificações penais, responderá, conforme o caso, por porte ilegal ou por disparo de arma de fogo de uso permitido.'],
 r:3,
 e:'A Lei 10.826/2003 e seu regulamento preveem que o caçador de subsistência que desviar a finalidade de uso de sua arma responde, conforme o caso, por porte ilegal ou disparo de arma de fogo. O registro/porte de armas de uso restrito e o registro para colecionadores, atiradores e caçadores esportivos são atribuições do Comando do Exército, não da Polícia Federal ou do Ministério da Justiça; a idade mínima exigida para o caçador de subsistência não é 21 anos.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Lei Maria da Penha',
 q:'Sobre a Lei "Maria da Penha", assinale a alternativa correta.',
 alts:['A mencionada Lei cria mecanismos para coibir e prevenir a violência doméstica e familiar contra a mulher e o homem.',
       'Os Juizados de Violência Doméstica e Familiar foram criados pela mencionada Lei.',
       'Apenas a pessoa do sexo masculino pode ser autora de violência doméstica e familiar.',
       'Qualquer conduta que configure calúnia, difamação ou injúria contra a mulher será considerada violência psicológica.'],
 r:1,
 e:'Art. 14 da Lei 11.340/2006 cria os Juizados de Violência Doméstica e Familiar contra a Mulher. A lei protege especificamente a mulher; o sujeito ativo pode ser qualquer pessoa, desde que presente relação de afeto/convivência; nem toda calúnia, difamação ou injúria configura violência psicológica — depende da caracterização do dano emocional no contexto de violência doméstica.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Lei de Abuso de Autoridade',
 q:'Nos termos da Lei nº 13.869/2019 (Abuso de Autoridade), é correto afirmar que incorre em crime o agente público que cumpre mandado de busca e apreensão domiciliar, contra a vontade do morador, às:',
 alts:['quatro horas e cinquenta minutos.','vinte horas e trinta minutos.','seis horas e quinze minutos.','doze horas.'],
 r:0,
 e:'Art. 22, §1º, I, da Lei 13.869/2019: cumprir mandado de busca e apreensão contra a vontade de quem de direito fora do horário compreendido entre as 5h e as 21h configura crime. "Quatro horas e cinquenta minutos" está fora desse intervalo (antes das 5h).'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Lei de Abuso de Autoridade',
 q:'Ainda sobre a Lei de Abuso de Autoridade, é correto afirmar que:',
 alts:['a aplicação das penas decorrentes da Lei dependerá de prévia e eventual imposição de sanções de natureza civil ou administrativa.',
       'a declaração de existência do fato e sua autoria pelo juízo criminal poderá ser modificada no âmbito civil e administrativo.',
       'a sentença penal que reconhecer o exercício regular de direito não faz coisa julgada no âmbito disciplinar.',
       'as notícias de crimes previstos na Lei que descreverem falta funcional serão informadas à autoridade competente com vistas à apuração.'],
 r:3,
 e:'Art. 6º, parágrafo único, da Lei 13.869/2019: as notícias de crimes que descrevam falta funcional serão informadas à autoridade competente para apuração. As penas da lei independem de sanções civis/administrativas prévias; a decisão penal sobre existência do fato e autoria não pode ser reexaminada nas esferas cível/administrativa; sentença penal que reconhece exercício regular de direito FAZ coisa julgada no âmbito disciplinar (art. 65).'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Lei 13.022/2014',
 q:'De acordo com a Lei nº 13.022/2014 – Estatuto Geral das Guardas Municipais, é correto afirmar que:',
 alts:['as guardas municipais utilizarão uniforme e equipamentos padronizados, preferencialmente, na cor azul-marinho.',
       'a estrutura hierárquica da guarda municipal é semelhante às forças militares, motivo pelo qual será facultativa a utilização de denominações como Sargento, Tenente, Capitão e Coronel.',
       'é assegurado ao guarda municipal o recolhimento a presídio especial destinado a policiais civis ou militares quando sujeito à prisão antes de condenação definitiva.',
       'a Agência Nacional de Telecomunicações (Anatel) destinará linha telefônica de número 197 e faixa compartilhada de frequência de rádio com a Polícia Militar, aos Municípios que possuírem guarda municipal.'],
 r:0,
 e:'Art. 10, IX, da Lei 13.022/2014: uniforme e equipamentos padronizados, preferencialmente na cor azul-marinho. As guardas municipais têm natureza civil, e a lei veda expressamente o uso de denominações e postos/graduações típicos das forças militares, como Sargento, Tenente e Coronel (art. 10, XI).'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Lei 13.022/2014, princípios',
 q:'Ainda sobre o Estatuto Geral das Guardas Municipais, é correto afirmar que um dos princípios mínimos de atuação das guardas municipais é:',
 alts:['a polícia ostensiva.','o patrulhamento preventivo.','a execução de atividades de defesa civil.','a educação, engenharia e fiscalização de trânsito.'],
 r:1,
 e:'Art. 3º, VI, da Lei 13.022/2014 elenca, entre os princípios mínimos de atuação das guardas municipais, o patrulhamento preventivo. Polícia ostensiva é atribuição das polícias militares; defesa civil, dos corpos de bombeiros militares; educação, engenharia e fiscalização de trânsito compõem o Sistema Nacional de Trânsito.'},

{c:'gcm', m:'Legislação', f:'VUNESP 2024 · GCM Lins-SP · Lei 13.022/2014, corregedoria',
 q:'Segundo a Lei nº 13.022/2014 – Estatuto Geral das Guardas Municipais, é correto afirmar que:',
 alts:['corregedoria e ouvidoria são órgãos obrigatórios em todas as guardas municipais.',
       'corregedoria é um órgão de controle externo.',
       'é obrigatório o funcionamento de corregedoria nas guardas municipais com efetivo superior a 50 (cinquenta) servidores da guarda e em todas as que utilizam arma de fogo.',
       'é facultativo o funcionamento de ouvidoria nas guardas municipais com efetivo inferior a 50 (cinquenta) servidores da guarda.'],
 r:2,
 e:'Art. 19, §1º, da Lei 13.022/2014: é obrigatório o funcionamento de corregedoria nas guardas municipais com efetivo superior a 50 servidores e em todas as que utilizam arma de fogo, independentemente do efetivo. Corregedoria é órgão de controle INTERNO, não externo; nem toda guarda é obrigada a manter corregedoria/ouvidoria.'},

{c:'correios', m:'Língua Portuguesa', f:'Acentuação',
 q:'Assinale a alternativa em que todas as palavras estão acentuadas corretamente.',
 alts:['juíz, país, saúde','juiz, pais, saude','juiz, país, saúde','juíz, pais, saúde','juiz, paíz, saúde'],

{c:'correios', m:'Matemática', f:'Raciocínio lógico',
 q:'Um carteiro entrega, em média, 45 correspondências por hora. Mantendo esse ritmo, em uma jornada de 6 horas de entregas ele entregará:',
 alts:['240 correspondências','250 correspondências','260 correspondências','270 correspondências','280 correspondências'],

{c:'correios', m:'Matemática', f:'Frações',
 q:'De um lote de 600 encomendas, 2/5 foram entregues no período da manhã. O número de encomendas que restaram para os demais períodos é:',
 alts:['240','300','320','360','400'],

{c:'correios', m:'Noções de Informática', f:'Navegadores',
 q:'Em navegadores de internet, em sua configuração padrão, o atalho Ctrl + T é utilizado para:',
 alts:['fechar o navegador.','abrir uma nova guia (aba).','imprimir a página atual.','atualizar a página.','abrir o histórico de navegação.'],

{c:'correios', m:'Noções de Informática', f:'Segurança',
 q:'O tipo de golpe em que criminosos enviam mensagens falsas, imitando empresas conhecidas, para roubar dados pessoais e senhas é chamado de:',
 alts:['firewall','phishing','backup','spam legítimo','antivírus'],
 r:1,
 e:'Phishing é a fraude que "pesca" dados da vítima por meio de mensagens e páginas falsas. Firewall e antivírus são mecanismos de proteção; backup é cópia de segurança.'},

/* ---------------- Correios · Língua Portuguesa (IBFC 2024 · Agente de Correios - Carteiro) ---------------- */
{c:'correios', m:'Língua Portuguesa', f:'IBFC 2024 · Agente de Correios - Carteiro (crônica)',
 q:'Leia o trecho:\n\nAmor com cabeça de oito\n\n"Seu Manéu era o carroceiro da nossa rua e também o único carroceiro que eu conhecia. Quando eu tinha oito, não entendia que quando um pai de família é carroceiro isso quer dizer que ele não tem muita escolha de sustento. Na minha cabeça de oito, ser carroceiro era algo incrível, uma profissão de controle, um ser dono de uma carruagem própria, mas é claro que eu também não pensava na malvadeza que era pro coitado do jumento, que puxava no espinhaço um monte de tijolo, de mudança, de terra, de qualquer coisa empilhada que obrigassem o jumento a puxar.\n\nFeito um pai de família sem opção de sustento, o jumento era condenado a sustentar um peso que não era seu. Mas eu, com minha cabeça de oito, achava a carroça maravilhosa, rangendo rua acima e rua abaixo, contando histórias de onde vinha. [...]"\n\n(ARRAES, Jarid. Redemoinho em dia quente. 1ª ed. Rio de Janeiro: Alfaguara, 2019)\n\nNo primeiro parágrafo do texto, o narrador:',
 alts:['expressa uma preocupação bem maior com o jumento do que com os humanos.',
       'aponta percepções distintas, em razão da idade, sobre uma mesma situação.',
       'revela que todas as profissões são dignas embora algumas sejam desvalorizadas.',
       'mostra que a situação de um carroceiro não se compara a de todos os demais.'],
 r:1,
 e:'O narrador contrapõe a percepção da criança de oito anos (achava ser carroceiro "algo incrível") à compreensão adulta sobre a falta de opção de sustento — duas percepções diferentes sobre a mesma situação, motivadas pela idade.',
 dica:'Repare que o texto mistura duas "vozes": a criança que via o carroceiro com admiração, e o adulto que entende a realidade por trás. É essa diferença de olhar que a questão está cobrando.'},

{c:'correios', m:'Língua Portuguesa', f:'IBFC 2024 · Agente de Correios - Carteiro (acentuação)',
 q:'Leia o trecho:\n\nAmor com cabeça de oito\n\n"Seu Manéu era o carroceiro da nossa rua e também o único carroceiro que eu conhecia. Quando eu tinha oito, não entendia que quando um pai de família é carroceiro isso quer dizer que ele não tem muita escolha de sustento. [...]"\n\n(ARRAES, Jarid. Redemoinho em dia quente. 1ª ed. Rio de Janeiro: Alfaguara, 2019)\n\nO vocábulo "família" (1º parágrafo) é acentuado pela mesma regra de acentuação de:',
 alts:['também.','único.','incrível','própria.'],
 r:3,
 e:'"Família" e "própria" são paroxítonas terminadas em ditongo (-ia), regra que exige acento. "Também" é oxítona terminada em -em; "único" é proparoxítona (sempre acentuada); "incrível" é paroxítona terminada em -l — regras diferentes.'},

{c:'correios', m:'Língua Portuguesa', f:'IBFC 2024 · Agente de Correios - Carteiro (pontuação)',
 q:'Leia o trecho:\n\nAmor com cabeça de oito\n\n"Seu Manéu era o carroceiro da nossa rua e também o único carroceiro que eu conhecia. Quando eu tinha oito, não entendia que quando um pai de família é carroceiro isso quer dizer que ele não tem muita escolha de sustento. [...]"\n\n(ARRAES, Jarid. Redemoinho em dia quente. 1ª ed. Rio de Janeiro: Alfaguara, 2019)\n\nA oração "Quando eu tinha oito," é seguida por uma vírgula. Esse sinal de pontuação tem o emprego justificado por:',
 alts:['separar uma oração subordinada adverbial anteposta.',
       'isolar uma oração subordinada adjetiva explicativa.',
       'destacar uma oração subordinada reduzida.',
       'indicar uma oração subordinada apositiva intercalada.'],
 r:0,
 e:'"Quando eu tinha oito" é oração subordinada adverbial temporal, anteposta à oração principal — a vírgula separa essa oração antecipada, conforme a norma-padrão.'},

{c:'correios', m:'Língua Portuguesa', f:'IBFC 2024 · Agente de Correios - Carteiro (crase)',
 q:'Leia o trecho:\n\nAmor com cabeça de oito\n\n"[...] Feito um pai de família sem opção de sustento, o jumento era condenado a sustentar um peso que não era seu. Mas eu, com minha cabeça de oito, achava a carroça maravilhosa, rangendo rua acima e rua abaixo, contando histórias de onde vinha. [...]"\n\n(ARRAES, Jarid. Redemoinho em dia quente. 1ª ed. Rio de Janeiro: Alfaguara, 2019)\n\nNo fragmento "o jumento era condenado a sustentar um peso" (2º parágrafo), a preposição "a" não recebe o acento grave. Assinale a alternativa em que a reescritura dessa passagem torna a crase obrigatória.',
 alts:['O jumento era condenado a sua sina.',
       'O jumento era condenado aquela situação.',
       'O jumento era condenado a crueldades.',
       'O jumento era condenado a uma violência.'],
 r:1,
 e:'"A" + "aquela" forma obrigatoriamente "àquela" — a crase é obrigatória diante de pronomes demonstrativos como "aquele(a)". Diante de "sua" a crase é facultativa; diante de substantivo indeterminado ("crueldades") ou de artigo indefinido ("uma violência") não há crase.'},

{c:'correios', m:'Língua Portuguesa', f:'IBFC 2024 · Agente de Correios - Carteiro (concordância nominal)',

/* =====================================================================
   ARMAZENAMENTO (histórico) — com fallback em memória
   ===================================================================== */
const store = {
  _mem:{},
  get(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return this._mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ this._mem[k]=v; } }
};

/* =====================================================================
   ESTADO E NAVEGAÇÃO
   ===================================================================== */
const app = document.getElementById('app');
let S = {}; // estado do simulado atual

const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const LETRAS = ['A','B','C','D','E'];
const embaralhar = a => { a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };

/* ---------- TELA: início ---------- */
function telaInicio(){
  const hist = store.get('historico') || [];
  app.innerHTML = `
    <p class="eyebrow">Escolha o concurso</p>
    ${CONCURSOS.map(c=>{
      const n = BANCO.filter(q=>q.c===c.id).length;
      return `<button class="concurso ${c.id}" onclick="telaSetup('${c.id}')">
        <span class="sigla">${c.sigla}</span>
        <span><h3>${c.nome}</h3><p>${c.desc}</p></span>
        <span class="n"><b>${n}</b>questões</span>
      </button>`;
    }).join('')}

    <p class="eyebrow">Últimos simulados</p>
    ${hist.length ? hist.slice(0,6).map(h=>{
      const pct = Math.round(h.acertos/h.total*100);
      return `<div class="hist">
        <span class="pct ${pct>=50?'ok':'ruim'}">${pct}%</span>
        <span class="info"><b>${h.nome}</b><span>${h.acertos}/${h.total} acertos · ${h.data}</span></span>
      </div>`;
    }).join('') : `<div class="vazio">Nenhum simulado feito ainda. Bora começar? 💪</div>`}
    <p class="aviso">Feito para estudo entre amigos · adicione questões novas direto no arquivo <b>index.html</b></p>
  `;
  window.scrollTo(0,0);
}

/* ---------- TELA: configurar simulado ---------- */
function telaSetup(cid){
  const c = CONCURSOS.find(x=>x.id===cid);
  const qs = BANCO.filter(q=>q.c===cid);
  const materias = [...new Set(qs.map(q=>q.m))];
  const sel = new Set(materias);
  let qtd = Math.min(10, qs.length);

  const anosDisponiveis = [...new Set(qs.filter(q=>q.ano).map(q=>q.ano))].sort((a,b)=>b-a);

  function render(){
    const disponiveis = qs.filter(q=>sel.has(q.m)).length;
    qtd = Math.min(qtd, disponiveis);
    const totalProva = c.prova ? Object.values(c.prova).reduce((a,b)=>a+b,0) : 0;
    app.innerHTML = `
      <p class="eyebrow">${c.nome}</p>
      ${c.prova ? `
      <button class="btn btn-primario" id="oficial" style="margin-bottom:8px; border-bottom:3px solid var(--insignia);">
        Prova real · ${totalProva} questões
      </button>
      <p style="font-size:12.5px; color:var(--tinta-2); text-align:center; margin:0 0 20px;">
        Mesma distribuição da prova oficial · nota de corte: ${c.corte} acertos
      </p>` : ''}
      ${c.prova && anosDisponiveis.length ? `
      <p class="eyebrow" style="margin-top:6px;">Ou treine com provas reais de anos anteriores</p>
      ${anosDisponiveis.map(a=>{
        const nDisp = qs.filter(q=>q.ano===a).length;
        const nAlvo = Math.min(totalProva, nDisp);
        return `<button class="btn btn-claro" data-edital="${a}" style="margin-bottom:8px;">
          Prova real ${a} · ${nAlvo} questões
        </button>`;
      }).join('')}
      <p style="font-size:12.5px; color:var(--tinta-2); text-align:center; margin:0 0 20px;">
        Questões reais e verificadas do edital de cada ano
      </p>` : ''}
      <p class="eyebrow" style="margin-top:6px;">Ou monte um treino rápido</p>
      <div class="painel">
        <h4>Matérias</h4>
        <div class="chips">
          ${materias.map(m=>{
            const n = qs.filter(q=>q.m===m).length;
            return `<button class="chip ${sel.has(m)?'on':''}" data-m="${esc(m)}">${m} <span class="qtd">(${n})</span></button>`;
          }).join('')}
        </div>
      </div>
      <div class="painel">
        <h4>Quantidade de questões</h4>
        <div class="chips" id="qtds">
          ${[5,10,15,20].filter(n=>n<=disponiveis).map(n=>`<button class="chip ${qtd===n?'on':''}" data-q="${n}">${n}</button>`).join('')}
          <button class="chip ${qtd===disponiveis?'on':''}" data-q="${disponiveis}">Todas (${disponiveis})</button>
        </div>
      </div>
      <button class="btn btn-primario" id="comecar" ${disponiveis===0?'disabled':''}>Começar simulado</button>
      <button class="btn btn-linha" onclick="telaInicio()">← Voltar</button>
    `;
    app.querySelectorAll('.chip[data-m]').forEach(b=>b.onclick=()=>{
      const m=b.dataset.m;
      if(sel.has(m) && sel.size>1) sel.delete(m); else sel.add(m);
      render();
    });
    app.querySelectorAll('.chip[data-q]').forEach(b=>b.onclick=()=>{ qtd=+b.dataset.q; render(); });
    document.getElementById('comecar').onclick=()=>iniciarSimulado(cid, [...sel], qtd);
    const ofc=document.getElementById('oficial');
    if(ofc) ofc.onclick=()=>iniciarProvaOficial(cid);
    app.querySelectorAll('[data-edital]').forEach(b=>b.onclick=()=>iniciarProvaEdital(cid, +b.dataset.edital));
    window.scrollTo(0,0);
  }
  render();
}

/* ---------- prova real: distribuição oficial por matéria ---------- */
function iniciarProvaOficial(cid){
  const c = CONCURSOS.find(x=>x.id===cid);
  let pool = [];
  for(const [m, n] of Object.entries(c.prova)){
    pool = pool.concat(embaralhar(BANCO.filter(q=>q.c===cid && q.m===m)).slice(0, n));
  }
  S = { cid, nome:c.nome, questoes:pool,
        respostas:Array(pool.length).fill(null), i:0,
        oficial:true, corte:c.corte };
  telaQuestao();
}

/* ---------- prova real de um edital anterior específico: distribuição oficial, só questões reais daquele ano ---------- */
function iniciarProvaEdital(cid, ano){
  const c = CONCURSOS.find(x=>x.id===cid);
  let pool = [];
  for(const [m, n] of Object.entries(c.prova)){
    pool = pool.concat(embaralhar(BANCO.filter(q=>q.c===cid && q.m===m && q.ano===ano)).slice(0, n));
  }
  pool = embaralhar(pool);
  S = { cid, nome: `${c.nome} · Edital ${ano}`, questoes:pool,
        respostas:Array(pool.length).fill(null), i:0,
        oficial:true, corte:c.corte };
  telaQuestao();
}

/* ---------- iniciar ---------- */
function iniciarSimulado(cid, materias, qtd){
  const pool = embaralhar(BANCO.filter(q=>q.c===cid && materias.includes(q.m))).slice(0, qtd);
  S = { cid, nome:CONCURSOS.find(x=>x.id===cid).nome, questoes:pool,
        respostas:Array(pool.length).fill(null), i:0 };
  telaQuestao();
}

/* ---------- TELA: questão ---------- */
function telaQuestao(){
  const q = S.questoes[S.i];
  const ultima = S.i === S.questoes.length-1;
  const respondidas = S.respostas.filter(r=>r!==null).length;

  app.innerHTML = `
    <div class="faixa">
      <div class="meta">
        <b>Questão ${String(S.i+1).padStart(2,'0')} / ${String(S.questoes.length).padStart(2,'0')}</b>
        <span>${respondidas} respondida${respondidas===1?'':'s'}</span>
      </div>
      <div class="strip">
        ${S.questoes.map((_,k)=>`<i class="${S.respostas[k]!==null?'feita':''} ${k===S.i?'atual':''}"></i>`).join('')}
      </div>
    </div>
    <span class="q-materia">${q.m}</span>
    <p class="q-texto">${esc(q.q)}</p>
    <p class="q-fonte">${q.f}</p>
    ${q.dica ? `<button class="dica-btn" id="btnDica">💡 preciso de uma dica</button><div class="dica-caixa" id="caixaDica">${esc(q.dica)}</div>` : ''}
    <div class="alts">
      ${q.alts.map((a,k)=>`
        <button class="alt ${S.respostas[S.i]===k?'sel':''}" data-k="${k}">
          <span class="bolha">${LETRAS[k]}</span><span>${esc(a)}</span>
        </button>`).join('')}
    </div>
    <div class="nav-quiz">
      ${S.i>0 ? `<button class="btn btn-claro" id="ant">← Anterior</button>` : ''}
      <button class="btn btn-primario" id="prox" ${S.respostas[S.i]===null?'disabled':''}>
        ${ultima ? 'Finalizar ✓' : 'Próxima →'}
      </button>
    </div>
    <button class="btn btn-linha" onclick="if(confirm('Sair do simulado? O progresso será perdido.')) telaInicio()">Sair do simulado</button>
  `;

  app.querySelectorAll('.alt').forEach(b=>b.onclick=()=>{
    S.respostas[S.i]=+b.dataset.k;
    app.querySelectorAll('.alt').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    document.getElementById('prox').disabled=false;
  });
  const btnDica=document.getElementById('btnDica');
  if(btnDica) btnDica.onclick=()=>{
    const caixa=document.getElementById('caixaDica');
    const aberta=caixa.classList.toggle('aberta');
    btnDica.textContent = aberta ? '✕ ocultar dica' : '💡 preciso de uma dica';
  };
  const ant=document.getElementById('ant');
  if(ant) ant.onclick=()=>{ S.i--; telaQuestao(); };
  document.getElementById('prox').onclick=()=>{
    if(S.respostas[S.i]===null) return;
    if(ultima) telaResultado(); else { S.i++; telaQuestao(); }
  };
  window.scrollTo(0,0);
}

/* ---------- TELA: resultado ---------- */
function telaResultado(){
  const total = S.questoes.length;
  const acertos = S.questoes.filter((q,k)=>S.respostas[k]===q.r).length;
  const pct = Math.round(acertos/total*100);

  // salvar histórico (apenas uma vez por simulado)
  if(!S.salvo){
    const hist = store.get('historico') || [];
    hist.unshift({ nome:S.nome, acertos, total,
      data:new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) });
    store.set('historico', hist.slice(0,20));
    S.salvo = true;
  }

  // desempenho por matéria
  const porMateria = {};
  S.questoes.forEach((q,k)=>{
    porMateria[q.m] = porMateria[q.m] || {a:0,t:0};
    porMateria[q.m].t++;
    if(S.respostas[k]===q.r) porMateria[q.m].a++;
  });

  let selo;
  if(S.oficial){
    selo = acertos>=S.corte ? ['ok',`Acima do corte (${S.corte}) — aprovado! 🎯`] : ['ruim',`Abaixo do corte de ${S.corte} acertos`];
  } else {
    selo = pct>=70 ? ['ok','Mandou bem! 🎯'] : pct>=50 ? ['quase','No caminho certo'] : ['ruim','Bora revisar os erros'];
  }

  app.innerHTML = `
    <div class="placar">
      <div class="nota">${acertos}<small>/${total}</small></div>
      <p>${pct}% de acertos · ${S.nome}${S.oficial?' · Prova real':''}</p>
      <span class="selo ${selo[0]}">${selo[1]}</span>
    </div>

    <p class="eyebrow">Desempenho por matéria</p>
    <div class="painel barras">
      ${Object.entries(porMateria).map(([m,d])=>{
        const p = Math.round(d.a/d.t*100);
        const cls = p>=70?'':p>=50?'media':'baixa';
        return `<div class="barra-linha">
          <div class="rot"><span>${m}</span><span>${d.a}/${d.t}</span></div>
          <div class="barra-bg"><div class="barra-fill ${cls}" style="width:${Math.max(p,4)}%"></div></div>
        </div>`;
      }).join('')}
    </div>

    <button class="btn btn-primario" onclick="telaRevisao('erradas')">Corrigir as que errei (${total-acertos})</button>
    <div style="height:10px"></div>
    <button class="btn btn-claro" onclick="telaRevisao('todas')">Ver gabarito completo</button>
    <button class="btn btn-linha" onclick="telaInicio()">← Início</button>
  `;
  window.scrollTo(0,0);
}

/* ---------- TELA: revisão / gabarito ---------- */
function telaRevisao(filtro){
  const itens = S.questoes.map((q,k)=>({q,k,ok:S.respostas[k]===q.r}))
                          .filter(x=> filtro==='todas' ? true : !x.ok);

  app.innerHTML = `
    <p class="eyebrow">${filtro==='todas' ? 'Gabarito completo' : 'Questões que você errou'}</p>
    <div class="filtros-rev">
      <button class="chip ${filtro==='erradas'?'on':''}" onclick="telaRevisao('erradas')">Só os erros</button>
      <button class="chip ${filtro==='todas'?'on':''}" onclick="telaRevisao('todas')">Todas</button>
    </div>
    ${itens.length===0 ? `<div class="vazio">Nenhum erro — gabaritou! 🏆</div>` : itens.map(({q,k,ok})=>`
      <div class="rev ${ok?'acerto':''}">
        <div class="num">Questão ${String(k+1).padStart(2,'0')} · ${q.m}</div>
        <p class="enun">${esc(q.q)}</p>
        ${!ok ? `<div class="linha-resp"><span class="tag sua">Sua resposta</span><span>${LETRAS[S.respostas[k]]}) ${esc(q.alts[S.respostas[k]])}</span></div>` : ''}
        <div class="linha-resp"><span class="tag gab">Gabarito</span><span>${LETRAS[q.r]}) ${esc(q.alts[q.r])}</span></div>
        <div class="explica"><b>Por quê:</b> ${esc(q.e)}</div>
      </div>
    `).join('')}
    <button class="btn btn-primario" onclick="telaResultado()">← Voltar ao resultado</button>
    <button class="btn btn-linha" onclick="telaInicio()">Início</button>
  `;
  window.scrollTo(0,0);
}

telaInicio();
</script>
</body>
</html>
